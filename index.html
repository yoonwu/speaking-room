.eng-emo{font-size:30px;background:rgba(0,0,0,.28)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 16px -2px var(--glow,rgba(255,255,255,.4))}
/* 🎧 리스닝 동굴 — 깊고 푸른 동굴 */
.eng-in{--glow:rgba(91,180,255,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-cave.png') center/cover no-repeat,
  radial-gradient(80% 120% at 12% 0%,rgba(99,200,255,.42),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(40,80,180,.55),transparent 60%),
  linear-gradient(160deg,#143a5e,#0c1830 78%);
  box-shadow:0 16px 36px -16px rgba(60,140,255,.65),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.6)}
/* ⚔️ 스피킹 훈련장 — 비취빛 도장 */
.eng-out{--glow:rgba(31,230,170,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-dojo.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(60,240,190,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(8,110,84,.55),transparent 60%),
  linear-gradient(160deg,#10493a,#0a1f1a 78%);
  box-shadow:0 16px 36px -16px rgba(20,200,150,.6),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🌎 모험 월드맵 — 황혼의 대륙 */
.eng-real{--glow:rgba(255,180,90,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-worldmap.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(255,200,110,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(190,70,30,.55),transparent 60%),
  linear-gradient(160deg,#5e3318,#1f1410 80%);
  box-shadow:0 16px 36px -16px rgba(245,150,60,.6),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* ⚡ 라이트닝 아레나 — 번개 투기장 */
#engSprint{--glow:rgba(255,200,80,.6);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-arena.png') center/cover no-repeat,
  radial-gradient(70% 120% at 8% 0%,rgba(255,210,90,.42),transparent 52%),
  radial-gradient(80% 130% at 100% 120%,rgba(150,80,255,.5),transparent 58%),
  linear-gradient(160deg,#3a2a10,#1a1226 82%);
  box-shadow:0 18px 40px -16px rgba(255,150,60,.7),inset 0 1px 0 rgba(255,255,255,.16),inset 0 -30px 44px -20px rgba(0,0,0,.55)}
#engSprint .eng-emo{animation:boltpulse 1.8s ease-in-out infinite}
@keyframes boltpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12) rotate(-4deg)}}
/* 💬 단어 강화 — 청록 보석 동굴 */
#vocabCard{--glow:rgba(31,211,160,.55);background:
  radial-gradient(80% 120% at 14% 0%,rgba(60,235,185,.34),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(20,120,150,.5),transparent 60%),
  linear-gradient(160deg,#10433f,#0a1c20 80%);
  box-shadow:0 16px 36px -16px rgba(25,200,165,.55),inset 0 1px 0 rgba(255,255,255,.13),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🎧 연음 부스터 — 보랏빛 음파 */
#boosterCard{--glow:rgba(150,130,255,.55);background:
  radial-gradient(80% 120% at 14% 0%,rgba(160,150,255,.34),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(90,60,180,.5),transparent 60%),
  linear-gradient(160deg,#2e2a55,#15122a 80%);
  box-shadow:0 16px 36px -16px rgba(120,100,240,.55),inset 0 1px 0 rgba(255,255,255,.13),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🏰 사운드 아카데미 (kidCard) — 따뜻한 성 */
#kidCard{--glow:rgba(255,200,100,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-castle.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(255,215,130,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(150,100,40,.5),transparent 60%),
  linear-gradient(160deg,#4a3a1a,#1c1610 80%)!important;
  border:1px solid rgba(255,200,110,.4)!important;box-shadow:0 14px 32px -16px rgba(255,180,80,.6),inset 0 1px 0 rgba(255,255,255,.14)!important}
#kidCard .ke{background:rgba(0,0,0,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 16px -2px rgba(255,200,100,.5)}
/* ✨ 아이 모드: 더 밝고 통통한 월드 */
.kidworld .eng-in{background:radial-gradient(80% 120% at 14% 0%,rgba(140,225,255,.7),transparent 58%),linear-gradient(160deg,#2f8fd6,#1f5fae 82%)}
.kidworld .eng-out{background:radial-gradient(80% 120% at 14% 0%,rgba(120,255,210,.7),transparent 58%),linear-gradient(160deg,#1fc98e,#10936a 82%)}
.kidworld .eng-real{background:radial-gradient(80% 120% at 14% 0%,rgba(255,220,140,.75),transparent 58%),linear-gradient(160deg,#ff9e4d,#ef6d2a 82%)}
.kidworld #engSprint{background:radial-gradient(70% 120% at 10% 0%,rgba(255,225,120,.8),transparent 55%),linear-gradient(160deg,#ffb454,#ff7a45 60%,#b06cff 100%)}
.kidworld #kidCard{background:radial-gradient(80% 120% at 14% 0%,rgba(255,225,150,.8),transparent 58%),linear-gradient(160deg,#ffc24d,#f0982e 82%)!important}
.kidworld .eng-tx i,.kidworld #kidCard .kt i{color:rgba(255,255,255,.96)}
.kidworld .worldlabel{color:#ffd98a}
/* progress bar shimmer */
.rwbar i,.rwbar2 i{position:relative;overflow:hidden}
.rwbar i::after,.hero-reward .rwbar i::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-100%);animation:barsweep 2.6s ease-in-out infinite}
@keyframes barsweep{0%{transform:translateX(-100%)}55%,100%{transform:translateX(220%)}}
/* ===== 🎨 하단 통일: 월드와 같은 깊이·광택·글로우 ===== */
.seclabel{font-size:12.5px;font-weight:800;color:var(--ink-soft);letter-spacing:.01em;margin:2px 2px 10px;opacity:.92}
/* 이어서 연습하기 — 재개 카드 */
.continue{position:relative;overflow:hidden;background:linear-gradient(160deg,#1d2420,#14191600)!important;background-color:#161c19!important;border:1px solid rgba(31,211,160,.28)!important;border-radius:18px!important;box-shadow:0 12px 28px -18px rgba(31,211,160,.5),inset 0 1px 0 rgba(255,255,255,.07)!important}
.continue::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 40%);pointer-events:none}
.continue:active{transform:scale(.98)}
.cont-emo{background:rgba(31,211,160,.16)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 14px -2px rgba(31,211,160,.5)}
.cont-t{font-weight:900!important;color:#fff!important}
/* 추가 연습 — 사이드 퀘스트 카드 */
.sidequest{position:relative;overflow:hidden;background:linear-gradient(160deg,#1b211e,#13181500)!important;background-color:#161b18!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:18px!important;box-shadow:0 12px 26px -18px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.06)!important;transition:transform .12s}
.sidequest::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 42%);pointer-events:none}
.sidequest:active{transform:scale(.96)}
.sq-ico{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;font-size:20px;background:rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 14px -3px var(--sqg,rgba(255,255,255,.4))}
.sq-t{font-size:14px;font-weight:900;color:#fff;margin-top:9px}
.sq-d{font-size:11px;color:var(--muted);margin-top:2px}
/* 다시 만날 표현 — 복습 카드 (깊이+글로우 통일) */
.rvbanner{position:relative;overflow:hidden;background:radial-gradient(90% 130% at 0% 0%,rgba(31,211,160,.22),transparent 58%),linear-gradient(160deg,#143a30,#0c1c17 82%)!important;border:1px solid rgba(31,211,160,.32)!important;border-radius:18px!important;box-shadow:0 12px 28px -18px rgba(31,211,160,.55),inset 0 1px 0 rgba(255,255,255,.07)!important}
.rvbanner::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 40%);pointer-events:none}
/* 퀘스트/지표/난이도 — 같은 인셋 광택 */
#questBox>div,#acqStats>div,#dailyCard>div{box-shadow:0 10px 24px -18px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06)!important}
.difcard{position:relative;overflow:hidden;background:linear-gradient(160deg,#1b211e,#14191600)!important;background-color:#161b18!important;border:1px solid rgba(255,255,255,.10)!important;box-shadow:0 10px 24px -18px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06)!important}
/* 🗣️ 혀 위치 그림 */
.tongue-wrap{margin:10px auto 4px;max-width:260px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 10px 10px}
.tongue-badge{font-size:10.5px;font-weight:800;color:#1FD3A0;text-align:center;margin-bottom:6px;letter-spacing:.02em}
.art-replay{display:block;margin:10px auto 4px;padding:9px 18px;border-radius:999px;border:none;background:linear-gradient(135deg,#1fd3a0,#13b488);color:#06231b;font-weight:900;font-size:14px;box-shadow:0 8px 20px -8px rgba(31,211,160,.6);cursor:pointer}
.art-replay:active{transform:scale(.96)}
.art-steps{margin:12px auto 2px;max-width:300px;display:flex;flex-direction:column;gap:7px}
.art-step{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:10px 12px;font-size:15px;font-weight:800;color:var(--text,#fff);line-height:1.35}
.art-num{flex:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#ffb454,#ff7a45);color:#3a1a00;font-size:13px;font-weight:900;display:grid;place-items:center;box-shadow:0 2px 6px -1px rgba(255,140,60,.6)}
.dict-slots{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;align-items:center;padding:16px 14px;background:var(--mist);border:1px solid var(--line);border-radius:14px;min-height:56px}
.dslot{font-size:20px;font-weight:800;letter-spacing:.01em;transition:.18s}
.dslot.filled{color:var(--jade);animation:dslotpop .35s cubic-bezier(.18,1.5,.4,1)}
.dslot.blank{color:#9aa6b2;letter-spacing:4px;border-bottom:2.5px solid #9aa6b2;padding:0 3px 1px;opacity:.65}
@keyframes dslotpop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.tongue-hint{font-size:13.5px;font-weight:800;color:var(--text,#fff);text-align:center;margin-top:6px;line-height:1.4}
.tongue-legend{font-size:10.5px;color:var(--muted,#9aa);text-align:center;margin-top:4px}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>스피킹 룸 <span>· speaking room</span></h1>
    </div>
    <div class="ctx" id="ctxBar" style="display:none">
      <span class="chip" id="ctxScn"></span>
      <span class="chip" id="ctxLvl"></span>
      <button class="iconbtn on" id="ttsBtn" title="음성 자동재생 켜기/끄기" aria-label="음성 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
      </button>
      <button class="iconbtn" id="restartBtn" title="새 대화 시작" aria-label="새 대화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 8a9 9 0 1 0 2.5-3.5L3 8"/></svg>
      </button>
      <button class="iconbtn notes-mobile-toggle" id="notesToggle" title="표현 노트" aria-label="표현 노트">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13l3 3v13H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
      </button>
      <button class="iconbtn" id="evalBtn" title="끝내고 평가받기" aria-label="평가" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16l4-3 4 3 4-3 4 3V4z"/><path d="M9 9h6M9 13h6"/></svg>
      </button>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup" id="setup">
    <div class="setup-inner">
      <div class="home" id="homeCard">
        <!-- 🎮 HERO ZONE -->
        <div class="hero" id="heroZone" title="내 프로필"></div>
        <!-- 연령 모드 -->
        <div id="ageToggle" style="display:flex;gap:6px;background:var(--mist);border-radius:13px;padding:4px;margin:4px 0 14px">
          <button data-age="adult" style="flex:1;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:800;cursor:pointer">🧑 어른</button>
          <button data-age="kid" style="flex:1;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:800;cursor:pointer">🧒 아이</button>
        </div>
        <!-- 난이도: 어른/아이 토글 바로 아래 -->
        <div class="difcard" style="border-radius:14px;padding:11px 14px;margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
            <span style="font-size:13px;font-weight:800;color:var(--text)">난이도</span>
            <span id="lvlLabel" style="font-size:13px;font-weight:800;color:var(--jade)">Lv.1 · 유치원</span>
          </div>
          <input type="range" id="lvlRange" min="1" max="10" step="1" value="1" style="width:100%;accent-color:#1fd3a0">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
            <span>유치원</span><span>초등</span><span>원어민</span>
          </div>
        </div>
        <!-- 🗺️ 모험 지도 -->
        <div class="worldlabel">🗺️ 오늘은 어디로 떠날까?</div>
        <div class="engrid">
        <button class="eng eng-in" id="engIn">
          <span class="help-q" data-tut="listen">?</span>
          <span class="eng-emo">🎧</span>
          <span class="eng-tx"><b>리스닝 동굴</b><i>귀뚫기 · 듣고 따라하기</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng eng-out" id="engOut">
          <span class="help-q" data-tut="output">?</span>
          <span class="eng-emo">⚔️</span>
          <span class="eng-tx"><b>스피킹 훈련장</b><i>꺼내기 · 입 밖으로</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng eng-real" id="engReal">
          <span class="help-q" data-tut="survival">?</span>
          <span class="eng-emo">🌎</span>
          <span class="eng-tx"><b>모험 월드맵</b><i>실전 · 영어로 버티기</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng" id="engSprint">
          <span class="help-q" data-tut="sprint">?</span>
          <span class="eng-emo">⚡</span>
          <span class="eng-tx"><b>라이트닝 아레나</b><i>스프린트 · 많이 말하기</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng" id="vocabCard">
          <span class="help-q" data-tut="vocab">?</span>
          <span class="eng-emo">💬</span>
          <span class="eng-tx"><b>단어 강화</b><i>단어를 상황에서 써보기</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng" id="boosterCard">
          <span class="help-q" data-tut="booster">?</span>
          <span class="eng-emo">🎧</span>
          <span class="eng-tx"><b>연음 부스터</b><i>wudja · wanna 알아듣기</i></span>
          <span class="eng-ar">›</span>
        </button>
        </div>
        <button class="continue" id="continueCard" style="display:none">
          <span class="cont-emo" id="contEmo">✈️</span>
          <span class="cont-txt"><span class="cont-t">이어서 연습하기</span><span class="cont-d" id="contDesc"></span></span>
          <span class="cont-arr">›</span>
        </button>
      </div>

      <!-- 🔥 오늘의 생존 표현 -->
      <div id="dailyCard"></div>
      <!-- 🎯 오늘의 퀘스트 + 보상 진행률 -->
      <div id="questBox"></div>

      <!-- 🔥 약점 청크 (아레나 MISS 누적) → 탭하면 즉시 집중 훈련 -->
      <div id="weakHome" style="display:none;margin-bottom:11px"></div>

      <!-- 습득 지표 (점수 아님 — 자신감·인출속도·이해) -->
      <div id="acqStats" style="margin-bottom:11px"></div>

      <!-- 아이 파닉스 (초등 저학년) -->
      <button id="kidCard" style="position:relative"><span class="help-q" data-tut="phonics">?</span><span class="ke">🏰</span><span class="kt"><b>사운드 아카데미</b><i>파닉스 · 글자 소리 · 단어 읽기 · 발음 별점 ⭐</i></span><span class="ka">›</span></button>

      <!-- 다시 만날 표현 (STEP 8 · 미래 인출) -->
      <div class="rvbanner" id="rvBanner" style="display:none">
        <div class="rvb-l"><span class="rvb-n" id="rvCount">0</span><span class="rvb-t">다시 만날 표현</span></div>
        <div class="rvb-btns">
          <button id="rvStart">다시 말해보기</button>
          <button id="rvSpeed">⚡ 속도</button>
        </div>
      </div>

      <!-- 난이도 1~10 (세분화) — 위치: 어른/아이 토글 아래로 이동됨 -->
      <div class="levels" id="levels" style="display:none"></div>
      <div id="verFoot" style="text-align:center;margin-top:14px;font-size:11.5px;color:var(--muted);opacity:.7;letter-spacing:.03em"></div>

      <!-- (구) 설정 영역 — 코치형에선 숨김, 엔진 호환 위해 유지 -->
      <div style="display:none">
      <div class="field" id="levelField"></div>

      <div class="field" id="talkField" style="display:none">
        <label>어떤 상황을 연습할까요</label>
        <div class="scn" id="scnGrid"></div>
        <div id="customWrap">
          <textarea id="customInput" rows="2" placeholder="예: 공항 체크인 카운터에서 수하물이 초과됐을 때"></textarea>
        </div>
      </div>

      <div class="field" id="listenField" style="display:none">
        <label>어떤 주제를 들을까요</label>
        <div class="scn" id="topicGrid"></div>
        <div id="topicCustomWrap" style="margin-top:11px; display:none">
          <textarea id="topicCustomInput" rows="2" placeholder="예: 미국 마트에서 장 보는 일상, 또는 비트코인 뉴스" style="width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;resize:none;line-height:1.5"></textarea>
        </div>
        <button class="floodbtn" id="floodBtn" disabled>🎧 흘려듣기 — 자동 연속 재생 (핸즈프리)</button>
      </div>

      <div class="field" id="blockField" style="display:none">
        <label>블록 영어 — 핵심 표현 마스터</label>
        <div id="blkPanel"></div>
      </div>

      <div class="field" id="vocabField">

/* localStorage 기반 저장 (claude.ai 밖에서도 진행도가 저장됨) */
if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    async get(k){ try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; } },
    async set(k,v){ try{ localStorage.setItem(k, v); return {value:v}; }catch(e){ return null; } },
    async delete(k){ try{ localStorage.removeItem(k); return {deleted:true}; }catch(e){ return null; } },
    async list(){ return {keys:[]}; }
  };
}

/* safe Web Speech handles (some mobile webviews lack the bare globals) */
const TTS = (typeof window!=="undefined" && window.speechSynthesis) ? window.speechSynthesis : null;
const SSU = (typeof window!=="undefined" && window.SpeechSynthesisUtterance) ? window.SpeechSynthesisUtterance : null;

/* unlock TTS on first user gesture (iOS requires speech to start inside a tap) */
let ttsUnlocked=false;
function unlockTTS(){ if(ttsUnlocked||!TTS||!SSU) return; try{ const u=new SSU(" "); u.volume=0; TTS.speak(u); ttsUnlocked=true; }catch(e){} }

/* custom modal (native prompt/confirm are blocked inside the app webview) */

function openModal(opts){

  if(opts.html){ m.innerHTML=opts.html; m.style.display="block"; }
  else { m.textContent=opts.msg||""; m.style.display=opts.msg?"block":"none"; }
  inp.style.display=opts.input?"block":"none"; inp.value=""; inp.placeholder=opts.placeholder||"";

  document.getElementById("modalOk").textContent=opts.okText||"확인";
  document.getElementById("modalCancel").textContent=opts.cancelText||"취소";
  document.getElementById("modalScrim").classList.add("show");
  if(opts.input) setTimeout(()=>inp.focus(),60);
  _modalOnOk=()=>{ const v=opts.input?inp.value.trim():true; closeModal(); if(opts.onOk) opts.onOk(v); };
}
function closeModal(){ document.getElementById("modalScrim").classList.remove("show"); _modalOnOk=null; }

/* ============ Claude API ============ */
async function callClaude(system, messages, model){
  // 전역 출력 규칙: 마크다운/구분선 금지 (말풍선이 plain text라 별표가 그대로 보임)
  const NO_MD="\n\n[FORMAT] Plain conversational text only. Do NOT use markdown: no **, no *, no ##, no ---, no bullet lists, no backticks. Write naturally as if texting.";
  const sys = (typeof system==="string" && system.indexOf("ONLY")===-1 && system.indexOf("JSON")===-1)
    ? system+NO_MD : system;
  const res = await fetch(PROXY_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model: model||MODEL, max_tokens:2000, system:sys, messages })
  });
  if(!res.ok) throw new Error("API "+res.status);
  return res.json();
}
function extractText(data){
  if(!data || !Array.isArray(data.content)) return "";
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function parseJSON(text){
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const s=t.indexOf("{"), e=t.lastIndexOf("}");
  if(s>=0 && e>=0) t=t.slice(s,e+1);
  return JSON.parse(t);
}

function turnEl(role){
  const d=document.createElement("div");
  d.className="turn "+(role==="assistant"?"coach":"me");
  const who=document.createElement("div");
  who.className="who"; who.textContent = role==="assistant" ? "상대" : "나";
  const bub=document.createElement("div"); bub.className="bubble";
  d.appendChild(who); d.appendChild(bub);
  threadInner.appendChild(d);
  return {wrap:d, bub};
}
// AI 응답에서 마크다운/메타 군더더기 제거 (별표·구분선·과한 안내문)
function cleanReply(t){
  if(!t) return "";
  let s=String(t);
  s=s.replace(/\*\*(.+?)\*\*/g,"$1");      // **굵게** → 일반
  s=s.replace(/\*(.+?)\*/g,"$1");          // *기울임*
  s=s.replace(/^#{1,6}\s+/gm,"");          // 헤더
  s=s.replace(/^\s*[-—–]{3,}\s*$/gm,"");   // --- 구분선
  s=s.replace(/`([^`]+)`/g,"$1");          // 인라인 코드
  s=s.replace(/\n{3,}/g,"\n\n");
  return s.trim();
}
function addCoachTurn(text){
  text=cleanReply(text);
  const {wrap,bub}=turnEl("assistant");
  bub.textContent=text;
  const acts=document.createElement("div"); acts.className="coach-acts";
  const play=document.createElement("button");
  play.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg> 다시 듣기`;
  play.onclick=()=>speak(text);
  const tr=document.createElement("button");
  tr.innerHTML=`🇰🇷 해석`;
  const trDiv=document.createElement("div"); trDiv.className="ko-trans";
  tr.onclick=()=>toggleTrans(text, trDiv);
  acts.appendChild(play); acts.appendChild(tr);
  wrap.appendChild(acts); wrap.appendChild(trDiv);
  // 입력창 위에 상대방 말 고정 (타이핑하면서 보이게)
  const pq=$("#pinnedQ"), pqt=$("#pinnedQText");
  if(pq&&pqt){ pqt.textContent=text; pq.style.display="block"; }
  scrollDown();
  if(state.ttsOn) speak(text);
}
let _transBusy=false;
async function toggleTrans(text, div){
  if(div.dataset.loaded){ div.classList.toggle("show"); return; }
  if(_transBusy) return; _transBusy=true;
  div.classList.add("show"); div.textContent="해석 중…";
  try{
    const data=await callClaude("Translate the English to natural Korean. Return ONLY the Korean translation, nothing else — no quotes, no notes.", [{role:"user", content:text}]);
    div.textContent=extractText(data); div.dataset.loaded="1";
  }catch(e){ div.textContent="(해석을 불러오지 못했어요)"; }
  _transBusy=false;
}
function addMeTurn(text){
  const {bub}=turnEl("user"); bub.textContent=text; scrollDown();
}
function showTyping(){

/* ============ conversation flow ============ */
async function startSession(){
  if(state.scn) markPractice({mode:"talk", id:state.scn.id, emo:state.scn.emo||"🗣️", label:(state.scn.id==="custom"?"직접 입력 회화":(state.scn.t||"회화"))});
  setup.style.display="none"; stage.style.display="flex"; $("#ctxBar").style.display="flex";
  pushScreen("talk");
  $("#ctxScn").textContent = state.scn.id==="custom" ? "직접 입력" : state.scn.t;
  $("#ctxLvl").textContent = levelName();
  $("#evalBtn").style.display="";
  state.convo=[];
  threadInner.innerHTML="";
  setBusy(true);
  showTyping();
  try{
    const kickoff = state.engine==="output"
      ? "Start now. Give me the first situation in Korean (one line). Do not show any English."
      : state.engine==="survival"
      ? "Start the situation now. Say your first line to me in English, in character."
      : (state.scn && state.scn.id==="freetalk")
      ? "Start now. Greet me warmly in one short line and ask me your first easy question."
      : "Begin the role-play now. Say your first line to me.";
    const data = await callClaude(rolePrompt(), [{role:"user", content:kickoff}]);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요. (이 앱은 claude.ai 안에서 작동합니다.)");
  }
  setBusy(false); msg.focus();
}

async function sendMessage(){
  const text=msg.value.trim();
  if(!text || state.busy) return;
  msg.value=""; autoSize();
  if(hasHangul(text)){ addMeTurn(text); return koreanFallback(text); }
  addMeTurn(text);
  state.convo.push({role:"user", text});
  questBump("talk");
  setBusy(true); showTyping();
  try{
    const msgs = state.convo.map(t=>({role:t.role, content:t.text}));
    const data = await callClaude(rolePrompt(), msgs);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("(연결 오류 — 다시 시도해 주세요.)");
  }
  setBusy(false);
}
function hasHangul(s){ return /[가-힣]/.test(s); }
async function koreanFallback(korean){
  const lastCoach = [...state.convo].reverse().find(t=>t.role==="assistant");
  setBusy(true); showTyping();
  const sys=[
    "The learner is practicing spoken English in this situation: "+scnDesc()+".",
    lastCoach ? 'The other person just said to them: "'+lastCoach.text+'".' : "",
    "The learner got stuck and typed in Korean what they want to say. Give the natural English they should say here, fitting this exact situation. Keep it short and natural — what a real person would actually say.",
    'Return ONLY JSON: {"en":"natural English they should say","note":"짧은 한국어 팁 또는 뉘앙스, 없으면 빈 문자열"}'
  ].join("\n");
  try{
    const data=await callClaude(sys, [{role:"user", content:korean}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFallbackCard(obj);
    if(lastCoach) addCoachTurn(lastCoach.text); // 한 단계 뒤로 — 같은 질문 다시
  }catch(e){ hideTyping(); }
  setBusy(false);
}
function renderFallbackCard(obj){
  const c=document.createElement("div"); c.className="card help";
  let html=`<h4>💡 막혔을 땐 이렇게 말해요</h4>`;
  html+=`<div class="ph"><span>${escapeHtml(obj.en||"")}</span><button data-say="${escapeAttr(obj.en||"")}">이걸로 답하기</button></div>`;
  if(obj.note) html+=`<div class="note">${escapeHtml(obj.note)}</div>`;
  html+=`<div class="note" style="margin-top:8px">👇 아래 질문에 이번엔 <b>영어로</b> 다시 답해보세요.</div>`;
  c.innerHTML=html;
  threadInner.appendChild(c);
  c.querySelectorAll("button[data-say]").forEach(b=>{
    b.onclick=()=>{ msg.value=b.getAttribute("data-say"); autoSize(); msg.focus(); refreshSend(); speak(b.getAttribute("data-say")); };
  });
  scrollDown();
}

/* ============ feedback ============ */
async function getFeedback(){
  if(state.busy) return;
  const mine = state.convo.filter(t=>t.role==="user").map(t=>t.text);
  if(mine.length===0){ flashHint("먼저 영어로 한 번 말해보세요!"); return; }
  setBusy(true); showTyping();
  const sys=[
"You are a warm, encouraging English speaking coach for a Korean learner.",
"Below are the learner's English utterances from a role-play conversation. Review them.",
"Return ONLY a JSON object, no markdown:",
'{"corrections":[{"original":"...","better":"...","why":"짧은 한국어 설명","ko":"better 문장의 한국어 뜻"}],"chunks":[{"en":"useful chunk","ko":"한국어 뜻"}],"encouragement":"구체적으로 잘한 점을 짚는 한 문장 한국어 격려"}',
"Only include corrections where the English had real errors or sounded unnatural — skip sentences that were already fine. Pick the 1 to 4 most useful. chunks = 1 to 3 reusable expressions worth memorizing from this context. Be kind and specific."
  ].join("\n");
  const userMsg = mine.map((m,i)=>`${i+1}. ${m}`).join("\n");
  try{
    const data=await callClaude(sys,[{role:"user", content:userMsg}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFeedbackCard(obj);
  }catch(e){ hideTyping(); flashHint("피드백 생성에 실패했어요. 다시 시도해 주세요."); }
  setBusy(false);
}
function renderFeedbackCard(obj){
  const c=document.createElement("div"); c.className="card fb";
  let html=`<h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b3771a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> 코치 피드백</h4>`;
  const corr=obj.corrections||[];
  if(corr.length===0){
    html+=`<div style="color:#1c7a5c;font-weight:600;font-size:14px">완벽해요 — 고칠 게 없어요! 👏</div>`;
  }else{
    corr.forEach((c2,i)=>{
      html+=`<div class="corr"><div class="o">${escapeHtml(c2.original||"")}</div><div class="b">→ ${escapeHtml(c2.better||"")}</div>`;
      if(c2.why) html+=`<div class="w">${escapeHtml(c2.why)}</div>`;
      html+=`<button class="resay" data-en="${escapeAttr(c2.better||"")}" data-ko="${escapeAttr(c2.ko||"")}" style="margin-top:8px;padding:9px 14px;border-radius:11px;background:linear-gradient(135deg,#1fd3a0,#13b488);color:#06231b;font-size:13px;font-weight:800">🎤 이렇게 다시 말해보기</button>`;
      html+=`</div>`;
    });
  }
  if(obj.encouragement) html+=`<div class="enc">🌱 <span>${escapeHtml(obj.encouragement)}</span></div>`;
  // enroll into review deck: corrections + chunks
  const enrolled=[];
  corr.forEach(c2=>{ if(c2 && c2.better && addReviewItem(c2.better, c2.ko, "correction", c2.original)) enrolled.push(c2.better); });
  (obj.chunks||[]).forEach(ch=>{ if(ch && ch.en && addReviewItem(ch.en, ch.ko, "chunk")) enrolled.push(ch.en); });
  if(enrolled.length){
    renderNotes(); saveNotes(); refreshRvBanner();
    html+=`<div class="chunks-added">📓 복습 노트에 ${enrolled.length}개 추가됨 — 며칠 뒤 복습으로 다시 나와요.</div>`;
  }
  c.innerHTML=html;
  threadInner.appendChild(c); scrollDown();
  c.querySelectorAll(".resay").forEach(b=>{
    b.onclick=()=>openDrill(b.getAttribute("data-en"), b.getAttribute("data-ko"));
  });
}

function lsIsDup(en){ if(!en) return false; const n=en.toLowerCase().replace(/[^a-z ]/g,"").trim(); return lsRecent.some(x=>x.toLowerCase().replace(/[^a-z ]/g,"").trim()===n); }

async function lsPrefetchNext(){

      if(it && it.en && !lsIsDup(it.en)){ lsPrefetch=it; break; }
    }
  }catch(e){}
  lsPrefetching=false;
}

let lsBoosterMode=false;
function listenSentenceSys(){
  const seed=Math.floor(Math.random()*100000);
  const prev = lsPrevReply ? `This is a continuing conversation. The other person just said: "${lsPrevReply}". Produce the NEXT natural spoken line that follows it.` : "Begin a fresh real-life spoken moment.";
  const booster = (lsBoosterMode && (state.lvl||1)>=5) ? "CRITICAL FOCUS — this is EAR TRAINING for connected speech. The sentence MUST be packed with real reductions/contractions/linking that trip up Korean learners: e.g. wanna, gonna, gotta, wudja(would you), didja(did you), gimme, lemme, kinda, 'I'll', 'you're', dropped/linked sounds. Make it sound exactly like fast casual native speech." : "";
  return [
"This is NOT an English lesson. This is LISTENING training for real-world spoken English. Optimize for how people ACTUALLY speak — contractions, reductions, connected speech, natural rhythm — not textbook grammar.",
kidMode()? ("Produce ONE short, simple spoken English sentence for a young CHILD about: "+KID_TOPICS[(seed)%KID_TOPICS.length]+".") : ("Produce ONE natural spoken English sentence for a Korean learner. Topic context: "+topicDesc()+"."),
booster,
prev,
kidMode()? kidRules() : levelHint(),
levelCap(),
"Concrete and fresh (variety seed "+seed+"). One sentence only.",
(lsRecent.length? "DO NOT repeat or closely paraphrase any of these already-used sentences (make something clearly different in meaning and words):\n- "+lsRecent.slice(-15).join("\n- ") : ""),
'Return ONLY JSON: {"en":"the spoken sentence","ko":"한국어 뜻"}'
  ].join("\n");
}
async function lsGenerate(){

  if(lsPrefetch && !lsIsDup(lsPrefetch.en)){
    lsItem=lsPrefetch; lsPrefetch=null; lsCount++; lsRecord(lsItem.en);
    renderListenPlay();
    lsPrefetchNext();   // 그 다음 문장 또 백그라운드 생성
    return;
  }

  $("#listenScroll").innerHTML=`<div class="lloading">첫 문장을 준비하는 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  try{
    let it=null;
    for(let try_=0; try_<3; try_++){

      if(it && it.en && !lsIsDup(it.en)) break;

    lsCount++; lsRecord(lsItem.en);

}

function lsSpeak(slow){

    const u=new SSU(lsItem.en||""); if(enVoice) u.voice=enVoice; u.lang="en-US";

    TTS.speak(u);
  };
  // 첫 발화 직전 무음 워밍업 — 엔진이 첫 단어 앞부분을 먹는 문제 방지

    ttsWarmed=true;
    try{ const w=new SSU(" "); w.volume=0; w.rate=1; TTS.speak(w); }catch(e){}
    setTimeout(doSpeak, 260);
  } else {
    setTimeout(doSpeak, 60);

}

function lsWordNorm(w){ return String(w||"").toLowerCase().replace(/[^a-z0-9']/g,"").replace(/'/g,""); }

function lsRenderSlots(){
  const box=$("#lsSlots"); if(!box) return;
  box.innerHTML=lsTargets.map((w,i)=> lsFilled[i]
    ? `<span class="dslot filled">${escapeHtml(w)}</span>`
    : `<span class="dslot blank">${"·".repeat(Math.max(2,lsWordNorm(w).length))}</span>`
  ).join(" ");
  const n=lsFilled.filter(Boolean).length, tot=lsTargets.length;
  const pr=$("#lsProg"); if(pr) pr.textContent = n>=tot ? "다 들었어요! 🎉 채점할게요" : `들린 단어 ${n} / ${tot} · 빈칸만 더 들어보세요`;
}
// 들린 텍스트에서 일치하는 단어를 (순서대로, 가장 왼쪽 빈칸부터) 채움 — 이미 채운 건 유지
function lsFillFromHeard(heardText){
  const heard=String(heardText||"").split(/\s+/).map(lsWordNorm).filter(Boolean);
  let added=0;
  heard.forEach(hw=>{
    for(let i=0;i<lsTargets.length;i++){
      if(!lsFilled[i] && lsWordNorm(lsTargets[i])===hw){ lsFilled[i]=true; added++; break; }
    }
  });
  lsRenderSlots();
  return added;
}

function lsAllCorrect(){
  const orig=(lsItem&&lsItem.en)||"";
  const want=normAns(orig).split(/\s+/).filter(Boolean);
  const got=new Set(normAns(lsAnswer).split(/\s+/).filter(Boolean));
  if(!want.length) return false;
  return want.every(w=>got.has(w));
}

function diffHighlight(correct, answer){
  const ans=new Set(normAns(answer).split(/\s+/).filter(Boolean));
  return (correct||"").split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const clean=normAns(tok);
    if(clean && !ans.has(clean)) return `<span style="color:#e0533f;font-weight:700;border-bottom:2px solid #e0533f">${escapeHtml(tok)}</span>`;
    return escapeHtml(tok);
  }).join("");
}

async function floodLoop(){
  if(!floodOn) return;
  $("#listenScroll").innerHTML=`<div class="lloading">다음 대화 준비 중…<div class="typing"><i></i><i></i><i></i></div></div>`;

  curPassage=p; floodCount++;

function renderFlood(p){
  const sp=p.speakers||{A:"A",B:"B"};

  }).join("");

function playFlood(p){
  return new Promise(res=>{
    const lines=p.lines||[];
    if(!lines.length || !TTS){ res(); return; }
    TTS.cancel();
    const rate=state.level==="초급"?0.9:state.level==="고급"?1.0:0.96;
    lines.forEach((ln,i)=>{
      const u=new SSU(ln.en||""); u.voice=(ln.speaker==="B"?voiceB:voiceA)||enVoice; u.lang="en-US"; u.rate=rate;
      if(i===lines.length-1) u.onend=()=>res();
      TTS.speak(u);
    });
    setTimeout(()=>{ if(floodOn===false) res(); }, 200);
  });
}

const DAY=86400000;
const INTERVALS=[0,1,3,7,16,35]; // days per box

function addReviewItem(en, ko, type, original){
  en=(en||"").trim(); if(!en) return false;
  if(state.notes.some(n=>n.en===en)) return false;
  state.notes.push({en, ko:(ko||"").trim(), type:type||"chunk", original:(original||"").trim(), box:0, due:Date.now(), reps:0, lapses:0});
  return true;
}
function normalizeDeck(){
  state.notes.forEach(n=>{
    if(n.box===undefined) n.box=0;
    if(n.due===undefined) n.due=Date.now();
    if(n.reps===undefined) n.reps=0;
    if(n.lapses===undefined) n.lapses=0;
    if(n.type===undefined) n.type="chunk";
  });
}
function dueCount(){ const t=Date.now(); return state.notes.filter(n=>(n.due||0)<=t).length; }
function refreshRvBanner(){
  const c=dueCount(), has=state.notes.length>0;
  $("#rvBanner").style.display = has?"flex":"none";
  $("#rvCount").textContent=c;

  $("#rvSpeed").disabled = state.notes.length===0;
  $("#rvStart").textContent = c===0?"다 했어요 ✓":"복습 시작";
}
function scheduleItem(n, ok){
  n.reps=(n.reps||0)+1;
  if(ok){ n.box=Math.min((n.box||0)+1, INTERVALS.length-1); }
  else { n.lapses=(n.lapses||0)+1; n.box=Math.max(0,(n.box||0)-2); }
  n.due = Date.now() + INTERVALS[n.box]*DAY;
}

/* ============================================================
   📝 WORD POWER — 빈칸 인출 엔진 (retrieval-first)

let wpQueue=[], wpPos=0, wpT0=0, wpStats={correct:0, total:0}, wpSeenWord={};
// 단어의 빈칸 문장들 만들기 (examples를 빈칸으로 변환 + blank 포함, 최대 4)
function wpBlanksFor(w){
  const out=[]; const word=w.word||"";
  const mkBlank=(en,ko)=>{
    // 문장에서 타깃 단어를 ____로
    const re=new RegExp("\\b"+word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(en)) return {en:en.replace(re,"[ ___ ]"), ko:ko||w.ko||"", answer:word};
    return null;

async function wpExpandWord(w){
  const key=srsKey(w.word); if(wpCtxCache[key]) return wpCtxCache[key];

    const o=parseJSON(extractText(d));
    const items=(o.items||[]).filter(x=>x&&x.en&&x.en.includes("[")&&x.answer).slice(0,6);

function wpInterleave(items){

  for(const g of groups){ for(let i=g.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [g[i],g[j]]=[g[j],g[i]]; } }
  const out=[]; let remaining=items.length; let last=null;
  while(remaining>0){
    // 남은 게 가장 많은 그룹 중, 직전과 다른 단어를 우선 선택
    groups.sort((a,b)=>b.length-a.length);
    let pick=groups.find(g=>g.length>0 && (!last || g[0].word.word!==last)) || groups.find(g=>g.length>0);

    out.push(pick.shift()); last=out[out.length-1].word.word; remaining--;

}

function voSituation(w){
  const ex=w.examples||[];
  const idx = voRound===1 ? 0 : (ex.length>1?1:0);
  const e = ex[idx] || ex[0] || {en:w.word, ko:w.ko};
  return {ko:e.ko||w.ko||"", model:e.en||w.word};
}

async function voSubmit(w, answer){
  const elapsed=Math.max(0.1,(Date.now()-voT0)/1000);
  const sit=w._sit||voSituation(w);
  $("#voStatus") && ($("#voStatus").textContent="채점 중…");
  const usedWord = answer && normAns(answer).includes(normAns(w.word).split(" ")[0]);
  let fb={used:usedWord, natural:sit.model, tip:""};
  if(answer){
    try{
      const sys=[
"A Korean learner is practicing spontaneous OUTPUT of the English word \""+w.word+"\" (meaning: "+(w.ko||"")+").",
"They were asked to say an English sentence USING this word for this situation (in Korean): \""+sit.ko+"\".",
"Judge their answer. Did they actually use the target word? Is it natural? Give the natural version they SHOULD say (it must use \""+w.word+"\"), and ONE short Korean coaching tip.",
'Return ONLY JSON: {"used":true or false,"natural":"natural English using the word","tip":"짧은 한국어 피드백"}'
      ].join("\n");
      const d=await callClaude(sys,[{role:"user",content:answer}], FAST_MODEL);
      const o=parseJSON(extractText(d)); fb={used:!!o.used, natural:o.natural||sit.model, tip:o.tip||""};
    }catch(e){}
  }
  // 인출속도 기록
  if(!voTimes[w.word]) voTimes[w.word]={};
  voTimes[w.word][voRound]=elapsed;
  try{ const arr=hGet("speakingroom:recall",[]); arr.push(Math.round(elapsed*10)/10); hSet("speakingroom:recall", arr.slice(-60)); }catch(e){}
  // 첫 등장(라운드1)에서 1회만 집계
  if(voRound===1){
    if(addReviewItem(w.word, w.ko, "chunk")){ renderNotes(); saveNotes(); refreshRvBanner(); }
    awardXP("vocab", answer? (fb.used?10:5) : 5, "단어 "+w.word, "vc:"+w.word); bumpCount("vocab"); questBump("vocab");
  } else if(fb.used){ awardXP("vocab",15,"다른 상황에서 또 ✅","vc2:"+w.word); }
  // 📚 SRS 기록 — 단어 + 모범 표현(청크) 둘 다, 상황 컨텍스트 태그와 함께

  renderVoResult(w, answer, elapsed, fb);
}

    }

// 콜백형 음성 입력 (큰 마이크용)
// 말 끝나면(침묵) 자동 종료 — 고정 타임아웃 대기 제거. 실패 시 maxMs 폴백.
// 🔔 녹음 시작 알림음 ("띵") + 통일된 자동 종료(침묵) 설정
let _ac=null;
function micBeep(){
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    if(_ac.state==="suspended") _ac.resume();
    const o=_ac.createOscillator(), g=_ac.createGain(), t=_ac.currentTime;
    o.type="sine"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1320,t+0.08);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
    o.connect(g); g.connect(_ac.destination); o.start(t); o.stop(t+0.3);
    if(navigator.vibrate) navigator.vibrate(30);
  }catch(e){}
}
// 모든 마이크 공통: 말 끝나면(침묵) 자동 종료. 통일 파라미터.
const VAD_OPTS={maxMs:12000, silenceMs:1000, minSpeechMs:300, thresh:0.02};
function attachVAD(stream, onStop, opts){
  opts=opts||{};
  const maxMs=opts.maxMs||8000, silenceMs=opts.silenceMs||1000, minSpeechMs=opts.minSpeechMs||250, thresh=opts.thresh||0.02;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    const ac=new AC(); const src=ac.createMediaStreamSource(stream);
    const an=ac.createAnalyser(); an.fftSize=512; src.connect(an);
    const buf=new Uint8Array(an.fftSize);
    const t0=Date.now(); let lastLoud=0, spoke=false, done=false;
    function fin(){ if(done)return; done=true; try{ac.close();}catch(e){} onStop(); }
    function tick(){
      if(done)return;
      an.getByteTimeDomainData(buf);
      let sum=0; for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum+=v*v; }
      const rms=Math.sqrt(sum/buf.length), now=Date.now();
      if(rms>thresh){ lastLoud=now; if(now-t0>minSpeechMs) spoke=true; }
      if(spoke && lastLoud && (now-lastLoud)>silenceMs){ return fin(); }
      if(now-t0>maxMs){ return fin(); }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    return ()=>{ if(!done){ done=true; try{ac.close();}catch(e){} } };
  }catch(e){
    const id=setTimeout(onStop, maxMs);
    return ()=>clearTimeout(id);
  }
}
async function micFillCb(cb){
  if(qzRecording){ return; }

/* ============ speech synthesis (TTS) ============ */
let enVoice=null, voiceA=null, voiceB=null, koVoice=null;
function pickVoice(){
  const vs=TTS.getVoices().filter(v=>/^en/i.test(v.lang));
  const kos=TTS.getVoices().filter(v=>/^ko/i.test(v.lang));
  koVoice = kos.find(v=>/Google|Yuna|Female|Heami/i.test(v.name)) || kos[0] || null;
  if(!vs.length) return;
  const us=vs.filter(v=>/en-US/i.test(v.lang));
  const pool = us.length>=2 ? us : vs;
  voiceA = pool.find(v=>/Google US English|Samantha|Aria|Jenny|Zira|Female/i.test(v.name)) || pool[0];
  voiceB = pool.find(v=>v!==voiceA && /Male|David|Mark|Daniel|Alex|Google UK English Male|Guy/i.test(v.name))
        || pool.find(v=>v!==voiceA) || voiceA;
  enVoice = voiceA;
}
if(TTS){
  pickVoice();
  TTS.onvoiceschanged=pickVoice;
}
// 한·영 혼합 문장을 자동으로 나눠 각각 한국어/영어 음성으로 읽기
function speakSmart(text){
  if(!TTS||!SSU||!text) return;
  TTS.cancel();
  const s=String(text); const segs=[]; let cur="", curKo=null;
  for(const ch of s){
    const ko=/[\uac00-\ud7a3]/.test(ch);
    const neutral=/[\s0-9.,!?~…·"'()\[\]%:;\-—’“”]/.test(ch);
    if(cur===""){ cur=ch; curKo=ko; }
    else if(neutral){ cur+=ch; }
    else if(ko===curKo){ cur+=ch; }
    else { segs.push([cur,curKo]); cur=ch; curKo=ko; }
  }
  if(cur) segs.push([cur,curKo]);
  let i=0;
  (function go(){
    if(i>=segs.length) return;
    const seg=segs[i][0], ko=segs[i][1]; i++;
    if(!seg.trim()){ go(); return; }
    const u=new SSU(seg);
    if(ko){ if(koVoice) u.voice=koVoice; u.lang="ko-KR"; u.rate=0.98; }
    else { if(enVoice) u.voice=enVoice; u.lang="en-US"; u.rate=(typeof levelRate==="function")?levelRate(false):0.97; }
    u.onend=()=>setTimeout(go,70);
    TTS.speak(u);
  })();
}
function speak(text){ speakSmart(text); }

/* ============ Azure STT — 회화 마이크 ============ */
let mediaRec=null, listening=false, audioChunks=[];
function initRec(){
  if(!navigator.mediaDevices){ micBtn.style.display="none"; return; }

function getBestMime(){
  const types=["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4","audio/aac"];
  return types.find(t=>MediaRecorder.isTypeSupported(t)) || "";
}
// 녹음 blob → WAV(PCM 16kHz mono). Azure가 제일 확실하게 받는 포맷.
function encodeWAV(samples, rate){
  const buf=new ArrayBuffer(44+samples.length*2), v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+samples.length*2,true); ws(8,"WAVE");
  ws(12,"fmt "); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,samples.length*2,true);
  let o=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2; }
  return buf;
}
// decodeAudioData를 프로미스/콜백 양쪽으로 시도 (일부 기기는 콜백만 지원)
function decodeAudioCompat(ac, arrayBuf){
  return new Promise((resolve,reject)=>{
    let done=false;
    try{
      const p=ac.decodeAudioData(arrayBuf.slice(0),
        (b)=>{ if(!done){done=true;resolve(b);} },
        (e)=>{ if(!done){done=true;reject(e||new Error("decode fail"));} });
      if(p && typeof p.then==="function"){
        p.then(b=>{ if(!done){done=true;resolve(b);} })
         .catch(e=>{ if(!done){done=true;reject(e);} });
      }
    }catch(e){ if(!done){done=true;reject(e);} }
  });
}
async function recordedToWav(blob){
  const arrayBuf=await blob.arrayBuffer();
  const AC=window.AudioContext||window.webkitAudioContext;
  const tmp=new AC();
  // 재생용으로 일시정지된 AudioContext 깨우기 (일부 안드로이드)
  if(tmp.state==="suspended"){ try{ await tmp.resume(); }catch(_){} }
  let decoded=null, lastErr=null;
  // 원본 + webm 재포장 두 가지 시도
  for(const ab of [arrayBuf, arrayBuf]){
    try{ decoded=await decodeAudioCompat(tmp, ab); break; }
    catch(e){ lastErr=e; }
  }
  if(!decoded){ tmp.close && tmp.close(); throw lastErr||new Error("decode fail"); }
  tmp.close && tmp.close();
  const rate=16000;
  const off=new OfflineAudioContext(1, Math.max(1,Math.ceil(decoded.duration*rate)), rate);
  const src=off.createBufferSource(); src.buffer=decoded; src.connect(off.destination); src.start(0);
  const rendered=await off.startRendering();
  return new Blob([encodeWAV(rendered.getChannelData(0), rate)], {type:"audio/wav"});
}
// WAV 변환 시도 → 실패하면 원본(webm/opus 등) 그대로 STT. Azure는 webm-opus도 받음.
async function sttRecognize(raw, actualMime){
  let body, ctype;
  try{ body=await recordedToWav(raw); ctype="audio/wav"; }
  catch(_){
    // 디코드 실패 기기 → 원본 컨테이너 그대로 전송
    body=raw;
    ctype = /webm/.test(actualMime) ? "audio/webm; codecs=opus"
          : /ogg/.test(actualMime)  ? "audio/ogg; codecs=opus"
          : /mp4|aac/.test(actualMime) ? "audio/mp4"
          : (actualMime||"audio/webm; codecs=opus");
  }
  return fetch(PROXY_URL+"/stt",{method:"POST",headers:{"Content-Type":ctype},body});
}

        window._lastPronounceRaw=txt;
        let data; try{ data=JSON.parse(txt); }catch(e){ data=null; }
        if(!res.ok){ const r=$("#drillResult"); if(r) r.innerHTML=`<div style="color:#e0533f;text-align:center;font-size:12.5px">채점 오류 ${res.status}: ${escapeHtml(txt.slice(0,80))}</div>`; }
        else renderDrillResult(data);
      }catch(e){
        const r=$("#drillResult"); if(r) r.innerHTML=`<div style="color:#e0533f;text-align:center;font-size:12.5px">오류: ${escapeHtml(String(e).slice(0,80))}</div>`;
      }
      if(btn){ btn.textContent="🎤 다시 말하기"; btn.disabled=false; }
    };
    micBeep(); drillMR.start(250); drillRecording=true;
    attachVAD(stream, ()=>{ if(drillRecording) stopDrillMic(); }, VAD_OPTS);
    const btn=$("#drillSpeak"); if(btn){ btn.textContent="⏹ 멈추기"; btn.style.background="#e0533f"; }
  }catch(e){
    const r=$("#drillResult"); if(r) r.innerHTML=`<div style="color:var(--muted);text-align:center">마이크 권한을 허용해 주세요.</div>`;
  }
}
function stopDrillMic(){ if(drillMR&&drillMR.state!=="inactive"){ drillMR.stop(); drillRecording=false; } }
function renderDrillResult(data){
  const r=$("#drillResult"); if(!r) return;
  const n=data?.NBest?.[0];
  // REST detailed 포맷은 점수를 NBest[0] 바로 위에 둠. (SDK는 .PronunciationAssessment 중첩)
  const pa = n && (n.PronunciationAssessment || (n.AccuracyScore!=null ? n : null));
  if(!pa){
    const st=data?.RecognitionStatus||"(상태없음)";
    const heard=data?.DisplayText||n?.Display||"";
    let msg;
    if(st==="Success"||heard){ msg=`인식은 됐는데 점수가 안 왔어요.<br>들린 말: "${escapeHtml(heard||"?")}"`; }
    else if(/NoMatch|Silence|InitialSilence/i.test(st)){ msg=`소리가 잘 안 잡혔어요 🔇<br>마이크 가까이서 또렷하게 다시 말해보세요.`; }
    else { msg=`상태: ${escapeHtml(st)}`; }
    const raw=(window._lastPronounceRaw||"").slice(0,700);
    r.innerHTML=`<div style="color:var(--muted);text-align:center;font-size:13px;line-height:1.6">${msg}</div>
      <details style="margin-top:12px"><summary style="font-size:12px;color:var(--muted);cursor:pointer">🔧 진단 정보 (개발용)</summary>
      <pre style="white-space:pre-wrap;word-break:break-all;font-size:10.5px;color:#8b948c;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;max-height:160px;overflow:auto">${escapeHtml(raw||"(빈 응답)")}</pre>
      <button id="copyRaw" style="margin-top:6px;width:100%;padding:8px;border-radius:8px;background:var(--mist);color:var(--text);border:1px solid var(--line);font-size:12px">📋 진단 정보 복사</button></details>`;
    const cr=$("#copyRaw"); if(cr) cr.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(window._lastPronounceRaw||""); cr.textContent="복사됨 ✓"; };
    return;
  }
  const acc=Math.round(pa.AccuracyScore||0);
  const flu=Math.round(pa.FluencyScore||0);
  const comp=Math.round(pa.CompletenessScore||0);
  // Azure가 PronScore(종합)를 주면 그걸 우선 사용
  const overall=Math.round(pa.PronScore!=null ? pa.PronScore : (acc*0.5+flu*0.3+comp*0.2));
  const color=overall>=80?"#1fd3a0":overall>=60?"#e6ad4a":"#e0533f";
  const emoji=overall>=80?"😊":overall>=60?"🙂":"😅";
  // 단어별 색상 (점수는 단어 객체 바로 위 또는 중첩 둘 다 대응)
  const words=(n?.Words||[]);
  const wordHtml=words.map(w=>{
    const ws=Math.round((w.PronunciationAssessment&&w.PronunciationAssessment.AccuracyScore!=null?w.PronunciationAssessment.AccuracyScore:w.AccuracyScore)||0);
    const wc=ws>=80?"#1fd3a0":ws>=60?"#e6ad4a":"#e0533f";
    return `<span style="color:${wc};font-family:var(--serif);font-size:17px;margin:0 3px" title="${ws}점">${escapeHtml(w.Word)}</span>`;
  }).join(" ");
  // XP 지급 — 80점 이상이면 확실히 보상
  const xp = overall>=80 ? Math.max(5, Math.round(overall/10)) : Math.round(overall/10);
  if(xp>0) awardXP("phonics",xp,"발음 드릴","drill:"+(drillTarget||""));
  r.innerHTML=`
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:48px;font-weight:900;color:${color}">${overall}</div>
      <div style="font-size:13px;color:var(--muted)">/ 100 ${emoji}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${acc>=80?"#1fd3a0":acc>=60?"#e6ad4a":"#e0533f"}">${acc}</div>
        <div style="font-size:11px;color:var(--muted)">정확도</div>
      </div>
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${flu>=80?"#1fd3a0":flu>=60?"#e6ad4a":"#e0533f"}">${flu}</div>
        <div style="font-size:11px;color:var(--muted)">유창성</div>
      </div>
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${comp>=80?"#1fd3a0":comp>=60?"#e6ad4a":"#e0533f"}">${comp}</div>
        <div style="font-size:11px;color:var(--muted)">완성도</div>
      </div>
    </div>
    ${wordHtml?`<div style="text-align:center;line-height:2;margin-bottom:8px">${wordHtml}</div>`:""}
    <div style="font-size:11.5px;color:var(--muted);text-align:center">초록=잘함 · 노랑=보통 · 빨강=연습 더 필요 · +${xp}XP 획득!</div>`;
}

function phShuf(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function speakRate(text,rate){ if(!TTS||!SSU)return; TTS.cancel(); const u=new SSU(text); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=rate||0.9; TTS.speak(u); }
function speakChain(parts){ if(!TTS||!SSU)return; TTS.cancel(); let i=0; (function go(){ if(i>=parts.length)return; const p=parts[i++]; const u=new SSU(p.t); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=p.rate||0.9; u.onend=()=>setTimeout(go,p.gap||120); TTS.speak(u); })(); }

// 아이용 발음 녹음 → 점수(0~100). 탭하면 녹음, 3.2초 후 자동 종료
let phMR=null, phRec=false;
function phMic(ref, btn, cb){
  if(phRec){ if(phMR&&phMR.state!=="inactive") phMR.stop(); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let chunks=[]; const mime=getBestMime();
    phMR=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    const am=phMR.mimeType||mime; phRec=true; if(btn) btn.classList.add("rec");
    phMR.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    phMR.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); phRec=false; if(btn) btn.classList.remove("rec");
      const raw=new Blob(chunks,{type:am}); if(raw.size<1000){ cb(null); return; }
      try{ const wav=await recordedToWav(raw);
        const b64=btoa(unescape(encodeURIComponent(ref)));
        const res=await fetch(PROXY_URL+"/pronounce",{method:"POST",headers:{"Content-Type":"audio/wav","X-Pronunciation-Text-B64":b64},body:wav});
        const t=await res.text(); let d; try{d=JSON.parse(t);}catch(e){d=null;}
        const n=d&&d.NBest&&d.NBest[0]; const pa=n&&(n.PronunciationAssessment||(n.AccuracyScore!=null?n:null));
        const heard=(d&&d.DisplayText)||(n&&(n.Display||n.Lexical))||"";
        const score=pa?Math.round(pa.PronScore!=null?pa.PronScore:(pa.AccuracyScore||0)):null;
        cb({score:score, heard:String(heard||"").replace(/[.?!,]/g,"").trim(), status:(d&&d.RecognitionStatus)||""});
      }catch(e){ cb(null); }
    };
    micBeep(); phMR.start(250);
    attachVAD(stream, ()=>{ if(phRec&&phMR&&phMR.state!=="inactive") phMR.stop(); }, VAD_OPTS);
  }).catch(e=>cb(null));
}

// 조회 정규화
function dictKey(s){ return String(s||"").toLowerCase().replace(/[^a-z' ]/g,"").trim(); }
// 영구 캐시 (AI 결과 저장 → 다음엔 로컬 속도)
function dictCacheGet(k){ try{ return (hGet("speakingroom:dictcache",{})||{})[k]||null; }catch(e){ return null; } }
function dictCacheSet(k,v){ try{ const c=hGet("speakingroom:dictcache",{})||{}; c[k]=v; const keys=Object.keys(c); if(keys.length>800){ delete c[keys[0]]; } hSet("speakingroom:dictcache",c); }catch(e){} }
// 청크 DB에서 찾기 (CORE_PHRASES 재활용)
function lookupChunk(text){
  const t=dictKey(text);
  const hit=CORE_PHRASES.find(p=>dictKey(p.phrase).replace(/\.\.\.|\?/g,"").trim()===t || dictKey(p.phrase).includes(t)&&t.length>4);
  if(hit) return {type:"chunk", term:hit.phrase, ko:hit.ko, kid:"여러 상황에서 쓰는 표현이에요", ex:(hit.examples||[]).slice(0,3).map(e=>e.en), rel:[], src:"local"};
  return null;
}
// 통합 조회: 로컬 단어 → 청크 → 캐시 → (없으면 null, AI는 호출부에서)
function lookupLocal(text){
  const k=dictKey(text);
  if(!k) return null;
  if(WORD_DB[k]){ const w=WORD_DB[k]; return {type:"word", term:k, ko:w.ko, kid:w.kid, ex:w.ex||[], rel:w.rel||[], src:"local"}; }
  const ch=lookupChunk(text); if(ch) return ch;
  const cached=dictCacheGet(k); if(cached) return Object.assign({src:"cache"}, cached);
  return null;
}

function tappableEn(text){
  if(!text) return "";
  const safe=escapeHtml(text);
  return safe.replace(/([A-Za-z][A-Za-z']*)/g, '<span class="tapw" onclick="dictShow(this,\'$1\')">$1</span>');
}

}

  }catch(e){}
}

      ${(d.rel&&d.rel.length)?`<div class="dict-sec">관련 표현</div><div class="dict-rel">${d.rel.map(r=>`<span class="dict-relchip" data-rel="${escapeAttr(r)}">${escapeHtml(r)}</span>`).join("")}</div>`:""}
      <div class="dict-src">${d.src==="local"?"📖 사전":d.src==="cache"?"📖 저장됨":d.src==="loading"?"⏳ 찾는 중…":"✨ AI"}</div>

  pop.querySelectorAll(".dict-ex").forEach(b=>{ b.onclick=()=>speakEn(b.dataset.say); });
  pop.querySelectorAll(".dict-relchip").forEach(b=>{ b.onclick=()=>dictShow(null,b.dataset.rel); });

// 출제 선택기: 연령/레벨/주제로 3~N개만 — 미능동 우선, 셔플
function pickPhrases(opts){
  opts=opts||{}; const age=opts.age||(typeof kidMode==="function"&&kidMode()?"kid":"adult");
  const lvl=opts.level||(typeof state!=="undefined"&&state.lvl)||3; const topic=opts.topic||null; const n=opts.n||20;
  let pool=CORE_PHRASES.filter(p=> age==="kid"? p.kid : p.adult );
  if(topic) pool=pool.filter(p=>p.tags.includes(topic));
  // 레벨: 현재 레벨 이하 위주(±0), 너무 적으면 전체로 완화
  let lv=pool.filter(p=>p.level<= (lvl<=3?1: lvl<=6?2:3));
  if(lv.length>=6) pool=lv;
  // 미능동(능동 어휘 아닌 것) 우선
  const notActive=pool.filter(p=>{ try{ return avProgressOf(p.examples[0].en).state<4; }catch(e){ return true; } });
  let ranked = notActive.length>=Math.min(6,n)? notActive.concat(pool.filter(p=>!notActive.includes(p))) : pool.slice();
  // 셔플
  for(let i=ranked.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [ranked[i],ranked[j]]=[ranked[j],ranked[i]]; }
  // 청크 → 스프린트 아이템(ko 프롬프트 / en 정답). 부족하면 같은 청크의 다른 예문으로 채움
  const items=[]; let gi=0;
  while(items.length<n && ranked.length){
    const p=ranked[gi%ranked.length]; gi++;
    const exIdx=Math.floor(gi/ranked.length)%p.examples.length;
    const ex=p.examples[exIdx]||p.examples[0];
    items.push({ko:ex.ko, en:ex.en, tag:(p.tags[0]||"daily"), pid:p.id, chunk:p.phrase, chunkKo:p.ko});
    if(gi>n*3) break;
  }
  return items.slice(0,n);
}

function spGrade(heard, it, elapsed){
  const h=spNorm(heard), target=spNorm(it.en);
  if(!h) return "miss";   // STT 아무것도 못 잡음 = 시도 실패(말 안 함/딴소리)
  const hw=h.split(" ").filter(Boolean), tw=target.split(" ").filter(Boolean);
  const tset=new Set(tw);

  const coverage = tw.length? overlap/tw.length : 0;   // 정답 단어 중 얼마나 말했나
  // 청크 키워드(맨 앞 1~2단어, 예: "could you", "i'm looking for")가 들어갔나
  const chunkKey=spNorm(it.chunk||"").replace(/\.\.\.|\?/g,"").trim();
  const chunkWords=chunkKey.split(" ").filter(Boolean).slice(0,3);
  const chunkHit = chunkWords.length? chunkWords.every(w=>h.includes(w)) : false;
  const exact = (h===target);
  if(coverage<0.34 && !chunkHit) return "miss";       // 의미 실패 / 딴소리
  if(exact || (coverage>=0.7 && chunkHit && elapsed<=4)) return "perfect";
  if(coverage>=0.5 || chunkHit) return "hit";
  return "miss";

"You generate rapid-fire speaking drills that ALL force the learner to use ONE specific English chunk.",
"The chunk: \""+p.phrase+"\" (Korean meaning: "+p.ko+").",
"Generate "+Math.max(need,6)+" NEW everyday situations. For EACH: a short KOREAN prompt + the natural English answer that MUST use the chunk \""+p.phrase+"\".",
"Vary the contexts widely: "+contexts+". Keep English short (max 9 words) and natural.",
"Do NOT repeat these existing ones: "+p.examples.map(e=>e.en).join(" / ")+".",

  ].join("\n");

    const d=await callClaude(sys,[{role:"user",content:"Generate now."}], FAST_MODEL);

let _artRAF=0;
function articPlay(L){
  const A=ARTIC(L);
  const path=document.getElementById("phTongue"); if(!path) return;
  const star=document.getElementById("phStar"), lipU=document.getElementById("phLipU"), lipL=document.getElementById("phLipL"), air=document.getElementById("phAir");
  const restX=ART_XR, restY=ART_REST, actX=A.xs, actY=A.ys;
  const lipAct = A.lips? LIP_ACT[A.lips] : null;
  const T_IN=380, T_HOLD=260, T_OUT=420, TOTAL=T_IN+T_HOLD+T_OUT;
  const ease=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  if(_artRAF) cancelAnimationFrame(_artRAF);
  const t0=performance.now();
  (function frame(now){
    const t=now-t0; let p;
    if(t<T_IN) p=ease(t/T_IN);
    else if(t<T_IN+T_HOLD) p=1;
    else if(t<TOTAL) p=1-ease((t-T_IN-T_HOLD)/T_OUT);
    else { path.setAttribute("d", artBt(restX,restY)); if(star)star.setAttribute("opacity","0"); if(air)air.setAttribute("opacity","0"); if(lipU)lipU.setAttribute("d",lipPath(LIP_REST_U)); if(lipL)lipL.setAttribute("d",lipPath(LIP_REST_L)); _artRAF=0; return; }
    path.setAttribute("d", artBt(artLerp(restX,actX,p), artLerp(restY,actY,p)));
    const contactNow = (t>=T_IN-60 && t<T_IN+T_HOLD);
    if(star && A.contact) star.setAttribute("opacity", contactNow?"1":"0");
    if(air) air.setAttribute("opacity", (t>=T_IN-60)? String(Math.max(0,1-(t-T_IN)/700)) : "0");
    if(lipU && lipAct) lipU.setAttribute("d", lipPath(artLerp(LIP_REST_U, lipAct.u, p)));
    if(lipL && lipAct) lipL.setAttribute("d", lipPath(artLerp(LIP_REST_L, lipAct.l, p)));
    _artRAF=requestAnimationFrame(frame);
  })(t0);
}
// 발음 소리 + 그림 동기화 (소리가 '시작될 때' 혀가 움직임)
function speakPhonics(it){
  const L=it.L;
  if(!TTS||!SSU){ articPlay(L); return; }
  TTS.cancel();
  const parts=[{t:it.snd,rate:0.8,gap:430},{t:it.snd,rate:0.8,gap:430},{t:it.word,rate:0.85,gap:0}];
  let i=0;
  (function go(){
    if(i>=parts.length) return;
    const p=parts[i++]; const u=new SSU(p.t); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=p.rate||0.85;
    u.onstart=()=>{ try{ articPlay(L); }catch(e){} };
    u.onend=()=>setTimeout(go, p.gap||300);
    TTS.speak(u);
  })();
}

function pronXP(s){ s=s||0; if(s>=90)return 15; if(s>=80)return 10; if(s>=70)return 7; if(s>=60)return 5; if(s>=50)return 3; return 1; }
let phAttempts=0;
// 점수 → 실제 숫자 + 인식된 발음 + 정직한 별 (목표와 다르면 낮은 점수)
function phScoreFx(res, st, target){
  if(!res || res.score==null){
    const heard=res&&res.heard;
    st.innerHTML = heard ? `<span style="color:#ef4444;font-weight:800">"${escapeHtml(heard)}"로 들렸어요 — 다시 해볼까? 🎤</span>`
                         : `<span style="color:#ef4444;font-weight:800">🔇 소리가 안 잡혔어요. 마이크 가까이서 또렷하게!</span>`;
    return;
  }
  let sc=res.score;
  const tgt=String(target||"").toLowerCase().replace(/[^a-z]/g,"");
  const heard=String(res.heard||"").toLowerCase();
  const heardWords=heard.replace(/[^a-z ]/g,"").split(/\s+/).filter(Boolean);
  const matched = !tgt || (heardWords.some(w=> w===tgt || (tgt.length>2 && (w.includes(tgt)||tgt.includes(w)))));
  // 틀린 말(다른 단어)은 통과 불가
  if(tgt && heardWords.length && !matched) sc=0;
  const PASS=90, BONUS=95;
  const pass = matched && sc>=PASS;
  let stars, msg, col, xp=0;
  if(pass && sc>=BONUS){ stars=3; msg="완벽해요! 가산점 +"; col="#10b981"; }
  else if(pass){ stars=2; msg="통과! 잘했어요"; col="#10b981"; }
  else if(tgt && !matched){ stars=0; msg="다른 소리가 났어요. 다시! 🎤"; col="#ef4444"; }
  else { stars=0; msg="조금 더! (90점 넘어야 통과) 🎤"; col="#f59e0b"; }
  // XP는 통과(90↑)했을 때만. 95↑ 가산점. 통과 못하면 0점·XP 없음.
  bestPronToday(sc);
  if(pass){
    xp = pronXP(sc);
    if(sc>=BONUS) xp += 8;                          // 가산점
    awardXP("phonics", xp, "발음 "+sc+"점", "ph:"+(tgt||"x"));
    if(firstHighPronToday()) awardXP("phonics",10,"오늘 첫 통과! 🌟");
    questBump("phonics");
    burstStars(sc>=BONUS?12:stars);
    const sb=$("#phonicsScroll").querySelector(".phstars"); if(sb) sb.textContent="⭐ "+phStars(stars);
  }
  phAttempts++; if(pass && phAttempts===3) awardXP("phonics",5,"3번 통과 보너스!");
  st.innerHTML=`<div style="font-size:24px;font-weight:900;color:${col}">${sc}점 <span style="font-size:16px">${pass?"⭐".repeat(stars):"💪"}</span>${xp?` <span style="font-size:14px;color:var(--muted)">+${xp}XP</span>`:""}</div>
    <div style="font-size:14px;color:#475569;font-weight:800;margin-top:3px">${msg}</div>
    ${res.heard?`<div style="font-size:12px;color:#94a3b8;margin-top:3px">들린 발음: "${escapeHtml(res.heard)}"</div>`:""}`;
}
function burstStars(n){
  const host=$("#phonics"); if(!host) return;
  for(let i=0;i<Math.max(3,n*3);i++){ const s=document.createElement("div"); s.textContent="⭐";
    s.style.cssText=`position:fixed;left:${40+Math.random()*20}%;top:55%;font-size:${18+Math.random()*16}px;z-index:200;pointer-events:none;transition:transform 1s ease-out,opacity 1s`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>{ s.style.transform=`translate(${(Math.random()-.5)*220}px,${-120-Math.random()*120}px) rotate(${(Math.random()-.5)*180}deg)`; s.style.opacity="0"; });
    setTimeout(()=>s.remove(),1050);
  }
}

/* ===== Active Vocabulary (4단계) + 오늘의 생존 표현 =====
   서로 다른 3개 상황에서 인출 성공 → STATE 4 (능동 어휘). 측정은 능동 어휘 수. */
function avKey(en){ return String(en||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim(); }
function avGet(){ return hGet("speakingroom:activevocab",{}); }
function avSave(o){ hSet("speakingroom:activevocab",o); }
function avSeen(en, ko){ const k=avKey(en); if(!k) return; const m=avGet(); if(!m[k]){ m[k]={en:en,ko:ko||"",ctx:[],state:1}; } else if(m[k].state<2){ m[k].state=2; } avSave(m); }
// 인출 성공 기록. situationKey가 새로우면 컨텍스트 추가. 3개 서로 다른 상황 → 능동(4). 반환: 방금 능동 승급이면 true
function avRetrieve(en, ko, situationKey){
  const k=avKey(en); if(!k) return false; const m=avGet();
  if(!m[k]) m[k]={en:en,ko:ko||"",ctx:[],state:1};
  const sk=String(situationKey||"").slice(0,40)||("s"+(m[k].ctx.length+1));
  const wasActive=m[k].state>=4;
  if(!m[k].ctx.includes(sk)) m[k].ctx.push(sk);
  if(m[k].ctx.length>=3) m[k].state=4; else if(m[k].state<3) m[k].state=3;
  if(ko && !m[k].ko) m[k].ko=ko;
  avSave(m);
  return (!wasActive && m[k].state>=4);
}
function avActiveCount(){ const m=avGet(); return Object.values(m).filter(x=>x.state>=4).length; }
function avProgressOf(en){ const m=avGet(); const x=m[avKey(en)]; return x?{state:x.state,ctx:x.ctx.length}:{state:0,ctx:0}; }

function questBump(cat){
  const {goals,bonus}=questDefs(); if(goals[cat]==null){ return; }
  const q=questGet();
  q.c[cat]=Math.min(goals[cat], (q.c[cat]||0)+1);
  const allDone=Object.keys(goals).every(k=>(q.c[k]||0)>=goals[k]);
  if(allDone && !q.rewarded){ q.rewarded=true; hSet("speakingroom:quest",q); addXP(bonus,"일일 퀘스트 완료! 🏆"); }

// 레벨 커브: 1-5=100, 6-10=150, 11-20=200, 21-40=250, 41+=300 (≈하루 1레벨)
function lvlNeed(L){ if(L<=5) return 100; if(L<=10) return 150; if(L<=20) return 200; if(L<=40) return 250; return 300; }
function levelInfo(xp){ let L=1, rem=xp||0; while(rem>=lvlNeed(L) && L<999){ rem-=lvlNeed(L); L++; } return {level:L, inLevel:rem, need:lvlNeed(L)}; }
function getProf(){ return hGet("speakingroom:prof",{xp:0,vocab:0,block:0,talk:0,listen:0}); }
function bumpCount(type){ const p=getProf(); if(p[type]!=null){ p[type]+=1; hSet("speakingroom:prof",p); } }
function nextReward(level){ return REWARDS.find(r=>r.lv>level) || null; }

const CHEST_TABLE=[

    {emo:"✨",t:"+20 XP",xp:20},{emo:"✨",t:"+30 XP",xp:30},{emo:"🌟",t:"+50 XP",xp:50}]},

];
function chestRoll(){ const tot=CHEST_TABLE.reduce((s,c)=>s+c.w,0); let x=Math.random()*tot;
  for(const c of CHEST_TABLE){ if(x<c.w) return c; x-=c.w; } return CHEST_TABLE[0]; }
function chestQueueGet(){ return hGet("speakingroom:chests",{pending:0,opened:[]}); }
function grantChest(){ const q=chestQueueGet(); q.pending=(q.pending||0)+1; hSet("speakingroom:chests",q); }
function openChestFlow(){
  const q=chestQueueGet(); if(!q.pending||q.pending<1){ return; }
  const ov=$("#chestOverlay"); if(!ov) return;
  const tier=chestRoll(); const prize=tier.prizes[(Math.random()*tier.prizes.length)|0];
  ov.innerHTML=`<div class="chest-card">
    <div id="chestBox" class="chest-emo">${tier.emo}</div>
    <div class="chest-hint" id="chestHint">탭해서 상자 열기! 🎉</div>
    <div class="chest-reveal" id="chestReveal">
      <div class="rarity-tag ${tier.cls}">${tier.tag}</div>
      <div class="chest-prize-emo">${prize.emo}</div>
      <div class="chest-prize-tx">${escapeHtml(prize.t)}</div>
      <div class="chest-prize-sub">${prize.xp?"보너스 XP를 받았어요!":"부모님께 보여주고 보상을 받으세요 🎁"}</div>
      <button class="chest-ok" id="chestOk">좋아!</button>
    </div>
  </div>`;
  ov.classList.add("show");
  const box=$("#chestBox"), hint=$("#chestHint"), reveal=$("#chestReveal");
  let opened=false;
  const doOpen=()=>{ if(opened) return; opened=true;
    box.classList.add("opening");
    try{ if(navigator.vibrate) navigator.vibrate([0,30,40,60]); }catch(e){}
    if(tier.r==="legendary"||tier.r==="epic"){ chestConfetti(tier.r); }
    setTimeout(()=>{ hint.style.display="none"; reveal.classList.add("show");
      // 기록 + XP 지급(상자 XP는 캡 무관 — 희소 보상)
      const q2=chestQueueGet(); q2.pending=Math.max(0,(q2.pending||1)-1);
      q2.opened=(q2.opened||[]); q2.opened.push({r:tier.r,t:prize.t,d:DAYN()}); q2.opened=q2.opened.slice(-30);
      hSet("speakingroom:chests",q2);
      if(prize.xp){ addXP(prize.xp,"보물상자 "+tier.tag); }
    }, 480);
  };
  box.onclick=doOpen;
  $("#chestOverlay").onclick=(e)=>{ if(e.target===ov && opened){ ov.classList.remove("show"); } };
  // delegate ok button after reveal
  ov.addEventListener("click",(e)=>{ if(e.target&&e.target.id==="chestOk"){ ov.classList.remove("show");
    const q3=chestQueueGet(); if(q3.pending>0) setTimeout(openChestFlow,300); else renderHome(); } });
}
function chestConfetti(rarity){
  const colors = rarity==="legendary"? ["#ffd17a","#ffb454","#ff8a3d","#fff"] : ["#c0aaff","#9b98ec","#7bb0ff","#fff"];
  for(let i=0;i<70;i++){ const c=document.createElement("div"); c.className="confetti";

    c.style.animationDuration=(1.5+Math.random()*1.5)+"s"; c.style.zIndex="220";

// ===== 안티파밍: 일일 소프트 캡 250 XP(초과분 50% 감소) + 동일 항목 반복 감쇠 =====
const SOFT_CAP=250;
function xpDayGet(){ let d=hGet("speakingroom:xpday",null); const today=DAYN(); if(!d||d.date!==today){ d={date:today,cat:{},item:{},total:0}; hSet("speakingroom:xpday",d); } if(!d.cat)d.cat={}; if(!d.item)d.item={}; if(d.total==null)d.total=0; return d; }
function awardXP(cat, base, label, itemKey){
  base=Math.round(base||0); if(base<=0) return 0;
  const d=xpDayGet();
  // 동일 항목 반복 감쇠
  if(itemKey){ const n=(d.item[itemKey]||0)+1; d.item[itemKey]=n; if(n>=7) base=Math.round(base*0.2); else if(n>=4) base=Math.round(base*0.5); }
  // 일일 소프트 캡: 250 넘으면 이후 획득 50%
  if((d.total||0)>=SOFT_CAP) base=Math.round(base*0.5);
  if(base<1) base=1;
  d.total=(d.total||0)+base; d.cat[cat]=(d.cat[cat]||0)+base;
  hSet("speakingroom:xpday",d);
  addXP(base,label);
  return base;
}
function todayXP(){ try{ return xpDayGet().total||0; }catch(e){ return 0; } }
// 오늘 최고 발음 점수
function bestPronToday(score){ let d=hGet("speakingroom:bestpron",{date:0,score:0}); const today=DAYN(); if(d.date!==today) d={date:today,score:0}; if(score!=null && score>d.score){ d.score=score; hSet("speakingroom:bestpron",d); } return d.score; }
function firstHighPronToday(){ let d=hGet("speakingroom:hipron",{date:0,done:false}); const today=DAYN(); if(d.date!==today) d={date:today,done:false}; if(!d.done){ d.done=true; hSet("speakingroom:hipron",d); return true; } return false; }

function addXP(amount,label){
  amount=Math.round(amount||0); if(amount<=0) return;
  const p=getProf(); const before=levelInfo(p.xp).level;
  p.xp=(p.xp||0)+amount; hSet("speakingroom:prof",p);
  const after=levelInfo(p.xp).level;
  xpToast(amount,label, after>before?after:0);
  if(after>before){
    try{ levelUpCelebrate(after); }catch(e){}
    // 🎁 20레벨마다 보물상자
    let chests=0; for(let L=before+1; L<=after; L++){ if(L%20===0) chests++; }
    if(chests>0){ for(let i=0;i<chests;i++) grantChest(); setTimeout(()=>{ try{ openChestFlow(); }catch(e){} }, 2700); }
  }
  try{ checkBadges(); }catch(e){}
  renderHome();
}
function xpToast(amount,label,lvUp){
  const t=$("#xpToast"); if(!t) return;
  t.innerHTML=`<span class="xv">+${amount} XP</span>${label?" · "+label:""}${lvUp?`<span class="lvup">🎉 레벨 ${lvUp} 달성!</span>`:""}`;
  t.classList.add("show"); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove("show"), lvUp?3400:2100);
}

    </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(()=>ov.classList.add("show"));

async function checkForUpdate(){
  try{
    const res=await fetch("index.html?cb="+Date.now(), {cache:"no-store"});
    if(!res.ok) return;
    const txt=await res.text();
    const m=txt.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if(!m) return;
    const latest=m[1];
    if(latest && latest!==APP_VERSION){
      // 같은 latest로 이미 한 번 새로고침했는데도 옛 버전이면 → 무한루프 대신 수동 버튼
      let tried=null; try{ tried=sessionStorage.getItem("sr_upd"); }catch(e){}

        b.textContent="🔄 새 버전("+latest+") 적용하기";
        b.style.cssText="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--jade);color:#06231b;font-weight:900;padding:13px 20px;border-radius:999px;z-index:99999;font-size:14px;border:none;box-shadow:0 10px 28px -8px rgba(0,0,0,.6)";
        b.onclick=forceUpdate; document.body.appendChild(b);
        return;
      }
      try{ sessionStorage.setItem("sr_upd", latest); }catch(e){}
      const t=document.createElement("div");
      t.textContent="새 버전 적용 중… ("+latest+")";
      t.style.cssText="position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--jade);color:#06231b;font-weight:800;padding:10px 18px;border-radius:999px;z-index:99999;font-size:13px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5)";
      document.body.appendChild(t);
      await clearAllCaches();
      setTimeout(()=>{ location.replace(location.pathname+"?v="+encodeURIComponent(latest)+"_"+Date.now()); }, 700);
    } else {
      try{ sessionStorage.removeItem("sr_upd"); }catch(e){}  // 최신 도달 — 플래그 정리
    }
  }catch(e){}
}

  if(!state.notes.length) return;
  const txt=state.notes.map(n=>n.en+(n.ko?"  — "+n.ko:"")).join("\n");
  navigator.clipboard && navigator.clipboard.writeText(txt);
  $("#copyNotes").textContent="복사됨 ✓"; setTimeout(()=>$("#copyNotes").textContent="전체 복사",1400);
};

// mobile notes drawer
$("#notesToggle").onclick=()=>{ $("#notes").classList.add("open"); $("#scrim").classList.add("show"); };
$("#scrim").onclick=()=>{ $("#notes").classList.remove("open"); $("#scrim").classList.remove("show"); };

// modal + TTS unlock (native dialogs blocked in webview; iOS needs gesture to start speech)
document.getElementById("modalOk").onclick=()=>{ if(_modalOnOk) _modalOnOk(); };
document.getElementById("modalCancel").onclick=closeModal;
document.getElementById("modalScrim").onclick=(e)=>{ if(e.target.id==="modalScrim") closeModal(); };
document.addEventListener("pointerdown", unlockTTS, {once:true});
document.addEventListener("touchstart", unlockTTS, {once:true});

autoSize();
</script>
</body>
</html>
