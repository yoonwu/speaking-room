.eng-ar{position:relative;z-index:1;font-size:20px;color:#fff;font-weight:900;width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:rgba(255,255,255,.20);box-shadow:inset 0 1px 0 rgba(255,255,255,.3)}
/* ===== 🗺️ 월드: 각 카드 = 하나의 세계 속 장소(다크 네온) ===== */
.eng{min-height:74px}
.worldlabel{font-size:12.5px;font-weight:800;color:var(--ink-soft);letter-spacing:.01em;margin:2px 2px 8px;opacity:.92}
/* 2열 장소 그리드 — 카드를 세로 타일로 */
.engrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:11px}
.engrid .eng{flex-direction:column;align-items:flex-start;gap:9px;min-height:0;padding:14px 14px;margin-bottom:0}
.engrid .eng-emo{width:46px;height:46px;font-size:25px}
.engrid .eng-tx b{font-size:16px}
.engrid .eng-tx i{font-size:10.5px;line-height:1.3;margin-top:2px}
.engrid .eng-ar{display:none}
.eng-emo{font-size:30px;background:rgba(0,0,0,.28)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 16px -2px var(--glow,rgba(255,255,255,.4))}
/* 🎧 리스닝 동굴 — 깊고 푸른 동굴 */
.eng-in{--glow:rgba(91,180,255,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-cave.png') center/cover no-repeat,
  radial-gradient(80% 120% at 12% 0%,rgba(99,200,255,.42),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(40,80,180,.55),transparent 60%),
  linear-gradient(160deg,#143a5e,#0c1830 78%);
  box-shadow:0 16px 36px -16px rgba(60,140,255,.65),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.6)}
/* ⚔️ 스피킹 훈련장 — 비취빛 도장 */
.eng-out{--glow:rgba(31,230,170,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-dojo.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(60,240,190,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(8,110,84,.55),transparent 60%),
  linear-gradient(160deg,#10493a,#0a1f1a 78%);
  box-shadow:0 16px 36px -16px rgba(20,200,150,.6),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🌎 모험 월드맵 — 황혼의 대륙 */
.eng-real{--glow:rgba(255,180,90,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-worldmap.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(255,200,110,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(190,70,30,.55),transparent 60%),
  linear-gradient(160deg,#5e3318,#1f1410 80%);
  box-shadow:0 16px 36px -16px rgba(245,150,60,.6),inset 0 1px 0 rgba(255,255,255,.14),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* ⚡ 스피드런 — 번개 투기장 */
#engSprint{--glow:rgba(255,200,80,.6);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-arena.png') center/cover no-repeat,
  radial-gradient(70% 120% at 8% 0%,rgba(255,210,90,.42),transparent 52%),
  radial-gradient(80% 130% at 100% 120%,rgba(150,80,255,.5),transparent 58%),
  linear-gradient(160deg,#3a2a10,#1a1226 82%);
  box-shadow:0 18px 40px -16px rgba(255,150,60,.7),inset 0 1px 0 rgba(255,255,255,.16),inset 0 -30px 44px -20px rgba(0,0,0,.55)}
#engSprint .eng-emo{animation:boltpulse 1.8s ease-in-out infinite}
@keyframes boltpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12) rotate(-4deg)}}
/* 💬 단어 강화 — 청록 보석 동굴 */
#vocabCard{--glow:rgba(255,133,104,.55);background:
  radial-gradient(80% 120% at 14% 0%,rgba(60,235,185,.34),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(20,120,150,.5),transparent 60%),
  linear-gradient(160deg,#10433f,#0a1c20 80%);
  box-shadow:0 16px 36px -16px rgba(25,200,165,.55),inset 0 1px 0 rgba(255,255,255,.13),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🎧 연음 부스터 — 보랏빛 음파 */
#boosterCard{--glow:rgba(150,130,255,.55);background:
  radial-gradient(80% 120% at 14% 0%,rgba(160,150,255,.34),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(90,60,180,.5),transparent 60%),
  linear-gradient(160deg,#2e2a55,#15122a 80%);
  box-shadow:0 16px 36px -16px rgba(120,100,240,.55),inset 0 1px 0 rgba(255,255,255,.13),inset 0 -30px 40px -20px rgba(0,0,0,.55)}
/* 🏰 사운드 아카데미 (kidCard) — 따뜻한 성 */
#kidCard{--glow:rgba(255,200,100,.55);background:
  linear-gradient(100deg,rgba(8,10,14,.80),rgba(8,10,14,.32) 58%,rgba(8,10,14,.12)),url('scene-castle.png') center/cover no-repeat,
  radial-gradient(80% 120% at 14% 0%,rgba(255,215,130,.40),transparent 55%),
  radial-gradient(90% 130% at 100% 120%,rgba(150,100,40,.5),transparent 60%),
  linear-gradient(160deg,#4a3a1a,#1c1610 80%)!important;
  border:1px solid rgba(255,200,110,.4)!important;box-shadow:0 14px 32px -16px rgba(255,180,80,.6),inset 0 1px 0 rgba(255,255,255,.14)!important}
#kidCard .ke{background:rgba(0,0,0,.28);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 16px -2px rgba(255,200,100,.5)}
/* ✨ 아이 모드: 더 밝고 통통한 월드 */
.kidworld .eng-in{background:radial-gradient(80% 120% at 14% 0%,rgba(140,225,255,.7),transparent 58%),linear-gradient(160deg,#2f8fd6,#1f5fae 82%)}
.kidworld .eng-out{background:radial-gradient(80% 120% at 14% 0%,rgba(120,255,210,.7),transparent 58%),linear-gradient(160deg,#1fc98e,#10936a 82%)}
.kidworld .eng-real{background:radial-gradient(80% 120% at 14% 0%,rgba(255,220,140,.75),transparent 58%),linear-gradient(160deg,#ff9e4d,#ef6d2a 82%)}
.kidworld #engSprint{background:radial-gradient(70% 120% at 10% 0%,rgba(255,225,120,.8),transparent 55%),linear-gradient(160deg,#ffb454,#ff7a45 60%,#b06cff 100%)}
.kidworld #kidCard{background:radial-gradient(80% 120% at 14% 0%,rgba(255,225,150,.8),transparent 58%),linear-gradient(160deg,#ffc24d,#f0982e 82%)!important}
.kidworld .eng-tx i,.kidworld #kidCard .kt i{color:rgba(255,255,255,.96)}
.kidworld .worldlabel{color:#ffd98a}
/* progress bar shimmer */
.rwbar i,.rwbar2 i{position:relative;overflow:hidden}
.rwbar i::after,.hero-reward .rwbar i::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:translateX(-100%);animation:barsweep 2.6s ease-in-out infinite}
@keyframes barsweep{0%{transform:translateX(-100%)}55%,100%{transform:translateX(220%)}}
/* ===== 🎨 하단 통일: 월드와 같은 깊이·광택·글로우 ===== */
.seclabel{font-size:12.5px;font-weight:800;color:var(--ink-soft);letter-spacing:.01em;margin:2px 2px 10px;opacity:.92}
/* 이어서 연습하기 — 재개 카드 */
.continue{position:relative;overflow:hidden;background:linear-gradient(160deg,#1d2420,#14191600)!important;background-color:#161c19!important;border:1px solid rgba(255,133,104,.28)!important;border-radius:18px!important;box-shadow:0 12px 28px -18px rgba(255,133,104,.5),inset 0 1px 0 rgba(255,255,255,.07)!important}
.continue::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 40%);pointer-events:none}
.continue:active{transform:scale(.98)}
.cont-emo{background:rgba(255,133,104,.16)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 0 14px -2px rgba(255,133,104,.5)}
.cont-t{font-weight:900!important;color:#fff!important}
/* 추가 연습 — 사이드 퀘스트 카드 */
.sidequest{position:relative;overflow:hidden;background:linear-gradient(160deg,#1b211e,#13181500)!important;background-color:#161b18!important;border:1px solid rgba(255,255,255,.10)!important;border-radius:18px!important;box-shadow:0 12px 26px -18px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.06)!important;transition:transform .12s}
.sidequest::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 42%);pointer-events:none}
.sidequest:active{transform:scale(.96)}
.sq-ico{width:42px;height:42px;display:grid;place-items:center;border-radius:13px;font-size:20px;background:rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.16),0 0 14px -3px var(--sqg,rgba(255,255,255,.4))}
.sq-t{font-size:14px;font-weight:900;color:#fff;margin-top:9px}
.sq-d{font-size:11px;color:var(--muted);margin-top:2px}
/* 다시 만날 표현 — 복습 카드 (깊이+글로우 통일) */
.rvbanner{position:relative;overflow:hidden;background:radial-gradient(90% 130% at 0% 0%,rgba(255,133,104,.22),transparent 58%),linear-gradient(160deg,#143a30,#0c1c17 82%)!important;border:1px solid rgba(255,133,104,.32)!important;border-radius:18px!important;box-shadow:0 12px 28px -18px rgba(255,133,104,.55),inset 0 1px 0 rgba(255,255,255,.07)!important}
.rvbanner::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07),transparent 40%);pointer-events:none}
/* 퀘스트/지표/난이도 — 같은 인셋 광택 */
#questBox>div,#acqStats>div,#dailyCard>div{box-shadow:0 10px 24px -18px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06)!important}
.difcard{position:relative;overflow:hidden;background:linear-gradient(160deg,#1b211e,#14191600)!important;background-color:#161b18!important;border:1px solid rgba(255,255,255,.10)!important;box-shadow:0 10px 24px -18px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06)!important}
/* 🗣️ 혀 위치 그림 */
.tongue-wrap{margin:10px auto 4px;max-width:260px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px 10px 10px}
.tongue-badge{font-size:10.5px;font-weight:800;color:#FF8568;text-align:center;margin-bottom:6px;letter-spacing:.02em}
.art-replay{display:block;margin:10px auto 4px;padding:9px 18px;border-radius:999px;border:none;background:linear-gradient(135deg,#FF8568,#F0664A);color:#ffffff;font-weight:900;font-size:14px;box-shadow:0 8px 20px -8px rgba(255,133,104,.6);cursor:pointer}
.art-replay:active{transform:scale(.96)}
.art-steps{margin:12px auto 2px;max-width:300px;display:flex;flex-direction:column;gap:7px}
.art-step{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:10px 12px;font-size:15px;font-weight:800;color:var(--text,#fff);line-height:1.35}
.art-num{flex:none;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#ffb454,#ff7a45);color:#3a1a00;font-size:13px;font-weight:900;display:grid;place-items:center;box-shadow:0 2px 6px -1px rgba(255,140,60,.6)}
.dict-slots{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;align-items:center;padding:16px 14px;background:var(--mist);border:1px solid var(--line);border-radius:14px;min-height:56px}
.dslot{font-size:20px;font-weight:800;letter-spacing:.01em;transition:.18s}
.dslot.filled{color:var(--jade);animation:dslotpop .35s cubic-bezier(.18,1.5,.4,1)}
.dslot.blank{color:#9aa6b2;letter-spacing:4px;border-bottom:2.5px solid #9aa6b2;padding:0 3px 1px;opacity:.65}
@keyframes dslotpop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.tongue-hint{font-size:13.5px;font-weight:800;color:var(--text,#fff);text-align:center;margin-top:6px;line-height:1.4}
.tongue-legend{font-size:10.5px;color:var(--muted,#9aa);text-align:center;margin-top:4px}

/* ============================================================
   ☀️ B 테마 — 복숭아 소르베 (따뜻한 라이트 오버라이드)
   ============================================================ */
body{background:var(--paper)!important;color:var(--text)}
.scn::-webkit-scrollbar-thumb{background:rgba(160,95,60,.18)!important}
#catScrollBox,.catScroll{background:#FFF4ED!important}

/* — HERO — */
.hero{background:linear-gradient(155deg,#FFD9C7,#FFEADF)!important;border:1px solid #FFCDB8!important;box-shadow:0 16px 34px -20px rgba(240,102,74,.45)!important}
.hero::after{display:none!important}
.hero-hello{color:#9C8378!important}
.hero-name{color:#3A2D27!important}
.ring-lv b{color:#3A2D27!important;text-shadow:none!important}
.ring-lv span{color:#F0664A!important}
.ring-bg{stroke:rgba(120,70,45,.13)!important}
.hchip{background:rgba(255,255,255,.74)!important;border:1px solid #FAD9C9!important;color:#5A463C!important}
.hchip.flame{background:#FFE3CF!important;border-color:#FFD0A8!important;color:#E07B23!important}
.hchip.gem{background:#FFE0D2!important;border-color:#FFC9B5!important;color:#E2674A!important}
.hero-reward{background:rgba(255,255,255,.62)!important;border:1px solid rgba(255,255,255,.7)!important}
.hero-reward .rwtop{color:#A6968C!important}
.hero-reward .rwname{color:#3A2D27!important}
.hero-reward .rwbar{background:#FFD0BD!important}
.hero-reward .rwgo{color:#F0664A!important}

/* — HOME 모험 타일 (B 시안: 하얀 카드 + 색 칩) — */
.eng,.engrid .eng{background:#FFF7F0!important;border:1px solid #F6D8C8!important;box-shadow:0 8px 18px -12px rgba(214,120,70,.30)!important}
.eng::after{display:none!important}
.eng::before{display:none!important}
.eng-emo{background:#FFE0D2!important;box-shadow:none!important}
.eng-tx b{color:#3A2D27!important;text-shadow:none!important}
.eng-tx i{color:#B0958A!important}
.eng-ar{background:#FFE0D2!important;color:#F0664A!important;box-shadow:none!important}
#engIn .eng-emo,#vocabCard .eng-emo{background:#FFE0D2!important}
#engOut .eng-emo{background:#FFD2C0!important}
#engReal .eng-emo,#boosterCard .eng-emo{background:#DCF1E8!important}
#engSprint .eng-emo{background:#FFEBC9!important}
#chunkCard .eng-emo{background:#EAE2FB!important}
#ageToggle{display:none!important}
.worldlabel,.seclabel{color:#8A6F62!important;opacity:1!important}
.kidworld .eng-tx i,.kidworld #kidCard .kt i{color:#B0958A!important}
.kidworld .worldlabel{color:#C77F26!important}

/* — kidCard (사운드 아카데미) — */
#kidCard{background:#FFF7F0!important;border:1px solid #F6D8C8!important;box-shadow:0 8px 18px -12px rgba(214,120,70,.30)!important}
#kidCard .ke{background:#FFEBC9!important;box-shadow:none!important}
#kidCard .kt b{color:#3A2D27!important}
#kidCard .kt i{color:#B0958A!important}
#kidCard .ka{color:#F0664A!important}

/* — MISSION — */
.mission{background:linear-gradient(155deg,#FFD3C2,#FFE6DA)!important;border:1px solid #FFC6B2!important}
.mission-title{color:#3A2D27!important}
.mission-tag{background:#FFF7F0!important;color:#F0664A!important}
.mission-meta{color:#9C8378!important}
.mission-btn{color:#fff!important}

/* — continue / sidequest / rvbanner / difcard — */
.continue{background:#FFF7F0!important;background-color:#FFF7F0!important;border:1px solid #F6D8C8!important;box-shadow:0 8px 18px -12px rgba(214,120,70,.3)!important}
.continue::before{display:none!important}
.cont-t{color:#3A2D27!important}
.cont-d{color:#B0958A!important}

/* — 단어/스피킹 화면: 빈 공간 줄이고 글씨 키우기 — */

.mbtop{padding:32px 24px 28px!important}
.mbko{font-size:27px!important;line-height:1.5!important}
.mben{font-size:28px!important}
.mbstatus{font-size:19px!important;margin:18px 0!important}

.sh-line{font-size:26px!important;line-height:1.45!important}
.sh-ko{font-size:15px!important}

/* — 난이도 슬라이더 (따뜻하게) — */
#lvlRange{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;background:#FFD0BD;outline:none;margin:4px 0}
#lvlRange::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#FF8568;border:3px solid #fff;box-shadow:0 3px 8px -1px rgba(240,102,74,.55);cursor:pointer}
#lvlRange::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#FF8568;border:3px solid #fff;box-shadow:0 3px 8px -1px rgba(240,102,74,.55);cursor:pointer}
#lvlRange::-moz-range-track{height:8px;border-radius:99px;background:#FFD0BD}

.help-q{background:#FFE0D2!important;border:1px solid #FFC9B5!important;color:#E2674A!important}

/* — generic: white text that sat on dark cards — */
.mb-en .blankbox{background:#FFE2D5!important}
/* 📝 Word Power 문제 화면 — 풀스크린 3단 (말해보카 스타일) */
.wp-stage{flex:1;display:flex;flex-direction:column;min-height:0;padding:4px 0}
.wp-q-tab{align-self:center;font-size:13px;font-weight:800;color:var(--jade);background:var(--mist);border:1px solid var(--line);border-radius:99px;padding:6px 15px;margin-bottom:14px}
.wp-q-card{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:22px;padding:30px 24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;box-shadow:var(--soft2)}
.wp-q-ko{font-size:19px;color:var(--jade);font-weight:800;margin-bottom:24px}
.wp-q-en{font-family:var(--serif);font-size:34px;line-height:1.6;color:var(--text);font-weight:500}
.wp-blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--jade);margin:0 4px;vertical-align:bottom}
/* 라이브 음성 인식 영역 */
.wp-speech{text-align:center;font-size:16px;color:var(--muted);margin-top:14px;min-height:26px;font-weight:600;padding:0 16px}
.wp-live{color:var(--jade);font-weight:800;animation:wpPulse 1s ease-in-out infinite}
@keyframes wpPulse{0%,100%{opacity:1}50%{opacity:.4}}
/* 하단 액션 — 큰 동그란 마이크 + 큰 액션 카드 */
.wp-dock{flex:none;padding:14px 0 max(14px, env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;gap:13px}
.wp-mic{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--jade),var(--jade-deep));border:none;color:#fff;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 8px 26px -6px var(--jade);transition:transform .1s}
.wp-mic svg{width:34px;height:34px}
.wp-mic:active{transform:scale(.95)}
.wp-mic.live{background:linear-gradient(135deg,#f87171,#ef4444);box-shadow:0 8px 26px -6px rgba(248,113,113,.6);animation:wpPulse 1.1s ease-in-out infinite}
.wp-dock-row{display:flex;gap:11px;width:100%}
.wp-act{flex:1;display:flex;align-items:center;justify-content:center;gap:9px;padding:15px;border-radius:15px;background:var(--card2);border:1px solid var(--line);color:var(--text);font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s}
.wp-act:active{transform:scale(.98);background:var(--mist)}
.wp-act-ic{font-size:20px}
.wp-giveup{background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;padding:13px 20px;border-radius:13px;width:100%}
.wp-giveup:active{background:var(--mist);color:var(--text)}
.wp-back-voice{width:100%;padding:13px 20px;border-radius:13px;background:var(--mist);border:1px solid var(--line);color:var(--jade);font-size:14px;font-weight:800;cursor:pointer}
.wp-back-voice:active{background:var(--line)}
.ls-skip{display:block;width:100%;margin-top:10px;padding:13px 20px;border-radius:13px;background:var(--card2);border:1px solid var(--line);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer}
.ls-skip:active{background:var(--mist);color:var(--text)}
/* ✨ 정답/오답 화면 플래시 */
.flash-fx{position:fixed;inset:0;z-index:99998;pointer-events:none;opacity:0;transition:opacity .12s ease}
.flash-fx.on{animation:flashPulse .6s ease}
.flash-ok{background:radial-gradient(ellipse at center, rgba(31,211,160,.0) 30%, rgba(31,211,160,.38) 100%);box-shadow:inset 0 0 90px 20px rgba(31,211,160,.45)}
.flash-bad{background:radial-gradient(ellipse at center, rgba(248,80,80,.0) 30%, rgba(248,80,80,.36) 100%);box-shadow:inset 0 0 90px 20px rgba(248,80,80,.42)}
@keyframes flashPulse{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
/* 🧱 오늘의 영어 블록 — 홈 히어로 (앱 정체성) */
.block-hero{background:linear-gradient(135deg,var(--jade),var(--jade-deep));border-radius:20px;padding:18px 18px 16px;margin-bottom:13px;box-shadow:0 12px 28px -12px rgba(240,102,74,.5)}
.bh-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.bh-badge{font-size:12px;font-weight:900;color:#fff;letter-spacing:.02em}
.bh-due{font-size:11px;font-weight:700;color:rgba(255,255,255,.92);background:rgba(255,255,255,.18);border-radius:99px;padding:3px 10px}
.bh-block{font-family:var(--serif);font-size:30px;font-weight:700;color:#fff;line-height:1.15}
.bh-ko{font-size:14px;color:rgba(255,255,255,.95);font-weight:600;margin-top:4px}
.bh-flow{font-size:11.5px;color:rgba(255,255,255,.85);margin-top:11px;font-weight:700}
.bh-stats{display:flex;align-items:center;gap:9px;margin-top:9px;font-size:12.5px;color:rgba(255,255,255,.95)}
.bh-stats b{font-weight:900;color:#fff}
.bh-dot{opacity:.6}
.bh-go{width:100%;margin-top:13px;padding:13px;border-radius:13px;background:rgba(255,255,255,.95);border:none;color:var(--jade-deep);font-size:15px;font-weight:900;cursor:pointer;transition:transform .1s}
.bh-go:active{transform:scale(.98)}

/* ===== 🎧 듣기 화면 리디자인 (따뜻한 카드 + 밸런스) ===== */
.lcard-full.lp2{min-height:calc(100svh - 56px - 56px);display:flex;flex-direction:column;justify-content:flex-start;gap:0;background:linear-gradient(180deg,#FFF6F0,#FFEAE0)!important;border:1px solid #FBD6C4!important;box-shadow:0 16px 40px -24px rgba(214,120,70,.4)!important;padding:20px 18px 22px!important;border-radius:26px!important}
.lp2-hero{background:#FFF7F0;border:1px solid #FBDBCB;border-radius:22px;padding:22px 20px 19px;text-align:center;box-shadow:0 8px 22px -16px rgba(214,120,70,.45)}
.lp2-emo{width:76px;height:76px;margin:0 auto 13px;display:grid;place-items:center;font-size:40px;border-radius:50%;background:radial-gradient(circle at 50% 32%,#FFE6DA,#FFD0BD);box-shadow:0 8px 18px -8px rgba(240,102,74,.42)}
.lp2-topic{font-size:25px;font-weight:900;color:#3A2D27;letter-spacing:-.01em;line-height:1.2}
.lp2-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:7px;margin-top:12px}
.lp2-lvl{font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#FF8568,#F0664A);border-radius:99px;padding:5px 14px;white-space:nowrap}
.lp2-chip{font-size:13px;font-weight:700;color:#9C8378;background:#FFF1E9;border:1px solid #FBDBCB;border-radius:99px;padding:5px 13px;white-space:nowrap}
.lp2-instr{font-size:14.5px;color:#9C8378;line-height:1.55;margin-top:15px}
.lp2-instr b{color:#E2674A;font-weight:800}
.lp2-listen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:8px 0}
.bigplay.lp2-play{width:134px!important;height:134px!important;min-height:0!important;padding:0!important;border-radius:50%!important;background:linear-gradient(155deg,#FF9576,#FF6F4D)!important;color:#fff!important;box-shadow:0 18px 40px -12px rgba(240,102,74,.6)!important;display:grid!important;place-items:center;transition:transform .12s}
.bigplay.lp2-play svg{width:50px!important;height:50px!important;margin-left:5px}
.bigplay.lp2-play.playing{background:linear-gradient(155deg,#FFB488,#FF8A5C)!important}
.bigplay.lp2-play:active{transform:scale(.94)}
.lp2-playlabel{font-size:16px;font-weight:800;color:#E2674A;white-space:nowrap}
.lp2-slow{font-size:14px;font-weight:700;color:#8A6F62;background:#FFF7F0;border:1px solid #FBDBCB;border-radius:99px;padding:11px 22px;cursor:pointer;transition:.12s;white-space:nowrap}
.lp2-slow:active{background:#FFF1E9;transform:scale(.97)}
.sh-next.lp2-cta{margin:4px 0 0!important;max-width:none!important;width:100%!important;padding:18px!important;border-radius:18px!important;font-size:17px!important;font-weight:800!important;box-shadow:0 12px 28px -12px rgba(240,102,74,.5)!important}
.ls-skip.lp2-skip{margin-top:11px!important;background:transparent!important;border:none!important;color:#B0958A!important;font-size:13.5px!important;text-decoration:underline;text-underline-offset:3px}

/* ===== 🎯 오늘의 퀸스트 ===== */
.qbox{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:9px 11px;margin-bottom:11px;box-shadow:0 8px 18px -14px rgba(214,120,70,.3)}
.qbox-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.qbox-title{font-size:12px;font-weight:900;color:var(--text);white-space:nowrap}
.qbox-xp{font-size:10px;font-weight:800;color:#E2674A;background:#FFE7DC;border-radius:99px;padding:2px 9px;white-space:nowrap}
.qbox-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.qtile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:3px;background:#FFF7F0;border:1px solid #F6D6C5;border-radius:11px;padding:7px 3px}
.qtile.done{background:rgba(255,133,104,.12);border-color:rgba(255,133,104,.4)}
.qt-emo{width:24px;height:24px;flex:none;display:grid;place-items:center;font-size:12px;font-weight:800;border-radius:7px;background:#FFEFE7;color:#E2674A}
.qtile.done .qt-emo{background:rgba(255,133,104,.22)}
.qt-t{font-size:9.5px;font-weight:800;color:var(--text);white-space:nowrap}
.qt-c{font-size:11px;font-weight:900;color:var(--muted)}
.qtile.done .qt-c{color:#E2674A}
.qbox-reward{display:flex;align-items:center;gap:11px;background:#FFF7F0;border:1px solid #F6D6C5;border-radius:15px;padding:11px 13px}
.qr-emo{font-size:22px}
.qr-tx{flex:1;min-width:0}
.qr-top{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qr-bar{height:7px;border-radius:99px;background:#FFE0D2;overflow:hidden;margin-top:6px}
.qr-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#FF8568,#F0664A)}
.qr-go{font-size:11.5px;font-weight:900;color:#E2674A;background:#FFE7DC;border-radius:99px;padding:5px 11px;white-space:nowrap}

/* ===== ⚡ 스피드런 — 공백 채우기 ===== */
.arena.arena2{min-height:calc(100svh - 56px - 58px);display:flex;flex-direction:column}
.arena.arena2 .ar2-scene{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px}
.arena.arena2 .ar2-ctrl{margin-top:6px}
.arena.arena2 .ar2-foot{margin-top:14px;display:flex;align-items:center;justify-content:space-around;gap:6px;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px 8px;font-size:12px;font-weight:700;color:var(--muted)}
.arena.arena2 .ar2-foot span{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.arena.arena2 .ar2-foot b{color:#E2674A;font-size:15px;font-weight:900}

/* ===== 🍑 블록영어 상황인출 — 복숭아 소르베 시안 (안 A/C) ===== */
.blpz{background:linear-gradient(180deg,#FFF1E6,#FFE8DB);border:1px solid #FBD6C4;border-radius:30px;box-shadow:0 20px 44px -22px rgba(214,120,70,.46);padding:22px 20px 24px;margin:0 auto;max-width:460px}
.blpz-coach{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px}
.blpz-fox{width:42px;height:42px;flex:none;border-radius:50%;background:linear-gradient(155deg,#FFD9A1,#FF9576);display:grid;place-items:center;font-size:22px;box-shadow:0 6px 14px -6px rgba(240,102,74,.5)}
.blpz-bubble{background:#fff;border:1px solid #FBE0D2;border-radius:16px 16px 16px 5px;padding:11px 14px;font-size:14px;color:#5A463C;font-weight:600;line-height:1.45}
.blpz-card{background:#fff;border:1px solid #FBE0D2;border-radius:18px;padding:20px 18px;text-align:center;box-shadow:0 8px 20px -14px rgba(214,120,70,.4)}
.blpz-card .blpz-emo{font-size:26px}
.blpz-card .blpz-ko{font-size:20px;font-weight:800;color:#3A2D27;line-height:1.45;margin-top:8px}
.blpz-card .blpz-tip{font-size:12.5px;color:#B0958A;font-weight:700;margin-bottom:8px}
.blpz-micwrap{display:flex;justify-content:center;margin:22px 0 10px}
.blpz-micring{position:relative;width:118px;height:118px;display:grid;place-items:center}
.blpz-micring::before{content:"";position:absolute;inset:0;border-radius:50%;background:rgba(255,133,104,.16)}
.blpz-micring::after{content:"";position:absolute;inset:13px;border-radius:50%;background:rgba(255,133,104,.26)}
.blpz-mic{position:relative;z-index:1;width:84px;height:84px;border:none;border-radius:50%;background:linear-gradient(155deg,#FF9576,#F0664A);display:grid;place-items:center;font-size:34px;cursor:pointer;box-shadow:0 14px 28px -10px rgba(240,102,74,.6);transition:transform .12s}
.blpz-mic:active{transform:scale(.94)}
.blpz-mic.live{animation:blpzpulse .8s infinite}
@keyframes blpzpulse{0%,100%{box-shadow:0 14px 28px -10px rgba(240,102,74,.6)}50%{box-shadow:0 14px 40px -6px rgba(240,102,74,.9)}}
.blpz-miclbl{text-align:center;font-size:14px;color:#C08763;font-weight:800;min-height:22px}
.blpz-stat{text-align:center;font-size:14px;color:#8A6F62;font-weight:700;min-height:24px;margin-top:4px}
.blpz-foot{display:flex;gap:9px;margin-top:16px}
.blpz-foot button{flex:1;border:1px solid #FBD6C4;background:#fff;color:#8A6F62;font-size:13.5px;font-weight:700;border-radius:99px;padding:11px;cursor:pointer}
/* 힌트 토스트 — 레이아웃 안 건드리고 카드 위에 떠서 표시 */
.ble-hint-toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);z-index:250;max-width:min(420px,90vw);background:#3A2D27;color:#fff;border-radius:16px;padding:13px 18px;font-size:14px;font-weight:600;line-height:1.55;box-shadow:0 14px 34px -10px rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;text-align:center}
.ble-hint-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ble-hint-toast b{color:#FFB089;font-family:var(--serif)}
.blpz-timer{text-align:center;font-size:13px;font-weight:800;color:#F0664A;margin-bottom:8px}
.blpz-stepbadge{display:block;text-align:center;margin-bottom:14px}
.blpz-stepbadge span{font-size:11.5px;font-weight:900;letter-spacing:.04em;color:#fff;background:#F0664A;border-radius:99px;padding:4px 13px}
.blpz-in{width:100%;margin-top:10px;padding:13px;border:1.5px solid #FF8568;border-radius:13px;background:#fff;color:#3A2D27;font-size:16px}


/* ===== 모드 허브 시트 (스피킹 훈련장 / 청크) ===== */
.hub-ov{position:fixed;inset:0;z-index:140;display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .18s}
.hub-ov.show{opacity:1}
.hub-bg{position:absolute;inset:0;background:rgba(60,30,20,.45)}
.hub-sheet{position:relative;z-index:1;width:100%;max-width:480px;background:var(--paper);border-radius:26px 26px 0 0;border-top:1px solid var(--line);padding:10px 18px calc(26px + env(safe-area-inset-bottom));box-shadow:0 -16px 44px -16px rgba(120,70,40,.45);transform:translateY(18px);transition:transform .22s cubic-bezier(.22,1,.36,1)}
.hub-ov.show .hub-sheet{transform:translateY(0)}
.hub-grab{width:42px;height:5px;border-radius:99px;background:var(--line);margin:6px auto 14px}
.hub-title{font-size:20px;font-weight:900;color:var(--text);text-align:center}
.hub-sub{font-size:13px;color:var(--muted);text-align:center;margin:5px 0 17px;line-height:1.5}
.hub-opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:#FFF7F0;border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:11px;cursor:pointer;transition:transform .1s}
.hub-opt:active{transform:scale(.98)}

<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>스피킹 룸 <span>· 아는 영어 말고, 나오는 영어</span></h1>
    </div>
    <div class="ctx" id="ctxBar" style="display:none">
      <span class="chip" id="ctxScn"></span>
      <span class="chip" id="ctxLvl"></span>
      <button class="iconbtn on" id="ttsBtn" title="음성 자동재생 켜기/끄기" aria-label="음성 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
      </button>
      <button class="iconbtn" id="restartBtn" title="새 대화 시작" aria-label="새 대화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 8a9 9 0 1 0 2.5-3.5L3 8"/></svg>
      </button>
      <button class="iconbtn notes-mobile-toggle" id="notesToggle" title="표현 노트" aria-label="표현 노트">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13l3 3v13H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
      </button>
      <button class="iconbtn" id="evalBtn" title="끝내고 평가받기" aria-label="평가" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16l4-3 4 3 4-3 4 3V4z"/><path d="M9 9h6M9 13h6"/></svg>
      </button>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup" id="setup">
    <div class="setup-inner">
      <div class="home" id="homeCard">
        <!-- 🎮 HERO ZONE -->
        <div class="hero" id="heroZone" title="내 프로필"></div>
        <!-- 습득 지표 — 프로필 바로 아래 (짧게) -->
        <div id="acqStats" style="margin:2px 0 14px"></div>
        <!-- 연령 모드 -->
        <div id="ageToggle" style="display:flex;gap:6px;background:var(--mist);border-radius:13px;padding:4px;margin:4px 0 14px">
          <button data-age="adult" style="flex:1;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:800;cursor:pointer">🧑 어른</button>
          <button data-age="kid" style="flex:1;border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:800;cursor:pointer">🧒 아이</button>
        </div>
        <!-- 난이도: 어른/아이 토글 바로 아래 -->
        <div class="difcard" style="border-radius:14px;padding:11px 14px;margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px">
            <span style="font-size:13px;font-weight:800;color:var(--text)">난이도</span>
            <span id="lvlLabel" style="font-size:13px;font-weight:800;color:var(--jade)">Lv.1 · 입문</span>
          </div>
          <input type="range" id="lvlRange" min="1" max="60" step="1" value="1" style="width:100%;accent-color:#FF8568">
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
            <span>입문</span><span>중간</span><span>원어민</span>
          </div>
        </div>
        <!-- 🧱 오늘의 영어 블록 — 난이도 바로 아래 (앱 정체성) -->
        <div id="dailyCard"></div>
        <!-- 🗺️ 모험 지도 -->
        <div class="worldlabel">🗺️ 오늘은 어디로 떠날까?</div>
        <div class="engrid">
        <button class="eng" id="vocabCard">
          <span class="help-q" data-tut="vocab">?</span>
          <span class="eng-emo">💬</span>
          <span class="eng-tx"><b>단어</b><i>말하기에 필요한 재료를 익혀요</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng" id="chunkCard">
          <span class="eng-emo">🧱</span>
          <span class="eng-tx"><b>블록영어</b><i>자주 쓰는 말 덩어리를 배워요</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng eng-out" id="engOut">
          <span class="help-q" data-tut="output">?</span>
          <span class="eng-emo">⚔️</span>
          <span class="eng-tx"><b>스피킹 훈련장</b><i>영어로 꺼내기 · 스피드런 · 실전회화</i></span>
          <span class="eng-ar">›</span>
        </button>
        <button class="eng eng-in" id="engListen">
          <span class="help-q" data-tut="listen">?</span>
          <span class="eng-emo">👂</span>
          <span class="eng-tx"><b>듣기 훈련장</b><i>상황 듣기 · 연음 부스터</i></span>
          <span class="eng-ar">›</span>
        </button>
        </div>
        <button class="continue" id="continueCard" style="display:none">
          <span class="cont-emo" id="contEmo">✈️</span>
          <span class="cont-txt"><span class="cont-t">이어서 연습하기</span><span class="cont-d" id="contDesc"></span></span>
          <span class="cont-arr">›</span>
        </button>
      </div>

      <!-- 🎯 오늘의 퀘스트 + 보상 진행률 -->
      <div id="questBox"></div>

      <!-- 🔥 약점 청크 (아레나 MISS 누적) → 탭하면 즉시 집중 훈련 -->
      <div id="weakHome" style="display:none;margin-bottom:11px"></div>

      <!-- 아이 파닉스 (초등 저학년) -->
      <button id="kidCard" style="position:relative"><span class="help-q" data-tut="phonics">?</span><span class="ke">🏰</span><span class="kt"><b>발음 교정 아카데미</b><i>파닉스 · 글자 소리 · 단어 읽기 · 발음 별점 ⭐</i></span><span class="ka">›</span></button>

      <!-- 다시 만날 표현 (STEP 8 · 미래 인출) -->
      <div class="rvbanner" id="rvBanner" style="display:none">
        <div class="rvb-l"><span class="rvb-n" id="rvCount">0</span><span class="rvb-t">다시 만날 표현</span></div>
        <div class="rvb-btns">
          <button id="rvStart">다시 말해보기</button>
          <button id="rvSpeed">⚡ 속도</button>
        </div>
      </div>

      <!-- 난이도 D1~D60 (세분화) — 위치: 어른/아이 토글 아래로 이동됨 -->
      <div class="levels" id="levels" style="display:none"></div>
      <div id="verFoot" style="text-align:center;margin-top:14px;font-size:11.5px;color:var(--muted);opacity:.7;letter-spacing:.03em"></div>

      <!-- (구) 설정 영역 — 코치형에선 숨김, 엔진 호환 위해 유지 -->
      <div style="display:none">
      <div class="field" id="levelField"></div>

      <div class="field" id="talkField" style="display:none">
        <label>어떤 상황을 연습할까요</label>
        <div class="scn" id="scnGrid"></div>
        <div id="customWrap">
          <textarea id="customInput" rows="2" placeholder="예: 공항 체크인 카운터에서 수하물이 초과됐을 때"></textarea>
        </div>
      </div>

      <div class="field" id="listenField" style="display:none">
        <label>어떤 주제를 들을까요</label>
        <div class="scn" id="topicGrid"></div>
        <div id="topicCustomWrap" style="margin-top:11px; display:none">
          <textarea id="topicCustomInput" rows="2" placeholder="예: 미국 마트에서 장 보는 일상, 또는 비트코인 뉴스" style="width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;resize:none;line-height:1.5"></textarea>
        </div>
        <button class="floodbtn" id="floodBtn" disabled>🎧 흘려듣기 — 자동 연속 재생 (핸즈프리)</button>
      </div>

      <div class="field" id="blockField" style="display:none">
        <label>블록 영어 — 핵심 표현 마스터</label>
        <div id="blkPanel"></div>
      </div>

      <div class="field" id="vocabField">
        <div style="background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:18px">
          <div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px">📖 오늘의 단어</div>
          <p style="font-size:13px;color:var(--muted);line-height:1.6;margin:0">버튼만 누르면 바로 시작해요. 단어를 <b style="color:var(--text)">여러 다른 문장</b>으로 익히고, 직접 <b style="color:var(--text)">내 문장</b>도 만들어요. 한 틀에 안 갇히게.</p>
        </div>
      </div>

      <button class="startbtn" id="startBtn" disabled>단어 시작</button>
      </div><!-- /hidden legacy -->
    </div>
  </div>

  <!-- VOCAB STAGE -->
  <div class="review" id="vocab" style="display:none">
    <div class="rv-top">
      <button class="rvback" id="vbBack" aria-label="나가기">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>
      </button>
      <div class="rv-prog"><div class="rv-progbar"><i id="vbBarFill" style="width:0%"></i></div><div class="rv-progtxt" id="vbProgTxt"></div></div>
      <span class="rv-lvl" id="vbLvl">D1</span><div class="rv-mode" id="vbModeTag">📖 단어</div>
    </div>
    <div class="rv-body" id="vbBody"></div>
  </div>

  <!-- CHAT STAGE -->
  <div class="stage" id="stage" style="display:none">
    <div class="thread-wrap">
      <div class="thread" id="thread"><div class="thread-inner" id="threadInner"></div></div>

      <div class="composer">
        <div class="composer-inner">
          <div id="pinnedQ" style="display:none;background:var(--card2);border:1px solid var(--line);border-radius:13px;padding:10px 13px;margin-bottom:10px">
            <div style="font-size:10.5px;color:var(--muted);font-weight:700;margin-bottom:3px">상대방이 한 말 👂</div>
            <div id="pinnedQText" style="font-size:14.5px;color:var(--text);line-height:1.4"></div>
          </div>

/* ============ Claude API ============ */
async function callClaude(system, messages, model){
  // 전역 출력 규칙: 마크다운/구분선 금지 (말풍선이 plain text라 별표가 그대로 보임)
  const NO_MD="\n\n[FORMAT] Plain conversational text only. Do NOT use markdown: no **, no *, no ##, no ---, no bullet lists, no backticks. Write naturally as if texting.";
  const sys = (typeof system==="string" && system.indexOf("ONLY")===-1 && system.indexOf("JSON")===-1)
    ? system+NO_MD : system;
  const payload=JSON.stringify({ model: model||MODEL, max_tokens:2000, system:sys, messages });
  let lastErr=null;
  // 최대 2회 시도 (사파리 첫 연결 실패 대비)
  for(let attempt=0; attempt<2; attempt++){
    // 타임아웃 (사파리 무한대기 방지)
    let ctrl=null, timer=null;
    try{ ctrl=new AbortController(); timer=setTimeout(()=>{try{ctrl.abort();}catch(e){}}, 30000); }catch(e){}
    try{
      const opt={ method:"POST", headers:{"Content-Type":"application/json"}, body:payload };
      if(ctrl) opt.signal=ctrl.signal;
      const res = await fetch(PROXY_URL, opt);
      if(timer) clearTimeout(timer);
      if(!res.ok){ lastErr=new Error("서버 응답 "+res.status); if(res.status>=500||res.status===429){ continue; } throw lastErr; }
      return await res.json();
    }catch(e){
      if(timer) clearTimeout(timer);
      if(e && e.name==="AbortError"){ lastErr=new Error("응답 시간 초과"); continue; }
      lastErr=new Error(e&&e.message? ("연결 실패: "+e.message) : "네트워크 연결 실패");
      // 네트워크 오류면 한 번 더 시도
    }
  }
  throw lastErr || new Error("연결 실패");
}
function extractText(data){
  if(!data || !Array.isArray(data.content)) return "";
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function parseJSON(text){
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const s=t.indexOf("{"), e=t.lastIndexOf("}");
  if(s>=0 && e>=0) t=t.slice(s,e+1);
  return JSON.parse(t);
}

blocks ? ("The learner has studied these blocks (priority order — earlier = more important to surface). Gently create openings where these fit naturally:\n"+blocks) : "The learner is new — keep it very simple and encouraging.",
reusePromptHint(),
"CRITICAL RULES (do NOT break):",
"- This is NOT a quiz. NEVER say 'Please say Can I get...' or demand an exact phrase before they try.",
"- Create realistic situations that INVITE a studied block, but ACCEPT any answer whose meaning is clear. 'Can I get water?', 'I'd like water', 'Water please' are ALL fine.",
"- Roughly: most turns should open a door for a studied/weak/due block; some turns just be open natural conversation; occasionally throw a small real-life surprise. Do NOT announce this.",
"- Keep each reply SHORT (1-2 sentences), beginner-friendly, ONE question at a time. For beginners use very short sentences ('Hi! What would you like?').",
"- Only give a block hint AFTER they struggle or ask for help — e.g. 'Try starting with: Could you...'. Never hint before they try.",
"- Stay in character, in English. Never lecture grammar mid-conversation. React to their intent even if their English is broken.",
"- There have been "+ut+" learner turn(s). Have a natural back-and-forth; wrap up gracefully after the situation reaches a natural close.",
npcLenRule(),
levelHint(),
levelCap()
    ].join("\n");
  }
  if(state.scn && state.scn.id==="freetalk"){
    return [
"You are a warm, encouraging English speaking COACH helping a Korean learner (level: "+state.level+") practice FREE speaking — producing English from scratch, which is the hardest part for them.",
speakingLearningLaw(),
"How each turn works:",
"- Ask ONE simple, open question at a time about their real everyday life (their day, food, weekend, work, family, opinions, plans). Start easy and build up.",
"- After they answer (their English may be broken — that's totally fine, understand their intent), do BOTH: (1) give ONE short, natural model of what they meant, said better — start it with 👍 if they did well; (2) then ask your next question.",
"- Keep every reply SHORT (a model line + one question). "+levelLine(),
levelCap(),
"Your model line MUST obey the length lock above — for low levels keep the model sentence bare and minimal (e.g. \"I like soccer.\"); never add 'with...', 'and...', 'because...'.",
"When it fits naturally, reuse one expression from the retrieval queue in a new personal-life question, but never reveal it before the learner tries.",
reusePromptHint(),
"- Be warm and low-pressure. Only ONE improvement per turn — never pile on corrections.",
"- Reply in English. You may add a tiny Korean gloss in parentheses only for a genuinely hard word."
    ].join("\n");
  }
  return [
"You are role-playing as "+scnRole()+".",
speakingLearningLaw(),
"Situation: "+scnDesc(),
"You are talking with a Korean person practicing spoken English (level: "+state.level+").",
levelCap(),
"Rules:",
"- Speak ONLY in natural spoken English. Keep every reply SHORT — 1 to 3 sentences, like a real conversation. Never lecture.",
"- Stay fully in character. React naturally to whatever they say, even if their English is broken — understand their intent and keep things flowing.",
"- "+levelLine(),
"- Usually end with a natural follow-up question so they have something to respond to.",
"- Never correct their grammar and never switch to Korean. Just talk like a real person would."
  ].join("\n");
}

function refreshBlockPanel(){
  const n=state.mastered.length;
  let tierName="입문", nextN=20, baseN=0;
  if(n>=100){ tierName="고급"; nextN=null; baseN=100; }
  else if(n>=50){ tierName="중급"; nextN=100; baseN=50; }
  else if(n>=20){ tierName="초급"; nextN=50; baseN=20; }
  const pct = nextN? Math.round(((n-baseN)/(nextN-baseN))*100) : 100;
  const two = BLOCKS.filter(b=>!state.mastered.includes(b)).slice(0,2);
  const allDone = two.length===0;
  $("#blkPanel").innerHTML=`
    <div class="blkp-prog">
      <div class="top">
        <span class="tier">${tierName}</span>
        <span class="cnt"><b>${n}</b> / 100 블록</span>
        <span class="next">${nextN? `${nextN-n}개 더 → ${nextN===20?"초급":nextN===50?"중급":"고급"}` : "전부 마스터 🎉"}</span>
      </div>
      <div class="blkp-bar"><i style="width:${pct}%"></i></div>
    </div>
    <button class="blkp-btn primary" id="blkStudyBtn" ${allDone?"disabled":""}>
      <span class="ic">📚</span>
      <span class="tx"><span class="tt">${allDone?"모든 블록을 익혔어요!":"새 블록 배우기"}</span><span class="ds">${allDone?"랜덤으로 계속 연습하세요":`다음: <b style="color:var(--jade-deep)">${escapeHtml(two[0])}</b>${two[1]?` · <b style="color:var(--jade-deep)">${escapeHtml(two[1])}</b>`:""}`}</span></span>
      <span class="arr">→</span>
    </button>
    <button class="blkp-btn" id="blkRandomBtn" ${n<1?"disabled":""}>
      <span class="ic">🎲</span>
      <span class="tx"><span class="tt">익힌 블록 섞어 연습</span><span class="ds">${n<1?"먼저 블록을 하나 이상 익혀주세요":`지금까지 익힌 ${n}개를 여러 상황에 섞어서`}</span></span>

function pickTopic(id, btn){
  $("#topicGrid").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed","false"));
  btn.setAttribute("aria-pressed","true");
  state.topic = id==="custom" ? {id:"custom"} : TOPICS.find(t=>t.id===id);
  $("#topicCustomWrap").style.display = id==="custom" ? "block":"none";
  refreshStart();
}
function pickScn(id, btn){
  $("#scnGrid").querySelectorAll("button").forEach(x=>x.setAttribute("aria-pressed","false"));
  btn.setAttribute("aria-pressed","true");
  state.scn = id==="custom" ? {id:"custom"} : SCENARIOS.find(s=>s.id===id);
  $("#customWrap").classList.toggle("show", id==="custom");
  refreshStart();
}
function refreshStart(){
  if(state.mode==="block") return; // block mode uses its own panel buttons
  let ok;
  if(state.mode==="talk"){
    ok = state.scn && (state.scn.id!=="custom" || state.custom.length>3);
  }else if(state.mode==="vocab"){
    if(!state.vocabTheme) state.vocabTheme=nextVocabTheme();
    ok = true;   // 주제선택 없음 — 바로 시작
  }else{
    ok = state.topic && (state.topic.id!=="custom" || state.topicCustom.length>3);
  }
  $("#startBtn").disabled = !ok;
  const fb=$("#floodBtn"); if(fb) fb.disabled = !(state.mode==="listen" && ok);
}

/* ============ rendering turns ============ */
function turnEl(role){
  const d=document.createElement("div");
  d.className="turn "+(role==="assistant"?"coach":"me");
  const who=document.createElement("div");
  who.className="who"; who.textContent = role==="assistant" ? "상대" : "나";
  const bub=document.createElement("div"); bub.className="bubble";
  d.appendChild(who); d.appendChild(bub);
  threadInner.appendChild(d);
  return {wrap:d, bub};
}
// AI 응답에서 마크다운/메타 군더더기 제거 (별표·구분선·과한 안내문)
function cleanReply(t){
  if(!t) return "";
  let s=String(t);
  s=s.replace(/\*\*(.+?)\*\*/g,"$1");      // **굵게** → 일반
  s=s.replace(/\*(.+?)\*/g,"$1");          // *기울임*
  s=s.replace(/^#{1,6}\s+/gm,"");          // 헤더
  s=s.replace(/^\s*[-—–]{3,}\s*$/gm,"");   // --- 구분선
  s=s.replace(/`([^`]+)`/g,"$1");          // 인라인 코드
  s=s.replace(/\n{3,}/g,"\n\n");
  return s.trim();
}
function addCoachTurn(text){
  text=cleanReply(text);
  const {wrap,bub}=turnEl("assistant");
  bub.textContent=text;
  const acts=document.createElement("div"); acts.className="coach-acts";
  const play=document.createElement("button");
  play.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg> 다시 듣기`;
  play.onclick=()=>speak(text);
  const tr=document.createElement("button");
  tr.innerHTML=`🇰🇷 해석`;
  const trDiv=document.createElement("div"); trDiv.className="ko-trans";
  tr.onclick=()=>toggleTrans(text, trDiv);
  acts.appendChild(play); acts.appendChild(tr);
  wrap.appendChild(acts); wrap.appendChild(trDiv);
  // 입력창 위에 상대방 말 고정 (타이핑하면서 보이게)
  const pq=$("#pinnedQ"), pqt=$("#pinnedQText");
  if(pq&&pqt){ pqt.textContent=text; pq.style.display="block"; }
  scrollDown();
  if(state.ttsOn) speak(text);
}
let _transBusy=false;
async function toggleTrans(text, div){
  if(div.dataset.loaded){ div.classList.toggle("show"); return; }
  if(_transBusy) return; _transBusy=true;
  div.classList.add("show"); div.textContent="해석 중…";
  try{
    const data=await callClaude("Translate the English to natural Korean. Return ONLY the Korean translation, nothing else — no quotes, no notes.", [{role:"user", content:text}]);
    div.textContent=extractText(data); div.dataset.loaded="1";
  }catch(e){ div.textContent="(해석을 불러오지 못했어요)"; }
  _transBusy=false;
}
function addMeTurn(text){
  const {bub}=turnEl("user"); bub.textContent=text; scrollDown();
}

/* ============ conversation flow ============ */
async function startSession(){
  if(state.scn) markPractice({mode:"talk", id:state.scn.id, emo:state.scn.emo||"🗣️", label:(state.scn.id==="custom"?"직접 입력 회화":(state.scn.t||"회화"))});
  setup.style.display="none"; stage.style.display="flex"; $("#ctxBar").style.display="flex";
  pushScreen("talk");
  $("#ctxScn").textContent = state.scn.id==="custom" ? "직접 입력" : state.scn.t;
  $("#ctxLvl").textContent = levelName();
  $("#evalBtn").style.display="";
  state.convo=[];
  threadInner.innerHTML="";
  setBusy(true);
  showTyping();
  try{
    const kickoff = state.engine==="output"
      ? "Start now. Give me the first situation in Korean (one line). Do not show any English."
      : state.engine==="survival"
      ? "Start the situation now. Say your first line to me in English, in character."
      : (state.scn && state.scn.id==="freetalk")
      ? "Start now. Greet me warmly in one short line and ask me your first easy question."
      : "Begin the role-play now. Say your first line to me.";
    const data = await callClaude(rolePrompt(), [{role:"user", content:kickoff}]);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요. (이 앱은 claude.ai 안에서 작동합니다.)");
  }
  setBusy(false); msg.focus();
}

// 🗣 실전회화: 사용자 발화에서 학습 블록을 자연스럽게 썼는지 감지 → SRS 강화
function convoTrackBlocks(userText){
  const t=" "+String(userText||"").toLowerCase().replace(/[^a-z0-9' ]/g," ").replace(/\s+/g," ")+" ";
  if(t.trim().length<3) return;
  let usedBle=[];
  try{
    const s=bleGetState();
    getLearnedBlocks().forEach(b=>{
      const st=s[b.id]; if(!st || !st.unlocked) return;
      const core=bleNorm(b.block.replace(/\.\.\.|\?/g,"")).split(" ").slice(0,3).join(" ");
      if(core.length>=3 && t.indexOf(" "+core)>=0 && usedBle.indexOf(b.id)<0){
        st.realConversationSuccessCount=(st.realConversationSuccessCount||0)+1;
        st.lastSeenAt=bleNow();
        const ctx="real:"+(state.scn&&state.scn.id||"conversation");
        st.contextsUsed=st.contextsUsed||[];
        if(st.contextsUsed.indexOf(ctx)<0) st.contextsUsed.push(ctx);
        st.stage=bleComputeStage(st);
        s[b.id]=st; usedBle.push(b.id);
      }
    });
    if(usedBle.length) bleSaveState(s);
  }catch(e){}
  const all=srsAll(); let used=[];
  Object.values(all).forEach(it=>{
    if(!it || !it.en) return;
    const block=String(it.en).toLowerCase().replace(/[^a-z0-9' ]/g," ").replace(/\s+/g," ").trim();
    if(block.length<3) return;
    // 블록의 핵심부(첫 2~3단어 또는 전체)가 발화에 포함되면 사용으로 간주
    const core=block.split(" ").slice(0,3).join(" ");
    if(core.length>=3 && t.indexOf(" "+core)>=0){ used.push(it.en); }
  });
  // 중복 제거, 최대 3개만 기록 (강화)
  [...new Set(used)].slice(0,3).forEach(en=>{
    const it=srsGet(en); srsPass(en, (it&&it.ko)||"", (state.scn&&state.scn.id)||"convo");
  });
  // 🧱 실전회화에서 학습 블록(CORE_PHRASES) 사용 → REAL WORLD 레벨 승급
  try{
    CORE_PHRASES.forEach(p=>{
      const core=p.phrase.toLowerCase().replace(/[^a-z0-9' ]/g," ").replace(/\.\.\.|\?/g,"").trim().split(" ").slice(0,3).join(" ");
      if(core.length>=3 && t.indexOf(" "+core)>=0 && blGetLearned().indexOf(p.id)>=0){ blMarkReal(p.id); }
    });
  }catch(e){}
  if(used.length||usedBle.length){ try{ refreshRvBanner&&refreshRvBanner(); }catch(e){} }
}
async function sendMessage(){
  const text=msg.value.trim();
  if(!text || state.busy) return;
  msg.value=""; autoSize();
  if(hasHangul(text)){ addMeTurn(text); return koreanFallback(text); }
  addMeTurn(text);
  state.convo.push({role:"user", text});
  questBump("talk");
  // 🗣 블록 사용 감지 — 학습한 블록을 자연스럽게 썼으면 SRS 강화 (실전회화에서만)
  if(state.engine==="survival"){ try{ convoTrackBlocks(text); }catch(e){} }
  setBusy(true); showTyping();
  try{
    const msgs = state.convo.map(t=>({role:t.role, content:t.text}));
    const data = await callClaude(rolePrompt(), msgs);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("(연결 오류 — 다시 시도해 주세요.)");
  }
  setBusy(false);
}
function hasHangul(s){ return /[가-힣]/.test(s); }
async function koreanFallback(korean){
  const lastCoach = [...state.convo].reverse().find(t=>t.role==="assistant");
  setBusy(true); showTyping();
  const sys=[
    "The learner is practicing spoken English in this situation: "+scnDesc()+".",
    lastCoach ? 'The other person just said to them: "'+lastCoach.text+'".' : "",
    "The learner got stuck and typed in Korean what they want to say. Give the natural English they should say here, fitting this exact situation. Keep it short and natural — what a real person would actually say.",
    'Return ONLY JSON: {"en":"natural English they should say","note":"짧은 한국어 팁 또는 뉘앙스, 없으면 빈 문자열"}'
  ].join("\n");
  try{
    const data=await callClaude(sys, [{role:"user", content:korean}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFallbackCard(obj);
    if(lastCoach) addCoachTurn(lastCoach.text); // 한 단계 뒤로 — 같은 질문 다시
  }catch(e){ hideTyping(); }
  setBusy(false);
}
function renderFallbackCard(obj){
  const c=document.createElement("div"); c.className="card help";
  let html=`<h4>💡 막혔을 땐 이렇게 말해요</h4>`;
  html+=`<div class="ph"><span>${escapeHtml(obj.en||"")}</span><button data-say="${escapeAttr(obj.en||"")}">이걸로 답하기</button></div>`;
  if(obj.note) html+=`<div class="note">${escapeHtml(obj.note)}</div>`;
  html+=`<div class="note" style="margin-top:8px">👇 아래 질문에 이번엔 <b>영어로</b> 다시 답해보세요.</div>`;
  c.innerHTML=html;
  threadInner.appendChild(c);
  c.querySelectorAll("button[data-say]").forEach(b=>{
    b.onclick=()=>{ msg.value=b.getAttribute("data-say"); autoSize(); msg.focus(); refreshSend(); speak(b.getAttribute("data-say")); };
  });
  scrollDown();
}

/* ============ help (Korean -> English) ============ */

  if(state.busy) return;
  openModal({title:"💡 막혔어요", msg:"뭐라고 말하고 싶어요? 한국어로 적어주세요.", input:true, placeholder:"예: 이거 안 매운 걸로 바꿀 수 있어요?", okText:"물어보기", onOk:(ko)=>{ if(ko) doHelp(ko); }});
}
async function doHelp(ko){
  setBusy(true); showTyping();
  const sys = [

  const sys=[
"You are a warm, encouraging English speaking coach for a Korean learner.",

"Only include corrections where the English had real errors or sounded unnatural — skip sentences that were already fine. Pick the 1 to 4 most useful. chunks = 1 to 3 reusable expressions worth memorizing from this context. Be kind and specific."
  ].join("\n");
  const userMsg = mine.map((m,i)=>`${i+1}. ${m}`).join("\n");
  try{
    const data=await callClaude(sys,[{role:"user", content:userMsg}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFeedbackCard(obj);
  }catch(e){ hideTyping(); flashHint("피드백 생성에 실패했어요. 다시 시도해 주세요."); }

function renderFeedbackCard(obj){
  const c=document.createElement("div"); c.className="card fb";
  let html=`<h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b3771a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> 코치 피드백</h4>`;
  const corr=obj.corrections||[];
  if(corr.length===0){
    html+=`<div style="color:#1c7a5c;font-weight:600;font-size:14px">완벽해요 — 고칠 게 없어요! 👏</div>`;
  }else{
    corr.forEach((c2,i)=>{
      html+=`<div class="corr"><div class="o">${escapeHtml(c2.original||"")}</div><div class="b">→ ${escapeHtml(c2.better||"")}</div>`;
      if(c2.why) html+=`<div class="w">${escapeHtml(c2.why)}</div>`;
      html+=`<button class="resay" data-en="${escapeAttr(c2.better||"")}" data-ko="${escapeAttr(c2.ko||"")}" style="margin-top:8px;padding:9px 14px;border-radius:11px;background:linear-gradient(135deg,#FF8568,#F0664A);color:#ffffff;font-size:13px;font-weight:800">🎤 이렇게 다시 말해보기</button>`;
      html+=`</div>`;
    });
  }
  if(obj.encouragement) html+=`<div class="enc">🌱 <span>${escapeHtml(obj.encouragement)}</span></div>`;
  // enroll into review deck: corrections + chunks
  const enrolled=[];
  corr.forEach(c2=>{ if(c2 && c2.better){ try{ reuseAdd(c2.better, c2.ko, "feedback", c2.original||"feedback"); }catch(e){} if(addReviewItem(c2.better, c2.ko, "correction", c2.original)) enrolled.push(c2.better); } });
  (obj.chunks||[]).forEach(ch=>{ if(ch && ch.en){ try{ reuseAdd(ch.en, ch.ko, "feedback-chunk", "feedback"); }catch(e){} if(addReviewItem(ch.en, ch.ko, "chunk")) enrolled.push(ch.en); } });
  if(enrolled.length){
    renderNotes(); saveNotes(); refreshRvBanner();
    html+=`<div class="chunks-added">📓 복습 노트에 ${enrolled.length}개 추가됨 — 며칠 뒤 복습으로 다시 나와요.</div>`;
  }
  c.innerHTML=html;
  threadInner.appendChild(c); scrollDown();
  c.querySelectorAll(".resay").forEach(b=>{
    b.onclick=()=>openDrill(b.getAttribute("data-en"), b.getAttribute("data-ko"));
  });
}

function listenMaterials(){
  const lvl=diffMacro();
  // 비율: 초급 70/20/10, 중급 60/25/15, 고급 50/30/20
  const tier = lvl<=3 ? {learned:70,weak:20,fresh:10} : lvl<=6 ? {learned:60,weak:25,fresh:15} : {learned:50,weak:30,fresh:20};
  const all=Object.values(srsAll());
  const today=EDAY();
  const bleBlocks=blePriorityBlocks(18, false).map(bleItemFromBlock);
  const bleWeak=getWeakBlocks().map(bleItemFromBlock);
  const bleRecent=getRecentlyLearnedBlocks().map(bleItemFromBlock);
  // CORE_PHRASES는 BLE가 없을 때만 보강하는 백업
  const learnedBlocks = CORE_PHRASES.filter(p=>{ const si=srsGet(p.phrase); return si && (si.uses>0 || ["learning","review","strong","mastered"].includes(si.stage)); }).map(p=>p.phrase);
  // SRS에서 배운 표현/단어
  const learnedItems = all.filter(x=>x && x.en && (x.uses>0)).map(x=>x.en);
  const weakItems = all.filter(x=>x && x.en && ((x.miss||0)>0 || ((x.due||0)<=today && x.stage!=="mastered"))).sort((a,b)=>(b.miss||0)-(a.miss||0)).map(x=>x.en);
  const recentItems = all.filter(x=>x && x.en && x.lastT).sort((a,b)=>(b.lastT||0)-(a.lastT||0)).slice(0,10).map(x=>x.en);
  return {
    blocks: [...new Set([...bleBlocks.map(x=>x.en), ...(bleBlocks.length?[]:learnedBlocks), ...learnedItems])].slice(0,20),
    weak: [...new Set([...bleWeak.map(x=>x.en), ...weakItems])].slice(0,12),
    recent: [...new Set([...bleRecent.map(x=>x.en), ...recentItems])].slice(0,8),
    tier
  };
}

let lsBoosterMode=false;
function listenSentenceSys(){
  const seed=Math.floor(Math.random()*100000);
  const prev = lsPrevReply ? `This is a continuing conversation. The other person just said: "${lsPrevReply}". Produce the NEXT natural spoken line that follows it.` : "Begin a fresh real-life spoken moment.";
  const booster = (lsBoosterMode && diffMacro()>=5) ? "CRITICAL FOCUS — this is EAR TRAINING for connected speech. The sentence MUST be packed with real reductions/contractions/linking that trip up Korean learners: e.g. wanna, gonna, gotta, wudja(would you), didja(did you), gimme, lemme, kinda, 'I'll', 'you're', dropped/linked sounds. Make it sound exactly like fast casual native speech." : "";
  // 🎧 배운 블록·단어 기반 (학습 루프 연결)
  const mat = (typeof listenMaterials==="function") ? listenMaterials() : null;
  let materialRule="";
  if(mat && (mat.blocks.length || mat.weak.length)){
    const t=mat.tier;
    materialRule = [
      "CRITICAL — This listening is NOT random. It must mostly REUSE what the learner has already studied, so they recognize learned blocks in real speech. Build the sentence AROUND these:",
      mat.blocks.length? ("LEARNED blocks/words (use these "+t.learned+"% of the time — weave one into a natural spoken sentence): "+mat.blocks.slice(0,14).join("; ")) : "",
      mat.weak.length? ("WEAK / due-review (use ~"+t.weak+"%): "+mat.weak.slice(0,10).join("; ")) : "",
      "Only about "+t.fresh+"% of the time may you introduce a fresh new real-life phrase. Combine a learned BLOCK with a learned WORD when possible (e.g. block 'Can I get...' + word 'receipt' → 'Can I get a receipt?')."
    ].filter(Boolean).join("\n");
  }
  return [
"This is NOT an English lesson. This is LISTENING training for real-world spoken English. Optimize for how people ACTUALLY speak — contractions, reductions, connected speech, natural rhythm. Casual and natural, but ALWAYS a grammatically complete, correct sentence (natural spoken English is still grammatical — it is NOT broken word-by-word English).",
grammarRule(),
materialRule,
kidMode()? ("Produce ONE short, simple spoken English sentence for a young CHILD about: "+KID_TOPICS[(seed)%KID_TOPICS.length]+".") : ("Produce ONE natural spoken English sentence for a Korean learner. Topic context: "+topicDesc()+"."),
booster,
prev,
kidMode()? kidRules() : levelHint(),
levelCap(),
"Concrete and fresh (variety seed "+seed+"). One sentence only.",
(lsRecent.length? "DO NOT repeat or closely paraphrase any of these already-used sentences (make something clearly different in meaning and words):\n- "+lsRecent.slice(-15).join("\n- ") : ""),
'Return ONLY JSON: {"en":"the spoken sentence","ko":"한국어 뜻","block":"the learned block reused, or empty"}'
  ].join("\n");
}
async function lsGenerate(){
  lsAnswer=""; lsAnalysis=null; lsConn=null; lsAwarded=false;
  // 1) 미리 받아둔 게 있으면 즉시 출제 (대기 0초)
  if(lsPrefetch && !lsIsDup(lsPrefetch.en)){
    lsItem=lsPrefetch; lsPrefetch=null; lsCount++; lsRecord(lsItem.en);
    renderListenPlay();
    lsPrefetchNext();   // 그 다음 문장 또 백그라운드 생성
    return;
  }
  lsPrefetch=null;   // 중복이면 버림
  // 2) 첫 문장 — 기다리지 말고 배운 블록/예문에서 즉시 띄우고, AI는 백그라운드
  const instant=listenInstantSentence();
  if(instant && instant.en && !lsIsDup(instant.en)){
    lsItem=instant; lsCount++; lsRecord(lsItem.en);
    renderListenPlay();
    lsPrefetchNext();   // 다음 문장은 AI로 미리
    return;
  }
  $("#listenScroll").innerHTML=`<div class="lloading">첫 문장을 준비하는 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  try{
    let it=null;
    for(let try_=0; try_<3; try_++){
      const data=await callClaude(listenSentenceSys(),[{role:"user",content:"Create the sentence now."}], FAST_MODEL);
      it=parseJSON(extractText(data));
      if(it && it.en && !lsIsDup(it.en)) break;
    }
    lsItem=it;
    if(!lsItem || !lsItem.en) throw new Error("empty");
    lsCount++; lsRecord(lsItem.en);
    renderListenPlay();
    lsPrefetchNext();   // 바로 다음 문장 미리 준비
  }catch(e){
    $("#listenScroll").innerHTML=`<div class="lloading">문장을 만들지 못했어요.<br><button class="sh-next" id="lsRetry" style="max-width:240px;margin-top:14px">다시 시도</button></div>`;
    const r=$("#lsRetry"); if(r) r.onclick=lsGenerate;
  }
}
// 듣기 첫 문장 즉시용 — 배운 블록 예문 또는 레벨 맞는 CORE_PHRASES 예문
function listenInstantSentence(){
  try{
    const lvl=diffMacro();
    let cands=[];
    // 1차: BLE에서 배운/due/약점/최근 블록
    const ble=blePriorityBlocks(20, false).map(bleItemFromBlock);
    if(ble.length) cands.push(...ble.map(x=>({en:x.en, ko:x.ko, block:x.bleId, blockText:x.block})));
    // 2차: 레벨 ±2 CORE_PHRASES 백업
    CORE_PHRASES.forEach(p=>{
      if(Math.abs((p.level||2)-lvl)<=2 && p.examples){ p.examples.forEach(ex=>{ if(ex.en && ex.ko) cands.push({en:ex.en, ko:ex.ko, block:p.phrase}); }); }
    });
    // 3차: 비면 레벨 무시하고 전체 블록 예문 (항상 뭐라도 나오게)
    if(!cands.length){
      CORE_PHRASES.forEach(p=>{ if(p.examples){ p.examples.forEach(ex=>{ if(ex.en && ex.ko) cands.push({en:ex.en, ko:ex.ko, block:p.phrase}); }); } });
    }
    if(!cands.length) return null;
    const fresh=cands.filter(c=>!lsIsDup(c.en));
    const arr=fresh.length?fresh:cands;
    return arr[(Math.random()*arr.length)|0];
  }catch(e){ return null; }
}

function lsFillFromHeard(heardText){
  const heard=String(heardText||"").split(/\s+/).map(lsWordNorm).filter(Boolean);
  let added=0;
  heard.forEach(hw=>{
    for(let i=0;i<lsTargets.length;i++){
      if(!lsFilled[i] && lsWordNorm(lsTargets[i])===hw){ lsFilled[i]=true; added++; break; }

  });
  lsRenderSlots();
  return added;
}

// 들은 문장에서 배운 블록을 인식 → SRS 강화 + 세션 기록
let lsSession={blocks:[], words:[], missed:[]};
function lsTrackHeard(en, ko, block){
  if(!en) return;
  // BLE 블록 우선, CORE_PHRASES/SRS는 백업
  if(block && BLE_BY_ID[block]){
    const b=BLE_BY_ID[block];
    bleRecord(b.id, {result:"PERFECT", communicationSuccess:true, targetBlockSuccess:true, situation:"listen", listen:true});
    if(!lsSession.blocks.includes(b.block)) lsSession.blocks.push(b.block);
    try{ refreshRvBanner&&refreshRvBanner(); }catch(e){}
    return;
  }
  const low=" "+en.toLowerCase().replace(/[^a-z' ]/g," ").replace(/\s+/g," ")+" ";
  for(const b of blePriorityBlocks(40, false)){
    const core=bleNorm(b.block.replace(/\.\.\.|\?/g,"")).split(" ").slice(0,3).join(" ");
    if(core.length>=3 && low.indexOf(" "+core)>=0){
      bleRecord(b.id, {result:"PERFECT", communicationSuccess:true, targetBlockSuccess:true, situation:"listen", listen:true});
      if(!lsSession.blocks.includes(b.block)) lsSession.blocks.push(b.block);
      try{ refreshRvBanner&&refreshRvBanner(); }catch(e){}
      return;
    }
  }
  // 명시적 block 필드 우선, 없으면 CORE_PHRASES에서 매칭
  let matched=block||"";
  if(!matched){
    const hit=CORE_PHRASES.find(p=>{ const core=p.phrase.toLowerCase().replace(/[^a-z' ]/g," ").replace(/\.\.\.|\?/g,"").trim().split(" ").slice(0,3).join(" "); return core.length>=3 && low.indexOf(" "+core)>=0; });
    if(hit) matched=hit.phrase;
  }
  if(matched){ srsPass(matched, ko||"", "listen"); if(!lsSession.blocks.includes(matched)) lsSession.blocks.push(matched); }
  try{ refreshRvBanner&&refreshRvBanner(); }catch(e){}
}
// 정답 화면 — 자동 분석 없이 사용자가 선택
// 🧠 학습 컨텍스트 패널 — 방금 배운 문장을 패턴으로 확장 (암기X, 패턴 학습)
let patternCache={};   // en -> {similar:[], realA, realB, upgrade:[]}
// 방금 들은 문장이 블록에서 온 거면 그 블록의 예문으로 즉시 패널 채움 (AI 없음)
function patternFromBlocks(en){
  try{
    const low=(en||"").toLowerCase().replace(/[^a-z' ]/g," ").replace(/\s+/g," ").trim();
    // 같은 블록(phrase) 찾기
    let hit=null;
    for(const p of CORE_PHRASES){
      if(!p.examples) continue;
      const inThis=p.examples.some(ex=>ex.en && ex.en.toLowerCase().replace(/[^a-z' ]/g," ").replace(/\s+/g," ").trim()===low);
      if(inThis){ hit=p; break; }
    }
    if(!hit) return null;
    const sims=hit.examples.map(ex=>ex.en).filter(e=>e && e.toLowerCase().replace(/[^a-z' ]/g," ").replace(/\s+/g," ").trim()!==low).slice(0,3);
    if(!sims.length) return null;
    return { similar:sims, q_en:"", q_ko:"", upgrade:[] };
  }catch(e){ return null; }
}

let floodOn=false, floodCount=0;
function startFlood(){
  if(state.topic) markPractice({mode:"listen", id:state.topic.id, emo:"🎧", label:(state.topic.t||"")+" 흘려듣기"});
  setup.style.display="none"; stage.style.display="none"; $("#listen").style.display="flex"; pushScreen("listen"); try{updateLevelBadges();}catch(e){}
  $("#ctxBar").style.display="flex"; $("#notesToggle").style.display="none"; $("#ttsBtn").style.display="none";
  $("#evalBtn").style.display="none";
  $("#ctxScn").textContent = state.topic.id==="custom" ? "직접 입력" : state.topic.t;
  $("#ctxLvl").textContent = levelName()+" · 흘려듣기";
  floodOn=true; floodCount=0; $("#lnext").style.display="none";
  floodLoop();
}
async function floodLoop(){
  if(!floodOn) return;
  $("#listenScroll").innerHTML=`<div class="lloading">다음 대화 준비 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  let p=null;
  try{
    const data=await callClaude(passageSys(),[{role:"user",content:"Create one dialogue now."}]);
    p=parseJSON(extractText(data));
  }catch(e){ if(floodOn) setTimeout(floodLoop,1800); return; }
  if(!floodOn || !p || !p.lines) return;
  curPassage=p; floodCount++;
  renderFlood(p);
  await playFlood(p);
  if(!floodOn) return;
  await new Promise(r=>setTimeout(r,750));
  floodLoop();
}
function renderFlood(p){
  const sp=p.speakers||{A:"A",B:"B"};
  const enHTML=(p.lines||[]).map(l=>{
    const name=(l.speaker==="B"?sp.B:sp.A)||l.speaker;
    return `<div class="dline ${l.speaker==="B"?"b":"a"}"><span class="spk">${escapeHtml(name)}</span><span class="dl-en">${escapeHtml(l.en||"")}</span></div>`;
  }).join("");
  $("#listenScroll").innerHTML=`<div class="lcard" style="text-align:center">
    <div class="lmeta">🎧 흘려듣기 · ${floodCount}번째 대화</div>
    <div class="ltitle">${escapeHtml(p.title||"Conversation")}</div>
    <div class="flood-wave"><span class="lwave"><i></i><i></i><i></i><i></i><i></i></span></div>
    <div class="ltext show" style="margin-top:6px">${enHTML}</div>
    <button class="sh-next" id="floodStop" style="background:#e7e0d6;color:var(--ink)">⏸ 정지</button>
  </div>`;
  $("#listenScroll").scrollTop=0;
  $("#floodStop").onclick=()=>{ floodOn=false; TTS&&TTS.cancel(); goToSetup(); };
}
function playFlood(p){
  return new Promise(res=>{
    const lines=p.lines||[];
    if(!lines.length || !TTS){ res(); return; }
    TTS.cancel();
    const rate=state.level==="초급"?0.9:state.level==="고급"?1.0:0.96;
    lines.forEach((ln,i)=>{
      const u=new SSU(ln.en||""); u.voice=(ln.speaker==="B"?voiceB:voiceA)||enVoice; u.lang="en-US"; u.rate=rate;
      if(i===lines.length-1) u.onend=()=>res();
      TTS.speak(u);
    });
    setTimeout(()=>{ if(floodOn===false) res(); }, 200);
  });
}

/* ============ review engine (SRS recall) ============ */
const DAY=86400000;
const INTERVALS=[0,1,3,7,16,35]; // days per box

function addReviewItem(en, ko, type, original){
  en=(en||"").trim(); if(!en) return false;
  if(state.notes.some(n=>n.en===en)) return false;
  state.notes.push({en, ko:(ko||"").trim(), type:type||"chunk", original:(original||"").trim(), box:0, due:Date.now(), reps:0, lapses:0});
  return true;
}
function normalizeDeck(){
  state.notes.forEach(n=>{
    if(n.box===undefined) n.box=0;
    if(n.due===undefined) n.due=Date.now();
    if(n.reps===undefined) n.reps=0;
    if(n.lapses===undefined) n.lapses=0;
    if(n.type===undefined) n.type="chunk";
  });
}
function dueCount(){ const t=Date.now(); return state.notes.filter(n=>(n.due||0)<=t).length; }
function refreshRvBanner(){
  const c=dueCount(), has=state.notes.length>0;
  $("#rvBanner").style.display = has?"flex":"none";
  $("#rvCount").textContent=c;
  $("#rvStart").disabled = c===0;
  $("#rvSpeed").disabled = state.notes.length===0;
  $("#rvStart").textContent = c===0?"다 했어요 ✓":"복습 시작";
}
function scheduleItem(n, ok){
  n.reps=(n.reps||0)+1;
  if(ok){ n.box=Math.min((n.box||0)+1, INTERVALS.length-1); }
  else { n.lapses=(n.lapses||0)+1; n.box=Math.max(0,(n.box||0)-2); }
  n.due = Date.now() + INTERVALS[n.box]*DAY;
}
let curScreen="setup";
function pushScreen(which){
  if(which!=="setup"){

}
function enterStage(which){

  stage.style.display = which==="talk"?"flex":"none";

  $("#review").style.display = which==="review"?"flex":"none";

async function generateStudyExplain(two){
  const key="speakingroom:blkx:"+two.join("|");
  const cached=hGet(key,null);
  if(cached){ renderExplain(cached, two); return; }   // 한 번 만든 설명은 즉시
  $("#blkBody").innerHTML=`<div class="lloading">설명을 준비하는 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  $("#blkBarFill").style.width="0%"; $("#blkProgTxt").textContent="설명";
  const sys=[
"Teach these English conversation blocks to a Korean learner (level: "+state.level+"): "+two.map(b=>`"${b}"`).join(" and ")+".",
"For each block give: meaning in Korean, when/how to use it (nuance) in Korean, and 2 short natural example sentences in English.",
"If the two blocks are similar in use, clearly explain the difference in Korean (e.g. politeness, formality, context).",
'Return ONLY JSON: {"blocks":[{"block":"...","meaning":"한국어 의미","when":"언제 어떻게 쓰는지 한국어","examples":["en example 1","en example 2"]}],"compare":"두 블록 차이 한국어 설명, 차이 없으면 빈 문자열"}'
  ].join("\n");
  try{
    const data=await callClaude(sys,[{role:"user",content:"Teach them now."}], FAST_MODEL);

}
function renderExplain(obj, two){
  const blocks=(obj.blocks&&obj.blocks.length)?obj.blocks:two.map(b=>({block:b,meaning:"",when:"",examples:[]}));
  let html=`<div class="expl"><h2>오늘 배울 2개</h2>`;
  blocks.forEach(b=>{
    html+=`<div class="expl-block"><div class="ph">${escapeHtml(b.block||"")}</div>`;
    if(b.meaning) html+=`<div class="mn">${escapeHtml(b.meaning)}</div>`;
    if(b.when) html+=`<div class="wh">${escapeHtml(b.when)}</div>`;
    (b.examples||[]).forEach(ex=>{ html+=`<div class="ex"><span class="exen">${escapeHtml(ex)}</span><span class="exsp" data-say="${escapeAttr(ex)}">🔊</span></div>`; });
    html+=`</div>`;
  });
  if(obj.compare) html+=`<div class="expl-compare"><b>차이:</b> ${escapeHtml(obj.compare)}</div>`;
  html+=`<button class="expl-go" id="explGo">연습 시작 →</button></div>`;
  $("#blkBody").innerHTML=html;
  $("#blkBarFill").style.width="15%"; $("#blkProgTxt").textContent="설명 완료";
  $("#blkBody").querySelectorAll(".exsp").forEach(s=>{ s.onclick=()=>speakEn(s.getAttribute("data-say")); });

let studyItems=[], studyIdx=0;
async function startStudyDrill(two){

"For each item: the situation in Korean (what the learner wants to say), the target block (one of the two), the natural English answer using it, and any common alternative block with a short Korean nuance note.",
'Return ONLY JSON: {"items":[{"ko":"상황","target":"can I get","en":"natural answer","alts":[{"en":"alternative","note":"한국어 뉘앙스"}]}]}'

function showStudyCard(){

function studyDrillDone(){
  $("#blkBarFill").style.width="100%"; $("#blkProgTxt").textContent="완료";

function bankKey(themeId){ return themeId+"@D"+diffLevel(); }
function vbankSave(b){ hSet("speakingroom:vbank",b); }
function ensureSeed(themeId){
  if(diffMacro()>=4) return;   // 중급 이상은 시드(초급 카페단어) 안 씀 — AI 생성만

function takeFromBank(themeId){
  const key=bankKey(themeId);
  const b=vbankGet(); const arr=b[key]||[];
  if(arr.length){ const i=(Math.random()*arr.length)|0; const set=arr.splice(i,1)[0]; b[key]=arr; vbankSave(b); return set; }
  return null;
}
function pushToBank(themeId,set){
  const key=bankKey(themeId);
  const b=vbankGet(); const arr=b[key]||[]; arr.push(set); while(arr.length>6) arr.shift(); b[key]=arr; vbankSave(b);

function vocabWordLevelRule(){
  const v=diffMacro(), micro=diffLevel();
  const map={
1:"WORD DIFFICULTY: absolute beginner. Pick the ~300 most basic English words only (cat, dog, run, eat, big, happy, water). Single common words. NO phrasal verbs, NO idioms, NO abstract nouns.",
2:"WORD DIFFICULTY: beginner (1st grade). Very common concrete everyday words (kitchen, friend, hungry, jump, clean). Simple and frequent only.",
3:"WORD DIFFICULTY: elementary (2nd grade). Common daily words plus a few simple 2-word expressions (pick up, look for). Still high-frequency.",
4:"WORD DIFFICULTY: upper-elementary (CEFR A2). Everyday words + common phrasal verbs (turn on, give up) + simple feelings/opinions words.",
5:"WORD DIFFICULTY: pre-intermediate (CEFR A2-B1). Useful everyday vocabulary, common collocations, basic idioms (run out of, make sure).",

function wpBlanksFor(w){
  const out=[]; const word=w.word||"";
  const mkBlank=(en,ko)=>{

    const re=new RegExp("\\b"+word.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
