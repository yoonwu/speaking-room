// 정답 판정: 답(단어만/문장 전체 둘 다 OK)에 정답 단어(들)가 모두 포함되면 정답.
// 복수형·과거형 등 가벼운 변형도 허용.
function wpMatch(ansNorm, targetNorm){
  if(!ansNorm||!targetNorm) return false;
  if(ansNorm===targetNorm) return true;
  const ansWords=ansNorm.split(/\s+/).filter(Boolean);
  const tgtWords=targetNorm.split(/\s+/).filter(Boolean);
  // 정답의 모든 단어가 답 안에 (어형 변형 허용) 들어있으면 통과
  return tgtWords.every(tw=> ansWords.some(aw=> wpWordEq(aw, tw) ));
}
function wpWordEq(a, b){
  if(a===b) return true;
  // 길이 3 이상일 때 어간 비교 (복수 s/es, 과거 ed, ing 무시)
  const stem=w=> w.replace(/(ies|es|s|ed|ing)$/,"");
  if(a.length>=3 && b.length>=3 && stem(a)===stem(b)) return true;
  return false;
}
function wpKeepTrying(q, answer){
  const status=$("#wpStatus"), inp=$("#wpInput"), panel=$("#wpHintPanel");
  const tries=q._wrongCount||1;
  const nudge = tries>=3 ? " 그래도 막히면 힌트를 보고, 정말 안 되면 정답 보기를 누르세요." : " 다시 생각해서 한 번 더 해보세요.";
  if(status){
    status.style.color="#E2674A";
    status.innerHTML=`"${escapeHtml(answer)}" — 아니에요.${nudge}`;
  }
  if(panel && tries>=2 && panel.style.display==="none"){
    panel.style.display="block";
    panel.innerHTML=`<div style="font-size:13px;font-weight:900;color:var(--text);margin-bottom:6px">조금만 더!</div><div style="font-size:13.5px;color:var(--muted);line-height:1.55">바로 정답을 보지 말고 문장 뜻과 빈칸 위치를 다시 맞춰보세요. 필요하면 힌트 보기를 눌러요.</div>`;
  }
  if(inp && inp.style.display!=="none"){
    inp.value="";
    inp.disabled=false;
    setTimeout(()=>inp.focus(),60);
  }
}
function wpSubmit(q, answer){
  const elapsed=Math.max(0.1,(Date.now()-wpT0)/1000);
  const ans=normAns(answer), target=normAns(q.blank.answer);
  const correct = !!answer && wpMatch(ans, target);
  const gaveUp = !answer;   // "정답 보기" 눌러 빈 답
  // 오답은 정답지로 넘기지 않는다. 같은 문제에서 최대한 다시 생각하게 둔다.
  if(answer && !correct){
    flashResult(false);
    q._wrongCount=(q._wrongCount||0)+1;
    if(!q._missLogged){
      srsFail(q.word.word, q.word.ko, (state.vocabTheme&&state.vocabTheme.id)||"daily");
      q._missLogged=true;
      try{ const arr=hGet("speakingroom:recall",[]); arr.push(Math.round(elapsed*10)/10); hSet("speakingroom:recall", arr.slice(-60)); }catch(e){}
    }
    wpKeepTrying(q, answer);
    return;
  }
  // 💡 정답을 다 보고(전체 공개) 맞힌 경우 → 정답 처리 X, 복습 대기로
  if(answer && correct && q._answerShown){
    if(!q._missLogged){
      srsFail(q.word.word, q.word.ko, (state.vocabTheme&&state.vocabTheme.id)||"daily");
      q._missLogged=true;
    }
    if(!q._retryNow) wpRescheduleFail(q);
    wpResult(q, answer, false, Math.max(0.1,(Date.now()-wpT0)/1000), true);   // 정답 공개 화면(포기 취급)
    return;
  }
  const isRetry = !!q._retryNow;
  wpStats.total++; if(correct) wpStats.correct++;
  const ctxTag=(state.vocabTheme&&state.vocabTheme.id)||"daily";
  if(correct){
    flashResult(true);
    srsPass(q.word.word, q.word.ko, ctxTag);
    const fast=elapsed<4 && !q._wrongCount && !q._hintUsed;
    awardXP("vocab", fast?12:8, "단어 인출 ✅", "wp:"+q.word.word+":"+q.idxInWord+(isRetry?":r":""));
    if(q.idxInWord===0 && !isRetry && !q._wrongCount && !q._hintUsed){ bumpCount("vocab"); questBump("vocab"); }
    q._retryNow=false;
  } else {
    // 포기(정답 보기)
    if(!q._missLogged) srsFail(q.word.word, q.word.ko, ctxTag);
    if(!isRetry) wpRescheduleFail(q);
  }
  try{ const arr=hGet("speakingroom:recall",[]); arr.push(Math.round(elapsed*10)/10); hSet("speakingroom:recall", arr.slice(-60)); }catch(e){}
  wpResult(q, answer, correct, elapsed, gaveUp);
}
function wpRescheduleFail(q){
  // 오답은 한 번만, 남은 새 단어 60~70% 뒤쪽에 넣는다. "새 단어 흐름"을 먼저 살린다.
  const target=normAns(q.word&&q.word.word);
  if(!target) return;
  if(wpQueue.slice(wpPos+1).some(x=>x&&x._retryNow&&normAns(x.word&&x.word.word)===target)) return;
  const mk=()=>({word:{word:q.word.word,ko:q.word.ko}, blank:q.blank, idxInWord:q.idxInWord, totalInWord:q.totalInWord, _retryNow:true, _ctx:q._ctx});
  const rest=wpQueue.slice(wpPos+1);
  const freshLeft=rest.filter(x=>x&&!x._retryNow).length;
  const freshBefore=Math.min(8, Math.max(5, Math.ceil(freshLeft*0.65)));
  let seenFresh=0, p=wpQueue.length;
  for(let i=wpPos+1;i<wpQueue.length;i++){
    if(!wpQueue[i]._retryNow) seenFresh++;
    if(seenFresh>=freshBefore){ p=i+1; break; }
  }
  while(p<wpQueue.length && (wpQueue[p]&&wpQueue[p]._retryNow)) p++;
  if(wpQueue[p-1] && normAns(wpQueue[p-1].word&&wpQueue[p-1].word.word)===target) p++;
  if(wpQueue[p] && normAns(wpQueue[p].word&&wpQueue[p].word.word)===target) p++;
  wpQueue.splice(Math.min(wpQueue.length,p),0,mk());
}

function voStart(words){

  voRound=1; voPos=0; voTimes={}; voOrder=voWords.map((_,i)=>i);

function voNext(){

  $("#vbProgTxt").textContent=`라운드 ${voRound}/2 · ${Math.min(voPos+1,voWords.length)} / ${voWords.length}`;

// 말 끝나면(침묵) 자동 종료 — 고정 타임아웃 대기 제거. 실패 시 maxMs 폴백.
// 🔔 녹음 시작 알림음 ("띵") + 통일된 자동 종료(침묵) 설정
let _ac=null;
function micBeep(){
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    if(_ac.state==="suspended") _ac.resume();
    const o=_ac.createOscillator(), g=_ac.createGain(), t=_ac.currentTime;
    o.type="sine"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1320,t+0.08);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);
    o.connect(g); g.connect(_ac.destination); o.start(t); o.stop(t+0.3);
    if(navigator.vibrate) navigator.vibrate(30);
  }catch(e){}
}
// 모든 마이크 공통: 말 끝나면(침묵) 자동 종료. 통일 파라미터.
const VAD_OPTS={maxMs:12000, silenceMs:600, minSpeechMs:280, thresh:0.02};
function attachVAD(stream, onStop, opts){
  opts=opts||{};
  const maxMs=opts.maxMs||8000, silenceMs=opts.silenceMs||1000, minSpeechMs=opts.minSpeechMs||250, thresh=opts.thresh||0.02;
  const onSpeechStart=typeof opts.onSpeechStart==="function"?opts.onSpeechStart:null;
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    const ac=new AC(); const src=ac.createMediaStreamSource(stream);
    const an=ac.createAnalyser(); an.fftSize=512; src.connect(an);
    const buf=new Uint8Array(an.fftSize);
    const t0=Date.now(); let lastLoud=0, spoke=false, started=false, done=false;
    function fin(){ if(done)return; done=true; try{ac.close();}catch(e){} onStop(); }
    function tick(){
      if(done)return;
      an.getByteTimeDomainData(buf);
      let sum=0; for(let i=0;i<buf.length;i++){ const v=(buf[i]-128)/128; sum+=v*v; }
      const rms=Math.sqrt(sum/buf.length), now=Date.now();
      if(rms>thresh){
        lastLoud=now;
        if(!started && now-t0>minSpeechMs){ started=true; if(onSpeechStart) onSpeechStart(now); }
        if(now-t0>minSpeechMs) spoke=true;
      }
      if(spoke && lastLoud && (now-lastLoud)>silenceMs){ return fin(); }
      if(now-t0>maxMs){ return fin(); }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    return ()=>{ if(!done){ done=true; try{ac.close();}catch(e){} } };
  }catch(e){
    const id=setTimeout(onStop, maxMs);
    return ()=>clearTimeout(id);
  }
}
async function micFillCb(cb){
  if(qzRecording){ return; }
  try{
    const meta={startAt:Date.now(), speechStartAt:null, stopAt:null, sttDoneAt:null};
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    qzChunks=[]; const mime=getBestMime();
    qzMR= mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    const am=qzMR.mimeType||mime;
    qzMR.ondataavailable=e=>{ if(e.data.size>0) qzChunks.push(e.data); };
    qzMR.onstop=async()=>{
      meta.stopAt=Date.now();
      stream.getTracks().forEach(t=>t.stop()); qzRecording=false;
      const raw=new Blob(qzChunks,{type:am}); if(raw.size<1000){ cb("", meta); return; }
      try{
        const res=await sttRecognize(raw, am);
        const data=await res.json();
        meta.sttDoneAt=Date.now();
        cb(data.DisplayText? data.DisplayText.replace(/[.?!]$/,""):"", meta);
      }catch(e){ cb("", meta); }
    };
    micBeep(); qzMR.start(250); qzRecording=true;
    attachVAD(stream, ()=>{ if(qzRecording&&qzMR&&qzMR.state!=="inactive") qzMR.stop(); }, {...VAD_OPTS, onSpeechStart:(t)=>{ meta.speechStartAt=t; }});

/* ============ speech synthesis (TTS) ============ */
let enVoice=null, voiceA=null, voiceB=null, koVoice=null;
function pickVoice(){
  const vs=TTS.getVoices().filter(v=>/^en/i.test(v.lang));
  const kos=TTS.getVoices().filter(v=>/^ko/i.test(v.lang));
  koVoice = kos.find(v=>/Google|Yuna|Female|Heami/i.test(v.name)) || kos[0] || null;
  if(!vs.length) return;
  const us=vs.filter(v=>/en-US/i.test(v.lang));
  const pool = us.length>=2 ? us : vs;
  voiceA = pool.find(v=>/Google US English|Samantha|Aria|Jenny|Zira|Female/i.test(v.name)) || pool[0];
  voiceB = pool.find(v=>v!==voiceA && /Male|David|Mark|Daniel|Alex|Google UK English Male|Guy/i.test(v.name))
        || pool.find(v=>v!==voiceA) || voiceA;
  enVoice = voiceA;
}
if(TTS){
  pickVoice();
  TTS.onvoiceschanged=pickVoice;
}
// 한·영 혼합 문장을 자동으로 나눠 각각 한국어/영어 음성으로 읽기
function speakSmart(text){
  if(!TTS||!SSU||!text) return;
  TTS.cancel();
  const s=String(text); const segs=[]; let cur="", curKo=null;
  for(const ch of s){
    const ko=/[\uac00-\ud7a3]/.test(ch);
    const neutral=/[\s0-9.,!?~…·"'()\[\]%:;\-—’“”]/.test(ch);
    if(cur===""){ cur=ch; curKo=ko; }
    else if(neutral){ cur+=ch; }
    else if(ko===curKo){ cur+=ch; }
    else { segs.push([cur,curKo]); cur=ch; curKo=ko; }
  }
  if(cur) segs.push([cur,curKo]);
  let i=0;
  (function go(){
    if(i>=segs.length) return;
    const seg=segs[i][0], ko=segs[i][1]; i++;
    if(!seg.trim()){ go(); return; }
    const u=new SSU(seg);
    if(ko){ if(koVoice) u.voice=koVoice; u.lang="ko-KR"; u.rate=0.98; }
    else { if(enVoice) u.voice=enVoice; u.lang="en-US"; u.rate=(typeof levelRate==="function")?levelRate(false):0.97; }
    u.onend=()=>setTimeout(go,70);
    TTS.speak(u);
  })();
}
function speak(text){ speakSmart(text); }

let mediaRec=null, listening=false, audioChunks=[];
function initRec(){
  if(!navigator.mediaDevices){ micBtn.style.display="none"; return; }

function getBestMime(){
  const types=["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4","audio/aac"];
  return types.find(t=>MediaRecorder.isTypeSupported(t)) || "";
}
// 녹음 blob → WAV(PCM 16kHz mono). Azure가 제일 확실하게 받는 포맷.
function encodeWAV(samples, rate){
  const buf=new ArrayBuffer(44+samples.length*2), v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+samples.length*2,true); ws(8,"WAVE");
  ws(12,"fmt "); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,samples.length*2,true);
  let o=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2; }
  return buf;
}
// decodeAudioData를 프로미스/콜백 양쪽으로 시도 (일부 기기는 콜백만 지원)
function decodeAudioCompat(ac, arrayBuf){
  return new Promise((resolve,reject)=>{
    let done=false;
    try{
      const p=ac.decodeAudioData(arrayBuf.slice(0),
        (b)=>{ if(!done){done=true;resolve(b);} },
        (e)=>{ if(!done){done=true;reject(e||new Error("decode fail"));} });
      if(p && typeof p.then==="function"){
        p.then(b=>{ if(!done){done=true;resolve(b);} })
         .catch(e=>{ if(!done){done=true;reject(e);} });
      }
    }catch(e){ if(!done){done=true;reject(e);} }
  });
}
async function recordedToWav(blob){
  const arrayBuf=await blob.arrayBuffer();
  const AC=window.AudioContext||window.webkitAudioContext;
  const tmp=new AC();
  // 재생용으로 일시정지된 AudioContext 깨우기 (일부 안드로이드)
  if(tmp.state==="suspended"){ try{ await tmp.resume(); }catch(_){} }
  let decoded=null, lastErr=null;
  // 원본 + webm 재포장 두 가지 시도
  for(const ab of [arrayBuf, arrayBuf]){
    try{ decoded=await decodeAudioCompat(tmp, ab); break; }
    catch(e){ lastErr=e; }
  }
  if(!decoded){ tmp.close && tmp.close(); throw lastErr||new Error("decode fail"); }
  tmp.close && tmp.close();
  const rate=16000;
  const off=new OfflineAudioContext(1, Math.max(1,Math.ceil(decoded.duration*rate)), rate);
  const src=off.createBufferSource(); src.buffer=decoded; src.connect(off.destination); src.start(0);
  const rendered=await off.startRendering();
  return new Blob([encodeWAV(rendered.getChannelData(0), rate)], {type:"audio/wav"});
}
// WAV 변환 시도 → 실패하면 원본(webm/opus 등) 그대로 STT. Azure는 webm-opus도 받음.
async function sttRecognize(raw, actualMime){
  let body, ctype;
  try{ body=await recordedToWav(raw); ctype="audio/wav"; }
  catch(_){
    // 디코드 실패 기기 → 원본 컨테이너 그대로 전송
    body=raw;
    ctype = /webm/.test(actualMime) ? "audio/webm; codecs=opus"
          : /ogg/.test(actualMime)  ? "audio/ogg; codecs=opus"
          : /mp4|aac/.test(actualMime) ? "audio/mp4"
          : (actualMime||"audio/webm; codecs=opus");
  }
  return fetch(PROXY_URL+"/stt",{method:"POST",headers:{"Content-Type":ctype},body});
}

function stopDrillMic(){ if(drillMR&&drillMR.state!=="inactive"){ drillMR.stop(); drillRecording=false; } }
function renderDrillResult(data){
  const r=$("#drillResult"); if(!r) return;
  const n=data?.NBest?.[0];
  // REST detailed 포맷은 점수를 NBest[0] 바로 위에 둠. (SDK는 .PronunciationAssessment 중첩)
  const pa = n && (n.PronunciationAssessment || (n.AccuracyScore!=null ? n : null));
  if(!pa){
    const st=data?.RecognitionStatus||"(상태없음)";
    const heard=data?.DisplayText||n?.Display||"";
    let msg;
    if(st==="Success"||heard){ msg=`인식은 됐는데 점수가 안 왔어요.<br>들린 말: "${escapeHtml(heard||"?")}"`; }
    else if(/NoMatch|Silence|InitialSilence/i.test(st)){ msg=`소리가 잘 안 잡혔어요 🔇<br>마이크 가까이서 또렷하게 다시 말해보세요.`; }
    else { msg=`상태: ${escapeHtml(st)}`; }
    const raw=(window._lastPronounceRaw||"").slice(0,700);
    r.innerHTML=`<div style="color:var(--muted);text-align:center;font-size:13px;line-height:1.6">${msg}</div>
      <details style="margin-top:12px"><summary style="font-size:12px;color:var(--muted);cursor:pointer">🔧 진단 정보 (개발용)</summary>
      <pre style="white-space:pre-wrap;word-break:break-all;font-size:10.5px;color:#8b948c;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;max-height:160px;overflow:auto">${escapeHtml(raw||"(빈 응답)")}</pre>
      <button id="copyRaw" style="margin-top:6px;width:100%;padding:8px;border-radius:8px;background:var(--mist);color:var(--text);border:1px solid var(--line);font-size:12px">📋 진단 정보 복사</button></details>`;
    const cr=$("#copyRaw"); if(cr) cr.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(window._lastPronounceRaw||""); cr.textContent="복사됨 ✓"; };
    return;
  }
  const acc=Math.round(pa.AccuracyScore||0);
  const flu=Math.round(pa.FluencyScore||0);
  const comp=Math.round(pa.CompletenessScore||0);
  // Azure가 PronScore(종합)를 주면 그걸 우선 사용
  const overall=Math.round(pa.PronScore!=null ? pa.PronScore : (acc*0.5+flu*0.3+comp*0.2));
  const color=overall>=80?"#FF8568":overall>=60?"#e6ad4a":"#e0533f";
  const emoji=overall>=80?"😊":overall>=60?"🙂":"😅";
  // 단어별 색상 (점수는 단어 객체 바로 위 또는 중첩 둘 다 대응)
  const words=(n?.Words||[]);
  const wordHtml=words.map(w=>{
    const ws=Math.round((w.PronunciationAssessment&&w.PronunciationAssessment.AccuracyScore!=null?w.PronunciationAssessment.AccuracyScore:w.AccuracyScore)||0);
    const wc=ws>=80?"#FF8568":ws>=60?"#e6ad4a":"#e0533f";
    return `<span style="color:${wc};font-family:var(--serif);font-size:17px;margin:0 3px" title="${ws}점">${escapeHtml(w.Word)}</span>`;
  }).join(" ");
  // XP 지급 — 80점 이상이면 확실히 보상
  const xp = overall>=80 ? Math.max(5, Math.round(overall/10)) : Math.round(overall/10);
  if(xp>0) awardXP("phonics",xp,"발음 드릴","drill:"+(drillTarget||""));
  r.innerHTML=`
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:48px;font-weight:900;color:${color}">${overall}</div>
      <div style="font-size:13px;color:var(--muted)">/ 100 ${emoji}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${acc>=80?"#FF8568":acc>=60?"#e6ad4a":"#e0533f"}">${acc}</div>
        <div style="font-size:11px;color:var(--muted)">정확도</div>
      </div>
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${flu>=80?"#FF8568":flu>=60?"#e6ad4a":"#e0533f"}">${flu}</div>
        <div style="font-size:11px;color:var(--muted)">유창성</div>
      </div>
      <div style="flex:1;background:var(--mist);border-radius:12px;padding:10px;text-align:center">
        <div style="font-size:18px;font-weight:800;color:${comp>=80?"#FF8568":comp>=60?"#e6ad4a":"#e0533f"}">${comp}</div>
        <div style="font-size:11px;color:var(--muted)">완성도</div>
      </div>
    </div>
    ${wordHtml?`<div style="text-align:center;line-height:2;margin-bottom:8px">${wordHtml}</div>`:""}
    <div style="font-size:11.5px;color:var(--muted);text-align:center">초록=잘함 · 노랑=보통 · 빨강=연습 더 필요 · +${xp}XP 획득!</div>`;
}

function phShuf(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function phStars(add){ let n=hGet("speakingroom:kidstars",0); if(add){ n+=add; hSet("speakingroom:kidstars",n); } return n; }
function speakRate(text,rate){ if(!TTS||!SSU)return; TTS.cancel(); const u=new SSU(text); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=rate||0.9; TTS.speak(u); }
function speakChain(parts){ if(!TTS||!SSU)return; TTS.cancel(); let i=0; (function go(){ if(i>=parts.length)return; const p=parts[i++]; const u=new SSU(p.t); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=p.rate||0.9; u.onend=()=>setTimeout(go,p.gap||120); TTS.speak(u); })(); }

// 아이용 발음 녹음 → 점수(0~100). 탭하면 녹음, 3.2초 후 자동 종료
let phMR=null, phRec=false;
function phMic(ref, btn, cb){
  if(phRec){ if(phMR&&phMR.state!=="inactive") phMR.stop(); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let chunks=[]; const mime=getBestMime();
    phMR=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    const am=phMR.mimeType||mime; phRec=true; if(btn) btn.classList.add("rec");
    phMR.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    phMR.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); phRec=false; if(btn) btn.classList.remove("rec");
      const raw=new Blob(chunks,{type:am}); if(raw.size<1000){ cb(null); return; }
      try{ const wav=await recordedToWav(raw);
        const b64=btoa(unescape(encodeURIComponent(ref)));
        const res=await fetch(PROXY_URL+"/pronounce",{method:"POST",headers:{"Content-Type":"audio/wav","X-Pronunciation-Text-B64":b64},body:wav});
        const t=await res.text(); let d; try{d=JSON.parse(t);}catch(e){d=null;}
        const n=d&&d.NBest&&d.NBest[0]; const pa=n&&(n.PronunciationAssessment||(n.AccuracyScore!=null?n:null));
        const heard=(d&&d.DisplayText)||(n&&(n.Display||n.Lexical))||"";
        const score=pa?Math.round(pa.PronScore!=null?pa.PronScore:(pa.AccuracyScore||0)):null;
        cb({score:score, heard:String(heard||"").replace(/[.?!,]/g,"").trim(), status:(d&&d.RecognitionStatus)||""});
      }catch(e){ cb(null); }
    };
    micBeep(); phMR.start(250);
    attachVAD(stream, ()=>{ if(phRec&&phMR&&phMR.state!=="inactive") phMR.stop(); }, VAD_OPTS);
  }).catch(e=>cb(null));
}

function bleCheckSetIntro(set){

  // 구버전 상태 마이그레이션
  const st=s[id];

    let idx=Math.min(st.successCount, BLE_INTERVALS_MIN.length-1);
    if(!fast && idx>0) idx=Math.max(0, idx-1);
    st.nextReviewAt=bleNow()+BLE_INTERVALS_MIN[idx]*60*1000;
  }

}
// 답 결과 기록 (블록 사용 성공 / 상황 / 속도)
function bleRecord(id, opts){
  opts=opts||{};
  bleBlockState(id);
  const s=bleGetState();
  const stt=s[id];
  // result: "PERFECT" | "HIT" | "WEAK_HIT" | "MISS"
  const result=opts.result||(opts.correct?"PERFECT":"MISS");
  const fast=!!opts.fast, situation=opts.situation||"", contextKey=opts.contextKey||situation, ms=opts.ms;
  stt.communicationSuccessCount=stt.communicationSuccessCount||0;
  stt.blockAvoidCount=stt.blockAvoidCount||0;
  stt.targetMissCount=stt.targetMissCount||0;
  stt.hiddenSuccessCount=stt.hiddenSuccessCount||0;
  stt.speedAttemptCount=stt.speedAttemptCount||0;
  const communicationSuccess = opts.communicationSuccess!=null ? !!opts.communicationSuccess : (result==="PERFECT"||result==="HIT");
  const targetBlockSuccess = opts.targetBlockSuccess!=null ? !!opts.targetBlockSuccess : result==="PERFECT";
  if(opts.speedAttempt) stt.speedAttemptCount++;
  if(opts.review7d || (targetBlockSuccess && stt.lastSeenAt && (bleNow()-stt.lastSeenAt)>=6*86400000)){
    stt.review7dSuccessCount=(stt.review7dSuccessCount||0)+1;
  }
  if(result==="PERFECT"){
    // 의미 맞고 + 타겟 블록 사용 + 충분히 빠름
    stt.successCount++; stt.communicationSuccessCount++; stt.consecFails=0;
    if(contextKey && stt.contextsUsed.indexOf(contextKey)<0) stt.contextsUsed.push(contextKey);
    if(fast) stt.fastCount++; else stt.slowCount++;
    if(opts.mixed) stt.mixedSuccessCount++;
    if(opts.hidden) stt.hiddenSuccessCount++;
  } else if(result==="HIT"){
    // 의미는 통했지만 타겟 블록 안 씀 → 마스터리 안 올림
    stt.communicationSuccessCount++; stt.consecFails=0;
    stt.blockAvoidCount++;
    stt.targetMissCount++;
  } else if(result==="WEAK_HIT"){
    // 어설픔 → 약점 표시, 마스터리 보류
    stt.slowCount++;
    if(!targetBlockSuccess) stt.targetMissCount++;
  } else { // MISS
    stt.failCount++; stt.consecFails=(stt.consecFails||0)+1;
    if(!targetBlockSuccess) stt.targetMissCount++;
  }
  if(communicationSuccess && !targetBlockSuccess && result!=="HIT"){
    stt.blockAvoidCount++;
  }
  if(opts.deep) stt.deepPracticeCount=(stt.deepPracticeCount||0)+1;
  if(opts.listen) stt.listeningSuccessCount=(stt.listeningSuccessCount||0)+1;
  if(opts.real) stt.realConversationSuccessCount=(stt.realConversationSuccessCount||0)+1;
  // 헷갈린 블록 기록
  if(opts.confusedWith){ stt.confusedWith=stt.confusedWith||{}; stt.confusedWith[opts.confusedWith]=(stt.confusedWith[opts.confusedWith]||0)+1; }
  if(typeof ms==="number" && ms>0 && targetBlockSuccess){ stt.avgMs = stt.avgMs==null? ms : Math.round((stt.avgMs*stt.samples+ms)/(stt.samples+1)); stt.samples++; }
  // 단계 갱신
  stt.stage=bleComputeStage(stt);
  s[id]=stt; bleSaveState(s);
  // 복습 스케줄: 타겟 블록 성공만 간격을 늘린다. 의미만 통하면 곧 다시.
  bleScheduleNext(id, targetBlockSuccess, fast && targetBlockSuccess);
}
// 단계 계산 (P9 엄격 게이트)
function bleComputeStage(st){
  const ctx=(st.contextsUsed||[]).length;
  const succ=st.successCount||0;       // PERFECT(타겟블록 인출 성공) 횟수
  const mixed=st.mixedSuccessCount||0;
  const fast=st.fastCount||0;
  const hidden=st.hiddenSuccessCount||0;
  const review7=st.review7dSuccessCount||0;
  // READY/STRONG은 즉석 반복이 아니라 다른 상황, 혼합, 속도, 장기복습까지 통과해야 한다.
  if(succ>=8 && ctx>=6 && mixed>=3 && fast>=2 && review7>=1) return "ready_for_real";
  if(succ>=6 && ctx>=5 && mixed>=3 && fast>=2 && review7>=1) return "strong";
  // FAST: 힌트 없는 상황에서 5초 이내 인출 3회
  if(fast>=3 && hidden>=2 && succ>=3) return "fast";
  // ACTIVE: 인출 3회 + 3상황
  if(succ>=3 && ctx>=3 && mixed>=1) return "active";
  // RETRIEVED: 숨김 인출 1회 성공
  if(succ>=1) return "retrieved";
  if(succ===0 && (st.failCount||0)===0) return "learning";
  return "learning";
}

// 블록 마스터 별 (7칸)
function bleStars(id){
  const order=["new","learning","retrieved","active","strong","fast","ready_for_real"];
  const st=bleGetState()[id]; const stage=st?st.stage:"new";
  let lv=order.indexOf(stage); if(lv<0) lv=0; lv=lv+1;
  return "★".repeat(lv)+"☆".repeat(7-lv);
}

function getLearnedBlocks(){ const s=bleGetState(); return BLE_BLOCKS.filter(b=>s[b.id]).map(b=>({...b, state:s[b.id]})); }
function getWeakBlocks(){ const s=bleGetState(); return BLE_BLOCKS.filter(b=>s[b.id]&&s[b.id].failCount>=2&&s[b.id].failCount>s[b.id].successCount).map(b=>({...b,state:s[b.id]})); }
function getDueReviewBlocks(){ const s=bleGetState(); const now=bleNow(); return BLE_BLOCKS.filter(b=>s[b.id]&&s[b.id].nextReviewAt&&s[b.id].nextReviewAt<=now).map(b=>({...b,state:s[b.id]})); }
function getReadyForRealBlocks(){ const s=bleGetState(); return BLE_BLOCKS.filter(b=>s[b.id]&&s[b.id].stage==="ready_for_real").map(b=>({...b,state:s[b.id]})); }
function getRecentlyLearnedBlocks(){ const s=bleGetState(); return BLE_BLOCKS.filter(b=>s[b.id]).sort((a,b)=>(s[b.id].lastSeenAt||0)-(s[a.id].lastSeenAt||0)).slice(0,3).map(b=>({...b,state:s[b.id]})); }
function bleUniqueBlocks(lists, limit){
  const out=[], seen=new Set();
  lists.flat().forEach(b=>{ if(b && b.id && !seen.has(b.id)){ seen.add(b.id); out.push(b); } });
  return out.slice(0, limit||999);
}
function blePriorityBlocks(limit, includeLocked){
  const unlocked=bleUnlockedBlocks();
  const fallback=includeLocked ? getLearnedBlocks() : unlocked;
  return bleUniqueBlocks([
    getSlowBlocks(),
    getDueReviewBlocks(),
    getWeakBlocks(),
    getRecentlyLearnedBlocks(),
    getReadyForRealBlocks(),
    fallback
  ], limit||20);
}
function bleItemFromBlock(b){
  const src=BLE_BY_ID[b.id]||b;

  return {ko:ex.ko, en:ex.en, tag:ex.situation||"ble", pid:"ble:"+src.id, chunk:src.block, chunkKo:src.meaningKo, block:src.block, bleId:src.id};
}

// 70% 배운/due/약한 블록 / 20% 혼합 / 10% 새 상황
function bleMaterialsForMode(mode){
  const blocks=blePriorityBlocks(16, false);
  if(!blocks.length) return null;
  const due=getDueReviewBlocks(), weak=getWeakBlocks(), slow=getSlowBlocks(), ready=getReadyForRealBlocks(), recent=getRecentlyLearnedBlocks();
  const lines=blocks.map(b=>{ const ex=bleFreshContextEx2(BLE_BY_ID[b.id]||b); return {id:b.id, block:b.block, ko:ex.ko, en:ex.en, meaningKo:b.meaningKo}; });
  return {
    blocks: lines,
    weak: weak.map(b=>b.block),
    slow: slow.map(b=>b.block),
    due: due.map(b=>b.block),
    ready: ready.map(b=>b.block),
    recent: recent.map(b=>b.block),
    count: bleUnlockedBlocks().length
  };
}

function bleSpeakingHint(){
  const m=bleMaterialsForMode("speaking"); if(!m||!m.blocks.length) return "";
  const ex=m.blocks.slice(0,8).map(x=>`- ${x.ko} (목표 블록: ${x.block})`).join("\n");
  return `\nLEARNED-BLOCK FOCUS — The learner has studied these speaking blocks. About 70% of the time, create Korean situations where ONE of these blocks is the natural answer. 20% mix freely, 10% fresh.\n${ex}\n`;
}

function bleLightningItems(n){
  const ranked=blePriorityBlocks(40, false);
  if(!ranked.length) return [];
  const out=[]; let i=0;
  while(out.length<(n||10) && i<(n||10)*4){
    out.push(bleItemFromBlock(ranked[i%ranked.length]));
    i++;
  }
  return out.slice(0,n||10);
}

async function bleJudge(targetBlock, ex, heard){

    const sys=`You are a strict but fair Korean-to-English speaking coach judging ONE spoken answer.
${speakingLearningLaw()}

Other blocks the learner knows (for confusedWith):
${others||"(none)"}

Judge the learner's spoken answer. Rules:
- Accept imperfect grammar if the meaning is clearly communicated.
- Do NOT require exact wording.
- Mark targetBlockSuccess TRUE only if the studied TARGET block "${targetBlock.block}" was actually used.
- If a different but valid expression communicates it, result=HIT (not PERFECT), targetBlockSuccess=false.
- If the learner used a different known block, set confusedWith to that block id.
- result: PERFECT (meaning right + target block used), HIT (meaning right, different expression), WEAK_HIT (partial/awkward/incomplete), MISS (wrong/unrelated/empty).
- Keep shortFeedbackKo to ONE short Korean sentence.

    const d=await callClaude(sys, [{role:"user", content:"Learner said: "+heard}], FAST_MODEL);
    const o=parseJSON(extractText(d));
    if(o && o.result){
      let result=String(o.result||"MISS").toUpperCase();
      if(!["PERFECT","HIT","WEAK_HIT","MISS"].includes(result)) result="MISS";
      const communicationSuccess=!!o.communicationSuccess;
      const targetBlockSuccess=!!o.targetBlockSuccess;
      if(result==="PERFECT" && (!communicationSuccess || !targetBlockSuccess)){
        result=communicationSuccess ? "HIT" : "WEAK_HIT";
      }
      if(result==="HIT" && targetBlockSuccess && !communicationSuccess) result="WEAK_HIT";
      return {
        result,

        targetBlockSuccess,
        usedBlockId:o.usedBlockId&&o.usedBlockId!=="null"?o.usedBlockId:null,
        confusedWith:o.confusedWith&&o.confusedWith!=="null"?o.confusedWith:null,
        naturalAnswer:o.naturalAnswer||ex.en,

        unknownWords: Array.isArray(o.unknownWords)? o.unknownWords.filter(w=>w&&w.en&&w.ko).slice(0,5) : []
      };
    }
  }catch(e){}
  return local;
}

// ===== 답 채점 (4단계, 여러 표현 허용) =====
function bleNorm(t){ return String(t||"").toLowerCase().replace(/[^a-z0-9' ]/g," ").replace(/\s+/g," ").trim(); }
const BLE_STOPWORDS=new Set("i you he she we they it a an the some any to for of in on at with my your me us this that is are am be do does did can could would should may might get got have has had please just now".split(" "));
function bleWords(t){ return bleNorm(t).split(" ").filter(Boolean); }
function bleContentWords(t){ return bleWords(t).filter(w=>!BLE_STOPWORDS.has(w)); }
function bleCoreWords(targetBlock){
  return bleWords(String(targetBlock.block||"").replace(/\.\.\.|\?/g,"")).filter(w=>!BLE_STOPWORDS.has(w));
}
function bleMeaningScore(targetBlock, expectedEn, heard){
  const core=new Set(bleCoreWords(targetBlock));
  let exp=bleContentWords(expectedEn).filter(w=>!core.has(w));
  const hw=new Set(bleContentWords(heard));
  if(!exp.length) exp=bleContentWords(expectedEn);
  const hit=exp.filter(w=>hw.has(w)).length;
  const ratio=hit/Math.max(1, exp.length);
  return {ratio, hit, need:exp.length, strong:hit>=Math.max(1, Math.ceil(exp.length*0.67)), weak:hit>=1 || ratio>=0.34};
}
function bleGrade(targetBlock, expectedEn, heard){
  const h=bleNorm(heard), exp=bleNorm(expectedEn);
  if(!h) return {grade:"miss", blockUsed:false};
  // 타겟 블록의 핵심부 (Can I get, Do you have...)
  const core=bleNorm(targetBlock.block.replace(/\.\.\.|\?/g,""));
  const blockUsed = core.length>=3 && (" "+h+" ").indexOf(" "+core)>=0;
  const meaning=bleMeaningScore(targetBlock, exp, h);
  if(blockUsed && meaning.strong) return {grade:"perfect", blockUsed:true};
  if(blockUsed) return {grade:"weak_hit", blockUsed:true};   // 블록은 썼지만 목적어/의도가 약함
  if(meaning.strong) return {grade:"hit", blockUsed:false};  // 의미는 통하지만 목표 블록 회피
  if(meaning.weak) return {grade:"weak_hit", blockUsed:false};
  return {grade:"miss", blockUsed:false};
}

function bleWeightedPick(blocks, newId){
  if(!blocks.length) return null;
  const s=bleGetState(), now=bleNow();
  const scored=blocks.map(b=>{
    const st=s[b.id]||{}; let w=1;
    if(st.nextReviewAt&&st.nextReviewAt<=now) w+=5;
    if((st.failCount||0)>0 && (st.failCount||0)>=(st.successCount||0)) w+=4;
    if(st.avgMs&&st.avgMs>5000) w+=2;
    if((st.targetMissCount||0)>0) w+=2;
    if((st.contextsUsed||[]).length<=1 && (st.successCount||0)>0) w+=1.5;
    if(b.id===newId) w+=2;
    if(bleIsStrongPracticeBlock(b)) w=Math.max(0.4,w-2);
    return {b,w:Math.max(0.2,w)};
  });

  const strong=eligible.filter(bleIsStrongPracticeBlock);

function bleAddSessionPractice(items, pool, type, preferred, extra){

    const filler=blePickPracticeBlock(pool.filter(x=>x.id!==preferred.id), items, preferred.id);
    if(!filler) break;
    const fx=bleFreshContextEx2(filler);
    items.push({type:"mixed", block:filler, ex:fx});

    guard++;
  }

  if(!b) return null;
  bleEnsureContexts(b);
  const ex=bleFreshContextEx2(b);

  bleRememberBlock(b.id);

function bleBuildSetIntro(set){

  const todo=blocks.filter(b=>!bleBlockIntroduced(b.id));
  const introList = todo.length? todo : blocks;   // 다 소개됐으면 전체 복습
  introList.forEach(b=>{
    items.push({type:"understand", block:b, setIntro:true});
    bleEnsureContexts(b);
    items.push({type:"situation", block:b, ex:bleFreshContextEx2(b), introHidden:true, quickCheck:true, setIntro:true});
  });
  // 🎯 미니 혼합 테스트: 5개 블록을 섞어서 "상황만 보고 알맞은 블록 고르기" (블록명 숨김, 5지선다)

  const testBlocks=blocks.slice();
  for(let i=testBlocks.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [testBlocks[i],testBlocks[j]]=[testBlocks[j],testBlocks[i]]; }
  testBlocks.forEach(b=>{ bleEnsureContexts(b); items.push({type:"discriminate", block:b, ex:bleFreshContextEx2(b), setIntro:true, miniTest:true, allOptions:true}); });

function bleUnlockGate(block, results){
  const mine=(results||[]).filter(r=>r.id===block.id && ["situation","mixed","speed","discriminate"].includes(r.type));
  const targetOk=r=>r.result==="PERFECT" || r.target===true;
  const hiddenOk=mine.some(r=>r.type==="situation" && targetOk(r));
  const mixedOrDiscOk=mine.some(r=>(r.type==="mixed"||r.type==="discriminate") && targetOk(r));
  const competitionAvailable=!!(bleSession&&bleSession.startedIds&&bleSession.startedIds.filter(id=>id!==block.id).length);
  const speedAttempt=mine.some(r=>r.type==="speed");
  const speedFastOk=mine.some(r=>r.type==="speed" && targetOk(r) && r.fast);
  const contextN=new Set(mine.filter(targetOk).map(r=>r.contextKey||r.situation).filter(Boolean)).size;
  const okN=mine.filter(targetOk).length;
  const rate=mine.length ? okN/mine.length : 0;
  return {pass:hiddenOk && (!competitionAvailable||mixedOrDiscOk) && speedAttempt && contextN>=2 && rate>=0.60, hiddenOk, mixedOrDiscOk, competitionAvailable, speedAttempt, speedFastOk, contextN, rate, okN, total:mine.length};
}
function bleStartUnlockRepair(block){
  const poolIds=[...new Set([...bleUnlockedBlocks().map(b=>b.id), block.id])];

  bleRender();
}

// ============================================================
// 🔁 DEEP PRACTICE ENGINE — 본격 학습 (끝없는 반복 인출)
// 잠금해제된 블록을 약점 기반으로 계속 꺼냄. 7단계 코스와 별개.
// ============================================================
let bleDeep=null;   // {queue:[], history:[], results:[], count, repairing}
let bleLastReason="mixed_test";
// 가중치 기반으로 다음 블록 하나 선택 (우선순위: due > weak > 혼동 > 느림 > 단일맥락 > 최근 > 강함)
function bleDeepPickBlock(){
  const unlocked=bleUnlockedBlocks(); if(!unlocked.length) return null;
  const s=bleGetState(); const now=bleNow();
  const recent=new Set((bleDeep&&bleDeep.history?bleDeep.history.slice(-bleEffectiveGap(unlocked)):[]).concat(bleRecentBlocks().slice(0, Math.min(BLE_BLOCK_GAP, Math.max(1,unlocked.length-1)))));
  let candidates=unlocked.length>1?unlocked.filter(b=>!recent.has(b.id)):unlocked.slice();
  if(!candidates.length) candidates=unlocked.slice();
  // 연속 2회 제한: 직전 2개가 같은 블록이면 그 블록 제외
  if(bleDeep && bleDeep.history && bleDeep.history.length>=2 && unlocked.length>1){
    const h=bleDeep.history; const lastId=h[h.length-1];
    if(lastId===h[h.length-2]){ const f=candidates.filter(b=>b.id!==lastId); if(f.length) candidates=f; }
  }
  // 35% 상한: 한 블록이 세션의 35% 초과하면 제외 (충분히 진행됐을 때만)
  if(bleDeep && bleDeep.history && bleDeep.history.length>=6 && unlocked.length>1){
    const counts={}; bleDeep.history.forEach(id=>counts[id]=(counts[id]||0)+1);
    const cap=Math.ceil(bleDeep.history.length*0.35);
    const under=candidates.filter(b=>(counts[b.id]||0)<cap);
    if(under.length) candidates=under;
  }
  const weak=candidates.filter(bleIsWeakPracticeBlock);
  const recentBucket=candidates.filter(b=>bleIsRecentPracticeBlock(b,null)&&!weak.some(x=>x.id===b.id));
  const strong=candidates.filter(bleIsStrongPracticeBlock);
  const r=Math.random();
  let bucket = r<0.70 ? weak : (r<0.90 ? recentBucket : strong);
  if(!bucket.length) bucket=candidates;
  const picked=bleWeightedPick(bucket, null)||candidates[0];
  const st=s[picked.id]||{};
  if(st.nextReviewAt&&st.nextReviewAt<=now) bleLastReason="due_review";
  else if(Object.keys(st.confusedWith||{}).length) bleLastReason="confusion";
  else if((st.failCount||0)>0 || (st.consecFails||0)>0 || (st.targetMissCount||0)>0) bleLastReason="weak_block";
  else if(st.avgMs&&st.avgMs>5000) bleLastReason="slow_block";
  else if((st.contextsUsed||[]).length<=1) bleLastReason="context_gap";
  else if(bleIsStrongPracticeBlock(picked)) bleLastReason="maintenance";
  else bleLastReason="mixed_test";
  return picked;
}
// 블록 하나에 대해 약점에 맞는 문제 유형 선택 — 같은 블록 반복 시 유형을 매번 바꿈
function bleDeepPickType(b){
  const st=bleGetState()[b.id]; const unlocked=bleUnlockedBlocks();
  const lastType = (bleDeep && bleDeep.lastTypeByBlock) ? bleDeep.lastTypeByBlock[b.id] : null;
  // 가능한 유형 후보를 약점 기반 가중치로 모으기
  const cand=[];
  const add=(t,w)=>{ for(let i=0;i<w;i++) cand.push(t); };
  // 반복 실패 → 보정 우선 (단 직전이 repair였으면 비중 낮춤)
  if((st.consecFails||0)>=2) add("repair", lastType==="repair"?1:4);
  // 헷갈림 → 구별 (2블록↑)
  if(Object.keys(st.confusedWith||{}).length && unlocked.length>=2) add("discriminate", 3);
  // 느림 → 속도
  if(st.avgMs && st.avgMs>5000) add("speed", 3);
  // 단일/적은 맥락 → 새 상황
  if((st.contextsUsed||[]).length<=2) add("situation", 3);
  // 2블록↑ 혼합/구별
  if(unlocked.length>=2){ add("mixed", 2); add("discriminate", 2); }
  // 기본 풀 (항상 다양성 확보)
  add("situation", 2); add("speed", 1);
  if(unlocked.length>=2){ add("mixed", 1); }
  // 직전과 같은 유형 제거 (가능하면) → 매번 다른 방식
  let pool=cand.filter(t=>t!==lastType);
  if(!pool.length) pool=cand.length?cand:["situation"];
  return pool[(Math.random()*pool.length)|0];
}
// 다음 문제 한 개 생성
function bleDeepNextItem(){
  const b=bleDeepPickBlock(); if(!b) return null;
  const reason=bleLastReason;
  const type=bleDeepPickType(b);
  bleEnsureContexts(b);   // 캐시 부족하면 백그라운드 생성
  // 블록별 직전 유형 기록 (다음에 다른 유형 나오게)
  if(bleDeep){ bleDeep.lastTypeByBlock=bleDeep.lastTypeByBlock||{}; bleDeep.lastTypeByBlock[b.id]=type; }
  if(type==="discriminate"){ const ex=bleFreshContextEx2(b); return {type:"discriminate", block:b, ex, deep:true, reason:"confusion", allOptions:true, miniTest:false}; }
  if(type==="speed"){ const ex=bleFreshContextEx2(b); return {type:"speed", block:b, ex, limit:5, deep:true, reason:"slow_block"}; }
  if(type==="repair"){ const ex=bleFreshContextEx2(b); return {type:"repair", block:b, ex, deep:true, reason:"weak_block"}; }
  if(type==="mixed"){ const ex=bleFreshContextEx2(b); return {type:"mixed", block:b, ex, deep:true, reason:"mixed_test"}; }
  // situation (context variation — 캐시에서 새 상황 우선)
  const ex=bleFreshContextEx2(b); return {type:"situation", block:b, ex, deep:true, reason};
}
const BLE_REASON_KO={due_review:"복습 예정",weak_block:"약한 블록",confusion:"헷갈린 블록",slow_block:"느린 블록",context_gap:"새로운 상황",mixed_test:"혼합 테스트",maintenance:"유지 복습"};
const BLE_REASON_COLOR={due_review:"#E2674A",weak_block:"#e0533f",confusion:"#C06CC0",slow_block:"#E0A300",context_gap:"#19a06b",mixed_test:"#5B8DEF",maintenance:"#8A6F62"};
function bleDeepGateReady(set){

  // 의미는 통했지만 타겟 블록 못 쓴 케이스
  const commLines=[];
  Object.keys(byId).forEach(id=>{ if(byId[id].commNotBlock.length){ const x=byId[id].commNotBlock[0]; commLines.push(`${x.heard} → next time try "${x.next}"`); } });
  // 헷갈린 블록 (이번 세션 confusedWith 기록)
  const confusedPairs=[];
  res.forEach(r=>{ if(r.confusedWith && BLE_BY_ID[r.confusedWith]) confusedPairs.push(`${BLE_BY_ID[r.id].block} vs ${BLE_BY_ID[r.confusedWith].block}`); });
  const newCtxLines=[];
  Object.keys(byId).forEach(id=>{ byId[id].newCtx.forEach(c=>newCtxLines.push(BLE_BY_ID[id].block+" · "+c)); });
  const s=bleGetState(); const now=bleNow();
  const nextList=BLE_BLOCKS.filter(b=>s[b.id]&&s[b.id].nextReviewAt).map(b=>{
    const dt=s[b.id].nextReviewAt-now; let when;
    if(dt<=0) when="지금"; else if(dt<3600000) when=Math.round(dt/60000)+"분 뒤"; else if(dt<86400000) when=Math.round(dt/3600000)+"시간 뒤"; else when=Math.round(dt/86400000)+"일 뒤";
    return {block:b.block, when, t:s[b.id].nextReviewAt};
  }).sort((a,b)=>a.t-b.t).slice(0,4);
  // 추천 액션
  let rec="";
  if(weak.length) rec=`<b style="color:#e0533f">${escapeHtml(weak[0])}</b> 보정 드릴 추천`;
  else if(confusedPairs.length) rec=`${escapeHtml(confusedPairs[0])} 구별 연습 추천`;
  else if(slow.length) rec=`<b style="color:#E0A300">${escapeHtml(slow[0])}</b> 속도 훈련 추천`;
  else if(commLines.length) rec="다음엔 다른 표현 말고 타겟 블록으로 말해보기";
  else rec="좋아요! 새 블록을 하나 더 배워볼까요?";
  const perfectN=res.filter(r=>r.result==="PERFECT").length;
  try{ awardXP("output", perfectN*6, "본격 학습", "bledeep"); }catch(e){}
  const row=(label,val,color)=> val? `<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)"><span style="font-size:13px;color:var(--muted)">${label}</span><span style="font-size:14px;font-weight:700;color:${color||'var(--text)'};text-align:right;max-width:62%">${val}</span></div>`:"";
  $("#sprintScroll").innerHTML=`<div class="rv-done" style="max-width:460px">
    <div class="em">🔁</div><h2>본격 학습 완료</h2>
    <p style="font-size:13px;color:var(--muted)">${res.length}문제 · 블록 인출 성공 ${perfectN}</p>
    <div style="text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin:12px 0">
      ${row("오늘 꺼낸 블록", [...new Set(practiced)].map(escapeHtml).join(", ")||"—", "var(--jade)")}
      ${commLines.length?row("의미는 통했지만 블록 못 씀", commLines.slice(0,3).map(escapeHtml).join("<br>"), "#E2674A"):""}
      ${row("약한 블록", [...new Set(weak)].map(escapeHtml).join(", ")||"—", "#e0533f")}
      ${confusedPairs.length?row("헷갈린 블록", [...new Set(confusedPairs)].slice(0,3).map(escapeHtml).join("<br>"), "#C06CC0"):""}
      ${row("느렸던 블록", [...new Set(slow)].map(escapeHtml).join(", ")||"—", "#E0A300")}
      ${row("새 상황 성공", newCtxLines.slice(0,4).map(escapeHtml).join(", ")||"—", "#19a06b")}
      ${nextList.length?`<div style="padding-top:10px"><div style="font-size:12px;color:var(--muted);margin-bottom:6px">다음 복습 예정</div>${nextList.map(n=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0"><span style="font-family:var(--serif);color:var(--text)">${escapeHtml(n.block)}</span><span style="color:var(--jade);font-weight:700">${n.when}</span></div>`).join("")}</div>`:""}
    </div>
    <div style="background:linear-gradient(135deg,#FFF2EA,#FFE5D8);border:1px solid #FBD6C4;border-radius:14px;padding:12px 15px;margin-bottom:12px;text-align:left">
      <div style="font-size:12px;font-weight:900;color:#C08763">💡 추천</div>
      <div style="font-size:14px;color:#4A372F;font-weight:600;margin-top:3px">${rec}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px;max-width:340px;margin:0 auto">
      <button class="sh-next" id="bleDeepMore" style="margin:0">계속 학습하기 →</button>
      <button class="rv-stop" id="bleDeepHome">홈으로</button>
    </div>
  </div>`;
  $("#bleDeepMore").onclick=()=>bleDeepStart();
  $("#bleDeepHome").onclick=()=>goToSetup();
}

// 영어로 꺼내기 세션 종료 요약 — 의미 전달 vs 목표 블록 분리
function bleOutputSummary(res){
  TTS&&TTS.cancel();
  const total=res.length;
  const commN=res.filter(r=>r.comm).length;
  const targetN=res.filter(r=>r.target).length;
  const byId={};
  res.forEach(r=>{ const o=byId[r.id]=byId[r.id]||{target:0,comm:0,miss:0,slow:0};
    if(r.target)o.target++; if(r.comm)o.comm++;
    if(!r.target)o.miss++;
    if(r.target&&!r.fast)o.slow++;
  });
  // 잘 꺼낸 블록: 목표 성공이 실패보다 많음
  const wellDone=Object.keys(byId).filter(id=>byId[id].target>0 && byId[id].target>=byId[id].miss).map(id=>BLE_BY_ID[id]?.block).filter(Boolean);
  // 약한 블록: 목표 못 쓴 게 더 많음
  const weak=Object.keys(byId).filter(id=>byId[id].miss>0 && byId[id].miss>byId[id].target).map(id=>BLE_BY_ID[id]?.block).filter(Boolean);
  const slow=Object.keys(byId).filter(id=>byId[id].slow>0).map(id=>BLE_BY_ID[id]?.block).filter(Boolean);
  // 헷갈린 블록 쌍
  const confused=[];
  res.forEach(r=>{ if(r.confusedWith && BLE_BY_ID[r.confusedWith] && BLE_BY_ID[r.id]) confused.push(`${BLE_BY_ID[r.id].block} vs ${BLE_BY_ID[r.confusedWith].block}`); });
  // 추천 다음 훈련
  let recBlock = weak[0] || (confused.length?null:slow[0]) || null;
  let rec;
  if(weak.length) rec=`스피드런에서 <b style="color:#e0533f">${escapeHtml(weak[0])}</b> 연습`;
  else if(confused.length) rec=`<b style="color:#C06CC0">${escapeHtml([...new Set(confused)][0])}</b> 구별 연습`;
  else if(slow.length) rec=`스피드런에서 <b style="color:#E0A300">${escapeHtml(slow[0])}</b> 빠르게 말하기`;
  else rec="잘했어요! 스피드런으로 속도를 올려봐요";
  try{ awardXP("output", targetN*6, "영어로 꺼내기", "bleoutput"); }catch(e){}
  const bigStat=(label,n,color)=>`<div style="flex:1;text-align:center"><div style="font-size:11px;color:var(--muted);font-weight:700">${label}</div><div style="font-size:26px;font-weight:900;color:${color}">${n}<span style="font-size:15px;color:var(--muted)"> / ${total}</span></div></div>`;
  const row=(label,val,color)=> val? `<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line)"><span style="font-size:13px;color:var(--muted)">${label}</span><span style="font-size:14px;font-weight:700;color:${color||'var(--text)'};text-align:right;max-width:62%">${val}</span></div>`:"";
  $("#sprintScroll").innerHTML=`<div class="rv-done" style="max-width:460px">
    <div class="em">🗣️</div><h2>오늘의 영어로 꺼내기 완료</h2>
    <p style="font-size:13px;color:var(--muted)">총 ${total}문제</p>
    <div style="display:flex;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin:12px 0">
      ${bigStat("의미 전달", commN, "#19a06b")}
      <div style="width:1px;background:var(--line)"></div>
      ${bigStat("목표 블록", targetN, "#F0664A")}
    </div>
    <div style="text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin:12px 0">
      ${row("잘 꺼낸 블록", [...new Set(wellDone)].map(escapeHtml).join(", ")||"—", "var(--jade)")}
      ${confused.length?row("헷갈린 블록", [...new Set(confused)].slice(0,3).map(escapeHtml).join("<br>"), "#C06CC0"):""}
      ${row("다시 연습할 블록", [...new Set(weak)].map(escapeHtml).join(", ")||"—", "#e0533f")}
      ${row("느렸던 블록", [...new Set(slow)].map(escapeHtml).join(", ")||"—", "#E0A300")}
    </div>
    <div style="background:linear-gradient(135deg,#FFF2EA,#FFE5D8);border:1px solid #FBD6C4;border-radius:14px;padding:12px 15px;margin-bottom:12px;text-align:left">
      <div style="font-size:12px;font-weight:900;color:#C08763">💡 추천 다음 훈련</div>
      <div style="font-size:14px;color:#4A372F;font-weight:600;margin-top:3px">${rec}</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:9px;max-width:340px;margin:0 auto">
      <button class="sh-next" id="outAgain" style="margin:0">다시 연습하기 →</button>
      <button class="rv-stop" id="outSpeed" style="background:linear-gradient(135deg,#FF8568,#F0664A);color:#fff;border:none">⚡ 스피드런으로 가기</button>
      <button class="rv-stop" id="outReview">블록영어 복습하기</button>
    </div>
  </div>`;
  $("#outAgain").onclick=()=>bleDeepStartOutput();
  $("#outSpeed").onclick=()=>{ if(typeof openSprintPicker==="function") openSprintPicker(); else goToSetup(); };
  $("#outReview").onclick=()=>{ if(typeof bleOpenHub==="function") bleOpenHub(); else goToSetup(); };
}

function bleOpenHub(){
  const s=bleGetState();
  const set=bleActiveSet();
  const setSt=bleCheckSetIntro(set);   // 진입 시 인트로 완료 재판정
  const setBlocks=bleSetBlocks(set);
  // 블록 상태 라벨 (잠김 대신 소개 전/완료/연습 중/약함/실전 준비)
  const statusOf=(b)=>{ const st=s[b.id];
    if(!st||!st.introducedAt) return {t:"소개 전", c:"#B0958A"};
    if(st.stage==="ready_for_real") return {t:"실전 준비", c:"#19a06b"};
    if((st.failCount||0)>=2&&(st.failCount||0)>=(st.successCount||0)) return {t:"약함", c:"#e0533f"};
    if((st.successCount||0)>0) return {t:"연습 중", c:"#F0664A"};
    return {t:"소개 완료", c:"#C08763"};
  };
  const rows=setBlocks.map(b=>{ const st=statusOf(b);
    return `<button class="chk-row" data-id="${b.id}">
      <span class="chk-main">
        <span class="chk-en">${escapeHtml(b.block)}</span>
        <span class="chk-ko">${escapeHtml(b.meaningKo)}</span>
        <span class="chk-stars">${bleStars(b.id)} <i style="color:${st.c}">${st.t}</i></span>
      </span>

     <div style="font-size:12px;font-weight:800;color:#C08763;margin:2px 2px 8px">블록 ${setBlocks.length}개 · 상태</div>

   </div>`;
  document.body.appendChild(ov);

// 조회 정규화
function dictKey(s){ return String(s||"").toLowerCase().replace(/[^a-z' ]/g,"").trim(); }
// 영구 캐시 (AI 결과 저장 → 다음엔 로컬 속도)
function dictCacheGet(k){ try{ return (hGet("speakingroom:dictcache",{})||{})[k]||null; }catch(e){ return null; } }
function dictCacheSet(k,v){ try{ const c=hGet("speakingroom:dictcache",{})||{}; c[k]=v; const keys=Object.keys(c); if(keys.length>800){ delete c[keys[0]]; } hSet("speakingroom:dictcache",c); }catch(e){} }
// 청크 DB에서 찾기 (CORE_PHRASES 재활용)
function lookupChunk(text){
  const t=dictKey(text);
  const hit=CORE_PHRASES.find(p=>dictKey(p.phrase).replace(/\.\.\.|\?/g,"").trim()===t || dictKey(p.phrase).includes(t)&&t.length>4);
  if(hit) return {type:"chunk", term:hit.phrase, ko:hit.ko, kid:"여러 상황에서 쓰는 표현이에요", ex:(hit.examples||[]).slice(0,3).map(e=>e.en), rel:[], src:"local"};

// 출제 선택기: 연령/레벨/주제로 3~N개만 — 미능동 우선, 셔플
function pickPhrases(opts){
  opts=opts||{}; const age=opts.age||(typeof kidMode==="function"&&kidMode()?"kid":"adult");
  const lvl=opts.level||(typeof diffMacro==="function"?diffMacro():((typeof state!=="undefined"&&state.lvl)||3)); const topic=opts.topic||null; const n=opts.n||20;
  let pool=CORE_PHRASES.filter(p=> age==="kid"? p.kid : p.adult );
  if(topic) pool=pool.filter(p=>p.tags.includes(topic));
  // 레벨: 현재 레벨 이하 위주(±0), 너무 적으면 전체로 완화
  let lv=pool.filter(p=>p.level<= (lvl<=3?1: lvl<=6?2:3));
  if(lv.length>=6) pool=lv;
  // 🧱 블록영어 연계: 배운 블록 70% · 약점/복습 20% · 새 상황 10% (같은 블록도 다른 상황으로 반복)
  const _learned=(typeof blGetLearned==="function")?blGetLearned():[];
  const _weak=(typeof weakGet==="function")?weakGet():{};
  const _sh=a=>{ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; };
  if(_learned.length){
    const studied=_sh(CORE_PHRASES.filter(p=>_learned.indexOf(p.id)>=0 && (age==="kid"?p.kid:p.adult) && (!topic||p.tags.includes(topic)) && !_weak[p.id]));
    const weak=_sh(pool.filter(p=>!!_weak[p.id]));
    const fresh=_sh(pool.filter(p=>_learned.indexOf(p.id)<0 && !_weak[p.id]));
    const pickEx=p=>{ const e=p.examples[(Math.random()*p.examples.length)|0]||p.examples[0]; return {ko:e.ko, en:e.en, tag:(p.tags[0]||"daily"), pid:p.id, chunk:p.phrase, chunkKo:p.ko}; };
    const out=[]; let lastPid=null, guard=0;
    while(out.length<n && ++guard<n*6){
      const r=Math.random();
      let bucket=(r<0.70&&studied.length)?studied:(r<0.90&&weak.length)?weak:(fresh.length?fresh:(studied.length?studied:weak));
      if(!bucket||!bucket.length) break;
      let p=bucket[(Math.random()*bucket.length)|0];
      if(p.id===lastPid && bucket.length>1) p=bucket[(Math.random()*bucket.length)|0];
      lastPid=p.id; out.push(pickEx(p));
    }
    if(out.length) return out.slice(0,n);
  }
  // (배운 블록 없음) 미능동 우선
  const notActive=pool.filter(p=>{ try{ return avProgressOf(p.examples[0].en).state<4; }catch(e){ return true; } });
  let ranked = notActive.length>=Math.min(6,n)? notActive.concat(pool.filter(p=>!notActive.includes(p))) : pool.slice();
  for(let i=ranked.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [ranked[i],ranked[j]]=[ranked[j],ranked[i]]; }
  // 청크 → 스프린트 아이템(ko 프롬프트 / en 정답). 부족하면 같은 청크의 다른 예문으로 채움
  const items=[]; let gi=0;
  while(items.length<n && ranked.length){
    const p=ranked[gi%ranked.length]; gi++;
    const exIdx=Math.floor(gi/ranked.length)%p.examples.length;
    const ex=p.examples[exIdx]||p.examples[0];
    items.push({ko:ex.ko, en:ex.en, tag:(p.tags[0]||"daily"), pid:p.id, chunk:p.phrase, chunkKo:p.ko});
    if(gi>n*3) break;
  }
  return items.slice(0,n);
}

// 의미 전달 점수: 핵심어 겹침 + 청크 사용 여부로 PERFECT/HIT/MISS 판정
function spGrade(heard, it, elapsed){
  if(it && it.bleId && BLE_BY_ID[it.bleId]){
    const j=bleGradeLocal(BLE_BY_ID[it.bleId], it.en, heard);
    it._bleJudge=j;
    if(j.result==="PERFECT" && elapsed<=4) return "perfect";
    if(j.result==="PERFECT") return "hit";
    if(j.result==="HIT") return "hit";
    return "miss";
  }
  const h=spNorm(heard), target=spNorm(it.en);
  if(!h) return "miss";   // STT 아무것도 못 잡음 = 시도 실패(말 안 함/딴소리)
  const hw=h.split(" ").filter(Boolean), tw=target.split(" ").filter(Boolean);
  const tset=new Set(tw);
  const overlap=hw.filter(w=>tset.has(w)).length;
  const coverage = tw.length? overlap/tw.length : 0;   // 정답 단어 중 얼마나 말했나
  // 청크 키워드(맨 앞 1~2단어, 예: "could you", "i'm looking for")가 들어갔나
  const chunkKey=spNorm(it.chunk||"").replace(/\.\.\.|\?/g,"").trim();
  const chunkWords=chunkKey.split(" ").filter(Boolean).slice(0,3);
  const chunkHit = chunkWords.length? chunkWords.every(w=>h.includes(w)) : false;
  const exact = (h===target);
  if(coverage<0.34 && !chunkHit) return "miss";       // 의미 실패 / 딴소리
  if(exact || (coverage>=0.7 && chunkHit && elapsed<=4)) return "perfect";
  if(coverage>=0.5 || chunkHit) return "hit";
  return "miss";
}

function srsKey(en){ return String(en||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").trim(); }
function srsGet(en){ const k=srsKey(en); return srsAll()[k]||null; }
// 아이템 보장 (없으면 new로 생성)
function srsEnsure(en, ko){
  const o=srsAll(); const k=srsKey(en); if(!k) return null;
  if(!o[k]){ o[k]={en, ko:ko||"", stage:"new", uses:0, miss:0, due:EDAY(), ctx:{}, lastT:0}; srsSave(o); }
  else if(ko && !o[k].ko){ o[k].ko=ko; srsSave(o); }
  return o[k];
}
// 성공 → 단계 상승, 복습 간격 늘림. ctx=상황 태그(restaurant 등)
function srsPass(en, ko, ctx){
  const o=srsAll(); const k=srsKey(en); if(!k) return; srsEnsure(en,ko);
  const it=o[k]||srsAll()[k]; if(!it) return;
  const idx=Math.min(SRS_STAGES.length-1, SRS_STAGES.indexOf(it.stage)+1);
  it.stage=SRS_STAGES[idx]; it.uses=(it.uses||0)+1;
  if(ctx){ it.ctx=it.ctx||{}; it.ctx[ctx]=(it.ctx[ctx]||0)+1; }
  it.due=EDAY()+ (SRS_INTERVAL_DAYS[it.stage]||1);
  it.lastT=Date.now(); o[k]=it; srsSave(o);
  try{ profRecordWordIfMastered(en, ko); }catch(e){}
}
// 실패 → 단계 하락, 복습 빨리
function srsFail(en, ko, ctx){
  const o=srsAll(); const k=srsKey(en); if(!k) return; srsEnsure(en,ko);
  const it=o[k]||srsAll()[k]; if(!it) return;
  const idx=Math.max(0, SRS_STAGES.indexOf(it.stage)-1);
  it.stage=SRS_STAGES[idx]; it.miss=(it.miss||0)+1;
  if(ctx){ it.ctx=it.ctx||{}; }
  it.due=EDAY();   // 바로 다시
  it.lastT=Date.now(); o[k]=it; srsSave(o);
}
// 오늘 복습할 아이템 (due<=오늘, mastered 제외, 실패 많은 순)
function srsDue(max){
  const today=EDAY();
  return Object.values(srsAll())
    .filter(x=>x && x.stage!=="mastered" && (x.due||0)<=today)
    .sort((a,b)=>(b.miss||0)-(a.miss||0) || (a.due||0)-(b.due||0))
    .slice(0, max||50);
}
function srsStats(){
  const all=Object.values(srsAll());
  const due=srsDue(999).length;
  const mastered=all.filter(x=>x.stage==="mastered").length;
  const learning=all.filter(x=>x.stage==="learning"||x.stage==="review").length;
  return {total:all.length, due, mastered, learning, retrieved:all.filter(x=>(x.uses||0)>0).length};
}
function srsStageLabel(s){ return {new:"새 단어",learning:"배우는 중",review:"복습",strong:"탄탄함",mastered:"마스터"}[s]||s; }

/* ============================================================
   🗣 실전회화용 블록 수집 — 학습한 블록을 자연 대화로 끌어내기
   문서: 강요하지 말고 자연스럽게 쓰게 유도. 우선순위 due>weak>recent>studied>mastered
   ============================================================ */
function convoBlocks(){
  try{
    const mk=(b,stage)=>({id:b.id, en:b.block, ko:b.meaningKo||"", stage:stage||(b.state&&b.state.stage)||"ble", uses:(b.state&&b.state.successCount)||0, miss:(b.state&&b.state.failCount)||0});
    const due=getDueReviewBlocks().slice(0,8).map(b=>mk(b,"due"));
    const weak=getWeakBlocks().slice(0,8).map(b=>mk(b,"weak"));
    const ready=getReadyForRealBlocks().slice(0,8).map(b=>mk(b,"ready"));
    const recent=getRecentlyLearnedBlocks().slice(0,8).map(b=>mk(b,"recent"));
    const studied=getLearnedBlocks().filter(b=>b.state&&b.state.unlocked).slice(0,12).map(b=>mk(b,"studied"));
    if(due.length||weak.length||ready.length||recent.length||studied.length) return {due, weak, ready, recent, studied, mastered:[]};
  }catch(e){}
  // 구 SRS는 BLE 데이터가 아직 없을 때만 백업으로 쓴다.
  const all=Object.values(srsAll());
  const today=EDAY();
  const lab=x=>({en:x.en, ko:x.ko||"", stage:x.stage, uses:x.uses||0, miss:x.miss||0});
  const due = all.filter(x=>x && x.stage!=="mastered" && (x.due||0)<=today && x.en)
                 .sort((a,b)=>(b.miss||0)-(a.miss||0)).slice(0,8).map(lab);
  const weak = all.filter(x=>x && (x.miss||0)>0 && x.stage!=="mastered" && x.en)
                  .sort((a,b)=>(b.miss||0)-(a.miss||0)).slice(0,8).map(lab);
  const recent = all.filter(x=>x && x.en && x.lastT).sort((a,b)=>(b.lastT||0)-(a.lastT||0)).slice(0,8).map(lab);
  const studied = all.filter(x=>x && x.en && (x.uses||0)>0).slice(0,12).map(lab);
  const mastered = all.filter(x=>x && x.stage==="mastered" && x.en).slice(0,5).map(lab);
  // weak chunks (블록영어 약점)도 합침
  try{ weakList(6).forEach(w=>{ if(w&&w.chunk) weak.push({en:w.chunk, ko:w.ko||"", stage:"weak", uses:0, miss:w.miss||1}); }); }catch(e){}
  return {due, weak, ready:[], recent, studied, mastered};
}
// 프롬프트에 넣을 블록 우선순위 문자열 (자연 유도용)
function convoBlockHint(){
  const b=convoBlocks();
  const pick=[];
  const seen=new Set();
  try{
    reuseDue(5).forEach(x=>{
      const k=srsKey(x.en);
      if(k&&!seen.has(k)){
        seen.add(k);
        pick.push(x.en+(x.ko?(" ("+x.ko+")"):"")+" [reuse "+((x.ctx||[]).length)+"/"+REUSE_GOAL_CONTEXTS+"]");
      }
    });
  }catch(e){}
  const add=(arr,tag)=>arr.forEach(x=>{ const k=srsKey(x.en); if(k&&!seen.has(k)){ seen.add(k); pick.push(x.en+(x.ko?(" ("+x.ko+")"):"")+" ["+tag+"]"); } });
  add(b.due,"due-review"); add(b.weak,"weak"); add(b.ready,"ready-for-real"); add(b.recent,"recent"); add(b.studied,"studied");
  if(!pick.length) return "";   // 아직 학습한 블록 없음 → 일반 대화
  return pick.slice(0,14).join("; ");
}

function spPassItem(it, heard){
  const startT=spSpoke||Date.now();
  const elapsed=Math.max(0.1,(startT-spT0)/1000);
  spTimes.push(Math.round(elapsed*10)/10);
  try{ const arr=hGet("speakingroom:recall",[]); arr.push(Math.round(elapsed*10)/10); hSet("speakingroom:recall", arr.slice(-60)); }catch(e){}
  // ⚡ 실제 채점
  const grade = spGrade(heard, it, elapsed);   // "perfect" | "hit" | "miss"
  if(it.bleId && BLE_BY_ID[it.bleId]){
    const j=it._bleJudge || bleGradeLocal(BLE_BY_ID[it.bleId], it.en, heard);
    bleRecord(it.bleId, {
      result:j.result,
      communicationSuccess:j.communicationSuccess,
      targetBlockSuccess:j.targetBlockSuccess,
      fast:grade==="perfect",
      situation:"lightning",
      ms:Math.round(elapsed*1000),
      mixed:true,
      speedAttempt:true
    });
  }
  let gained=0;
  if(grade==="perfect"){
    spPerfect++; spCombo++; if(spCombo>spMaxCombo) spMaxCombo=spCombo;
    if(spCombo===3||spCombo===5||spCombo===10||(spCombo>10&&spCombo%5===0)){ try{ comboFx(spCombo, spMult()); }catch(e){} }
    gained=awardXP("output", 20*spMult(), "⚡ PERFECT", "sprint");
  } else if(grade==="hit"){
    spHit++; spCombo++; if(spCombo>spMaxCombo) spMaxCombo=spCombo;
    gained=awardXP("output", 10, "⚔️ HIT", "sprint");
  } else {
    spMiss++; spCombo=Math.max(0, spCombo-1);   // MISS = 콤보 -1, XP 0
    if(!it.bleId) weakAddMiss(it);
  }
  bumpCount&&bumpCount("talk");
  if(grade!=="miss"){
    try{ avSeen(it.en, it.ko); const promoted=avRetrieve(it.en, it.ko, it.tag||"sprint"); if(promoted) awardXP("output",25,"💎 능동 어휘 달성!"); }catch(e){}
  }
  spCombatHit(it, heard, elapsed, gained, grade);
  setTimeout(()=>{ spIdx++; spNext(); }, 1050);
}
function spCombatHit(it, heard, elapsed, gained, grade){
  const stage=$("#spStage"), enemy=$("#spEnemy"), hp=$("#spHp"), banner=$("#spComboBanner");
  const isMiss=(grade==="miss");
  const last = (spIdx>=spItems.length-1) && !isMiss;
  // MISS면 적 HP 안 깎임(공격 빗나감). PERFECT/HIT만 진행 피해.
  const newHp = isMiss ? Math.round((spItems.length-spIdx)/spItems.length*100)
                       : Math.round((spItems.length-(spIdx+1))/spItems.length*100);
  if(enemy){
    enemy.classList.remove("hit");  void enemy.offsetWidth;
    if(isMiss){ enemy.classList.add("dodge"); }            // 적 회피/반격
    else enemy.classList.add(last?"defeated":"hit");
  }
  if(hp && !isMiss){ hp.style.width=Math.max(0,newHp)+"%"; }
  if(stage){
    if(isMiss){
      const x=document.createElement("div"); x.className="dmg miss"; x.textContent="MISS"; stage.appendChild(x); setTimeout(()=>x.remove(),900);
    } else {
      const bolt=document.createElement("div"); bolt.className="bolt"; bolt.textContent=grade==="perfect"?"⚡":"✦"; stage.appendChild(bolt); setTimeout(()=>bolt.remove(),520);
      const dmg=document.createElement("div"); dmg.className="dmg"; dmg.textContent=grade==="perfect"?(spMult()>1?"CRIT ×"+spMult()+"!":"PERFECT!"):"HIT"; stage.appendChild(dmg); setTimeout(()=>dmg.remove(),860);
      if(spCombo>=3 && banner){ banner.innerHTML=`<div class="perfect-banner">${spCombo>=10?"⚡ LEGENDARY CHAIN":"🔥 PERFECT CHAIN"} ×${spMult()}!</div>`; setTimeout(()=>{ if(banner) banner.innerHTML=""; }, 950); }
    }
  }
  if(grade==="perfect" && spMult()>=3){ const f=document.createElement("div"); f.className="arena-flash"; document.body.appendChild(f); setTimeout(()=>f.remove(),260); }
  const stat=$("#spStat");
  if(stat){
    const label = grade==="perfect" ? `<span style="color:#ffd17a;font-weight:900">⚡ PERFECT</span>`
                : grade==="hit"     ? `<span style="color:#FF8568;font-weight:900">⚔️ HIT</span>`
                :                      `<span style="color:#f87171;font-weight:900">💥 MISS</span>`;
    const xpLine = isMiss ? `<span style="font-size:11.5px;color:#f87171">+0 XP · 콤보 -1${heard?` · 들림 "${escapeHtml(heard)}"`:" · 안 들렸어요"}</span>`
                          : `<span style="font-size:11.5px;color:var(--muted)">${elapsed.toFixed(1)}초 · +${gained} XP${heard?` · 들림 "${escapeHtml(heard)}"`:""}</span>`;
    stat.innerHTML=`${label} <span style="font-family:var(--serif);color:var(--text);font-size:17px">${escapeHtml(it.en)}</span><br>${xpLine}`;
  }
  const mic=$("#spMicBtn"); if(mic){ mic.disabled=true; mic.style.opacity=".5"; }
  setTimeout(()=>speakEn(it.en), 120);
}

// 소리와 동기화된 혀/입 애니메이션 (rAF 구동)
let _artRAF=0;
function articPlay(L){
  const A=ARTIC(L);
  const path=document.getElementById("phTongue"); if(!path) return;
  const star=document.getElementById("phStar"), lipU=document.getElementById("phLipU"), lipL=document.getElementById("phLipL"), air=document.getElementById("phAir");
  const restX=ART_XR, restY=ART_REST, actX=A.xs, actY=A.ys;
  const lipAct = A.lips? LIP_ACT[A.lips] : null;
  const T_IN=380, T_HOLD=260, T_OUT=420, TOTAL=T_IN+T_HOLD+T_OUT;
  const ease=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
  if(_artRAF) cancelAnimationFrame(_artRAF);
  const t0=performance.now();
  (function frame(now){
    const t=now-t0; let p;
    if(t<T_IN) p=ease(t/T_IN);
    else if(t<T_IN+T_HOLD) p=1;
    else if(t<TOTAL) p=1-ease((t-T_IN-T_HOLD)/T_OUT);
    else { path.setAttribute("d", artBt(restX,restY)); if(star)star.setAttribute("opacity","0"); if(air)air.setAttribute("opacity","0"); if(lipU)lipU.setAttribute("d",lipPath(LIP_REST_U)); if(lipL)lipL.setAttribute("d",lipPath(LIP_REST_L)); _artRAF=0; return; }
    path.setAttribute("d", artBt(artLerp(restX,actX,p), artLerp(restY,actY,p)));
    const contactNow = (t>=T_IN-60 && t<T_IN+T_HOLD);
    if(star && A.contact) star.setAttribute("opacity", contactNow?"1":"0");
    if(air) air.setAttribute("opacity", (t>=T_IN-60)? String(Math.max(0,1-(t-T_IN)/700)) : "0");
    if(lipU && lipAct) lipU.setAttribute("d", lipPath(artLerp(LIP_REST_U, lipAct.u, p)));
    if(lipL && lipAct) lipL.setAttribute("d", lipPath(artLerp(LIP_REST_L, lipAct.l, p)));
    _artRAF=requestAnimationFrame(frame);
  })(t0);
}

function speakPhonics(it){
  const L=it.L;

  TTS.cancel();
  const parts=[{t:it.snd,rate:0.8,gap:430},{t:it.snd,rate:0.8,gap:430},{t:it.word,rate:0.85,gap:0}];
  let i=0;
  (function go(){
    if(i>=parts.length) return;
    const p=parts[i++]; const u=new SSU(p.t); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=p.rate||0.85;
    u.onstart=()=>{ try{ articPlay(L); }catch(e){} };
    u.onend=()=>setTimeout(go, p.gap||300);
    TTS.speak(u);
  })();
}

// 발음 점수 → XP 티어 (문서 표)
function pronXP(s){ s=s||0; if(s>=90)return 15; if(s>=80)return 10; if(s>=70)return 7; if(s>=60)return 5; if(s>=50)return 3; return 1; }
let phAttempts=0;
// 점수 → 실제 숫자 + 인식된 발음 + 정직한 별 (목표와 다르면 낮은 점수)
function phScoreFx(res, st, target){
  if(!res || res.score==null){
    const heard=res&&res.heard;
    st.innerHTML = heard ? `<span style="color:#ef4444;font-weight:800">"${escapeHtml(heard)}"로 들렸어요 — 다시 해볼까? 🎤</span>`
                         : `<span style="color:#ef4444;font-weight:800">🔇 소리가 안 잡혔어요. 마이크 가까이서 또렷하게!</span>`;
    return;
  }
  let sc=res.score;
  const tgt=String(target||"").toLowerCase().replace(/[^a-z]/g,"");
  const heard=String(res.heard||"").toLowerCase();
  const heardWords=heard.replace(/[^a-z ]/g,"").split(/\s+/).filter(Boolean);
  const matched = !tgt || (heardWords.some(w=> w===tgt || (tgt.length>2 && (w.includes(tgt)||tgt.includes(w)))));
  // 틀린 말(다른 단어)은 통과 불가
  if(tgt && heardWords.length && !matched) sc=0;
  const PASS=90, BONUS=95;
  const pass = matched && sc>=PASS;
  let stars, msg, col, xp=0;
  if(pass && sc>=BONUS){ stars=3; msg="완벽해요! 가산점 +"; col="#10b981"; }
  else if(pass){ stars=2; msg="통과! 잘했어요"; col="#10b981"; }
  else if(tgt && !matched){ stars=0; msg="다른 소리가 났어요. 다시! 🎤"; col="#ef4444"; }
  else { stars=0; msg="조금 더! (90점 넘어야 통과) 🎤"; col="#f59e0b"; }
  // XP는 통과(90↑)했을 때만. 95↑ 가산점. 통과 못하면 0점·XP 없음.
  bestPronToday(sc);
  if(pass){
    xp = pronXP(sc);
    if(sc>=BONUS) xp += 8;                          // 가산점
    awardXP("phonics", xp, "발음 "+sc+"점", "ph:"+(tgt||"x"));
    if(firstHighPronToday()) awardXP("phonics",10,"오늘 첫 통과! 🌟");
    questBump("phonics");
    burstStars(sc>=BONUS?12:stars);
    const sb=$("#phonicsScroll").querySelector(".phstars"); if(sb) sb.textContent="⭐ "+phStars(stars);
  }
  phAttempts++; if(pass && phAttempts===3) awardXP("phonics",5,"3번 통과 보너스!");
  st.innerHTML=`<div style="font-size:24px;font-weight:900;color:${col}">${sc}점 <span style="font-size:16px">${pass?"⭐".repeat(stars):"💪"}</span>${xp?` <span style="font-size:14px;color:var(--muted)">+${xp}XP</span>`:""}</div>
    <div style="font-size:14px;color:#475569;font-weight:800;margin-top:3px">${msg}</div>
    ${res.heard?`<div style="font-size:12px;color:#94a3b8;margin-top:3px">들린 발음: "${escapeHtml(res.heard)}"</div>`:""}`;
}
function burstStars(n){
  const host=$("#phonics"); if(!host) return;
  for(let i=0;i<Math.max(3,n*3);i++){ const s=document.createElement("div"); s.textContent="⭐";
    s.style.cssText=`position:fixed;left:${40+Math.random()*20}%;top:55%;font-size:${18+Math.random()*16}px;z-index:200;pointer-events:none;transition:transform 1s ease-out,opacity 1s`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>{ s.style.transform=`translate(${(Math.random()-.5)*220}px,${-120-Math.random()*120}px) rotate(${(Math.random()-.5)*180}deg)`; s.style.opacity="0"; });
    setTimeout(()=>s.remove(),1050);
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
// 영어 단어/구를 대략적인 음절로 분해 (힌트 점진 공개용)
function splitSyllables(word){
  const w=String(word||"").toLowerCase();
  if(!w) return [];
  return w.split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)) return [tok];
    const m=tok.match(/[^aeiouy]*[aeiouy]+(?:[^aeiouy]*$|[^aeiouy](?=[^aeiouy]))?/gi);
    if(!m || !m.length) return [tok];
    return m;
  }).reduce((a,b)=>a.concat(b),[]);
}
// 누적 음절 힌트 — n음절까지 공개, 나머지는 · 로 가림
function syllableHint(word, n){
  const syl=splitSyllables(word);
  if(!syl.length) return word;
  let shown=0, out="";
  for(const s of syl){
    if(/^\s+$/.test(s)){ out+=" "; continue; }
    if(shown<n){ out+=s; shown++; }
    else out+="·".repeat(Math.max(1,s.length));
  }
  return out;
}
// 총 음절 수
function syllableCount(word){ return splitSyllables(word).filter(s=>!/^\s+$/.test(s)).length; }

/* ============================================================
   ⚡ Automaticity Drill
   - initiation latency = situation shown -> speech start
   - deterministic STT match: target chunk + slot, no AI grading
   - answer flash -> hidden recall, so re-production is retrieval, not reading
   ============================================================ */
let autoDrill=null;
function adNorm(s){
  return String(s||"").toLowerCase()
    .replace(/[’]/g,"'")
    .replace(/\bi'm\b/g,"im").replace(/\bi am\b/g,"im")
    .replace(/\bi'd\b/g,"id").replace(/\bi would\b/g,"id")
    .replace(/\bi'll\b/g,"ill").replace(/\bi will\b/g,"ill")
    .replace(/\bdon't\b/g,"dont").replace(/\bdo not\b/g,"dont")
    .replace(/\bdoesn't\b/g,"doesnt").replace(/\bdoes not\b/g,"doesnt")
    .replace(/\bcan't\b/g,"cant").replace(/\bcannot\b/g,"cant")
    .replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim();
}
const AD_STOP=new Set("a an the some any my your me you i it this that to for of in on at with by now here there please little bit one very".split(" "));
function adWords(s){ return adNorm(s).split(" ").filter(Boolean); }
function adCoreVariants(block){
  const raw=adNorm(String(block||"").replace(/\.\.\.|\?/g,""));
  const set=new Set([raw]);
  if(raw.includes("id ")) set.add(raw.replace(/\bid\b/g,"i would"));
  if(raw.includes("im ")) set.add(raw.replace(/\bim\b/g,"i am"));
  if(raw.includes("ill ")) set.add(raw.replace(/\bill\b/g,"i will"));
  if(raw.includes("dont ")) set.add(raw.replace(/\bdont\b/g,"do not"));
  if(raw.includes("doesnt ")) set.add(raw.replace(/\bdoesnt\b/g,"does not"));
  if(raw.includes("cant ")) set.add(raw.replace(/\bcant\b/g,"cannot"));
  return [...set].filter(x=>x.length>=2);
}
// 블록의 핵심 단어 시퀀스 (stop word 제거). 부분/순서 매칭용.
function adCoreSeq(block){
  const raw=adNorm(String(block||"").replace(/\.\.\.|\?/g,""));
  return raw.split(" ").filter(w=>w && !AD_STOP.has(w));
}
// 들린 말 안에 시퀀스가 "순서대로"(연속 아니어도) 모두 등장하는지 — STT가 단어 흘려도 통과
function adSeqInOrder(heardWords, seq){
  if(!seq.length) return false;
  let i=0;
  for(const w of heardWords){ if(w===seq[i] || adLooseWordEq(w,seq[i])){ i++; if(i>=seq.length) return true; } }
  return false;
}
// 흔한 STT 활용형 관대 매칭 (get/gets/getting, 복수 -s 등)
function adLooseWordEq(a,b){
  if(a===b) return true;
  if(a.length<3||b.length<3) return false;
  return adStem(a)===adStem(b);
}
function adStem(w){
  let s=w;
  // -ing: 자음 중복 복원(getting→get) 포함
  if(/ing$/.test(s) && s.length>5){ s=s.slice(0,-3); if(s.length>=3 && s[s.length-1]===s[s.length-2]) s=s.slice(0,-1); }
  else if(/ed$/.test(s) && s.length>4){ let t=s.slice(0,-2); if(t.length>=3 && t[t.length-1]===t[t.length-2]) t=t.slice(0,-1); s=t; }
  else if(/es$/.test(s) && s.length>4){ s=s.slice(0,-2); }
  else if(/s$/.test(s) && s.length>3 && !/ss$/.test(s)){ s=s.slice(0,-1); }
  return s;
}
function adSlotWords(ex, block){
  // 슬롯 = 상황마다 바뀌는 핵심어(빈칸에 채우는 말). ex.object가 있으면 그게 정답 슬롯.
  const blockWords=new Set(block?adCoreSeq(block.block):[]);
  const fromObj=ex.object ? adWords(ex.object).filter(w=>!AD_STOP.has(w)&&w.length>1&&!blockWords.has(w)) : [];
  if(fromObj.length) return fromObj.slice(0,3);
  // object 없으면 en에서 추출하되 블록 단어는 빼고 (블록과 안 겹치는 내용어만)

function adGrade(block, ex, heard){
  const h=adNorm(heard);
  const hWords=h.split(" ").filter(Boolean);

  let blockHit=adCoreVariants(block.block).some(v=>(" "+h+" ").includes(" "+v+" "));
  if(!blockHit){ blockHit=adSeqInOrder(hWords, adCoreSeq(block.block)); }
  // 2) 슬롯 매칭: 정확 포함 → 실패 시 활용형(get/getting) 관대 매칭
  const slot=adSlotWords(ex, block);
  const hit=slot.filter(w=>(" "+h+" ").includes(" "+w+" ") || hWords.some(hw=>adLooseWordEq(hw,w))).length;
  const slotHit=!slot.length || hit>=Math.max(1, Math.ceil(slot.length*0.5));

    it.due=Math.min(it.due||Date.now(), Date.now());
  }
  if(context){ const sk=String(context).slice(0,60); if(sk && it.ctx.indexOf(sk)<0) it.ctx.push(sk); }
  reuseSave(q.sort((a,b)=>(a.due||0)-(b.due||0) || (b.createdAt||0)-(a.createdAt||0)));
  return true;
}
function reuseRecord(en, ko, context, ok){
  const key=reuseNorm(en); if(!key) return false;
  let q=reuseGet(); let it=q.find(x=>x&&x.key===key);
  if(!it){ reuseAdd(en, ko, "record", context); q=reuseGet(); it=q.find(x=>x&&x.key===key); if(!it) return false; }
  it.tries=(it.tries||0)+1; if(ok) it.success=(it.success||0)+1;
  if(ko&&!it.ko) it.ko=ko;
  if(context){ const sk=String(context).slice(0,60); if(sk && it.ctx.indexOf(sk)<0) it.ctx.push(sk); }
  it.lastAt=Date.now();
  const ctxLeft=Math.max(0, REUSE_GOAL_CONTEXTS-(it.ctx||[]).length);
  it.due = ctxLeft>0 ? Date.now()+Math.max(1,ctxLeft)*120000 : Date.now()+3*86400000;
  reuseSave(q.sort((a,b)=>(a.due||0)-(b.due||0) || (b.createdAt||0)-(a.createdAt||0)));
  return true;
}
function reuseDue(max){
  const now=Date.now();
  return reuseGet()
    .filter(x=>x&&x.en&&(((x.ctx||[]).length<REUSE_GOAL_CONTEXTS) || (x.due||0)<=now))
    .sort((a,b)=>(a.due||0)-(b.due||0) || ((a.ctx||[]).length-(b.ctx||[]).length))
    .slice(0,max||5);
}
function reusePromptHint(){
  const due=reuseDue(6);
  if(!due.length) return "";
  return [
    "RETRIEVAL QUEUE: The learner has already met these expressions. Your priority is to make them retrieve the SAME expression in NEW situations, not repeat the same example.",
    due.map((x,i)=>`${i+1}. ${x.en}${x.ko?` (${x.ko})`:""} - used in ${(x.ctx||[]).length}/${REUSE_GOAL_CONTEXTS} contexts`).join("\n"),
    "Create situations where one queued expression is the natural answer. Do not reveal the English before the learner tries. Accept meaning-equivalent answers. After they answer, give the natural version and reuse it later in a different setting."
  ].join("\n");
}
function reuseBestTarget(){
  const x=reuseDue(1)[0];
  return x?{target:x.en, ko:x.ko||"", source:x.source||"reuse"}:null;
}

// 실제 사용자 실력 레벨: 문제 난이도와 분리해서 "완전히 아는/들은/말한" 개수로 계산
const SKILL_PROF_KEY="speakingroom:skill_profile_v1";
function skillProfBase(){ return {words:{}, listen:{}, speak:{}}; }
function skillProfGet(){
  const p=hGet(SKILL_PROF_KEY, skillProfBase())||skillProfBase();
  p.words=p.words||{}; p.listen=p.listen||{}; p.speak=p.speak||{};
  return p;
}
function skillProfSave(p){ hSet(SKILL_PROF_KEY,p); }
function skillKey(en){ return String(en||"").toLowerCase().replace(/[^a-z0-9' ]/g," ").replace(/\s+/g," ").trim(); }
function isSingleWordTarget(en){ const k=skillKey(en); return /^[a-z]+$/.test(k); }
function commonFreqRank(en){
  try{ const i=(COMMON_FREQ_WORDS||[]).indexOf(skillKey(en)); return i>=0?i+1:null; }catch(e){ return null; }
}
function profRecordWordIfMastered(en, ko){
  const k=skillKey(en); if(!k || !isSingleWordTarget(k)) return false;
  const si=srsGet(en); if(!si || si.stage!=="mastered") return false;
  const p=skillProfGet();
  const cur=p.words[k]||{en:en, ko:ko||si.ko||"", rank:commonFreqRank(en), masteredAt:Date.now(), perfect:0};
  cur.perfect=(cur.perfect||0)+1; cur.lastAt=Date.now();
  if(ko && !cur.ko) cur.ko=ko;
  p.words[k]=cur; skillProfSave(p); return true;
}
function profRecordListenPerfect(en, ko){
  const k=skillKey(en); if(!k) return false;
  const p=skillProfGet();
  const cur=p.listen[k]||{en:en, ko:ko||"", perfect:0, firstAt:Date.now()};
  cur.perfect=(cur.perfect||0)+1; cur.lastAt=Date.now();
  if(ko && !cur.ko) cur.ko=ko;
  p.listen[k]=cur; skillProfSave(p); return true;
}
function profRecordSpeakPerfect(en, ko, ctx){
  const k=skillKey(en); if(!k) return false;
  const p=skillProfGet();
  const cur=p.speak[k]||{en:en, ko:ko||"", perfect:0, ctx:[], firstAt:Date.now()};
  cur.perfect=(cur.perfect||0)+1; cur.lastAt=Date.now();
  if(ctx && cur.ctx.indexOf(ctx)<0) cur.ctx.push(ctx);
  if(ko && !cur.ko) cur.ko=ko;
  p.speak[k]=cur; skillProfSave(p); return true;
}
function profLevelByCount(n, maxCount){
  n=Math.max(0, Number(n)||0);
  if(n<=0) return 1;
  return Math.max(1, Math.min(60, Math.floor(Math.sqrt(Math.min(n,maxCount)/maxCount)*59)+1));
}
function profSkillStats(){
  const p=skillProfGet();
  const wordKeys=new Set(Object.keys(p.words||{}));
  try{
    Object.values(srsAll()).forEach(it=>{
      if(it && it.stage==="mastered" && isSingleWordTarget(it.en)) wordKeys.add(skillKey(it.en));
    });
  }catch(e){}
  const listenPerfect=Object.keys(p.listen||{}).length;
  const speakPerfect=Object.keys(p.speak||{}).length;
  const wordKnown=wordKeys.size;
  const wordLevel=profLevelByCount(wordKnown,5000);
  const listenLevel=profLevelByCount(listenPerfect,1200);
  const speakLevel=profLevelByCount(speakPerfect,800);
  const overallLevel=Math.max(1, Math.min(60, Math.round(wordLevel*0.45+listenLevel*0.30+speakLevel*0.25)));
  return {wordKnown, listenPerfect, speakPerfect, wordLevel, listenLevel, speakLevel, overallLevel};
}

function lvlNeed(L){ if(L<=5) return 100; if(L<=10) return 150; if(L<=20) return 200; if(L<=40) return 250; return 300; }
function levelInfo(xp){ let L=1, rem=xp||0; while(rem>=lvlNeed(L) && L<999){ rem-=lvlNeed(L); L++; } return {level:L, inLevel:rem, need:lvlNeed(L)}; }

function chestRoll(){ const tot=CHEST_TABLE.reduce((s,c)=>s+c.w,0); let x=Math.random()*tot;

// ===== 안티파밍: 일일 소프트 캡 250 XP(초과분 50% 감소) + 동일 항목 반복 감쇠 =====
const SOFT_CAP=250;
function xpDayGet(){ let d=hGet("speakingroom:xpday",null); const today=DAYN(); if(!d||d.date!==today){ d={date:today,cat:{},item:{},total:0}; hSet("speakingroom:xpday",d); } if(!d.cat)d.cat={}; if(!d.item)d.item={}; if(d.total==null)d.total=0; return d; }
function awardXP(cat, base, label, itemKey){
  base=Math.round(base||0); if(base<=0) return 0;
  const d=xpDayGet();
  // 동일 항목 반복 감쇠
  if(itemKey){ const n=(d.item[itemKey]||0)+1; d.item[itemKey]=n; if(n>=7) base=Math.round(base*0.2); else if(n>=4) base=Math.round(base*0.5); }
  // 일일 소프트 캡: 250 넘으면 이후 획득 50%
  if((d.total||0)>=SOFT_CAP) base=Math.round(base*0.5);
  if(base<1) base=1;
  d.total=(d.total||0)+base; d.cat[cat]=(d.cat[cat]||0)+base;
  hSet("speakingroom:xpday",d);
  addXP(base,label);
  return base;
}

function addXP(amount,label){
  amount=Math.round(amount||0); if(amount<=0) return;
  const p=getProf(); const before=levelInfo(p.xp).level;
  p.xp=(p.xp||0)+amount; hSet("speakingroom:prof",p);
  const after=levelInfo(p.xp).level;
  xpToast(amount,label, after>before?after:0);
  if(after>before){
    try{ levelUpCelebrate(after); }catch(e){}
    // 🎁 20레벨마다 보물상자
    let chests=0; for(let L=before+1; L<=after; L++){ if(L%20===0) chests++; }
    if(chests>0){ for(let i=0;i<chests;i++) grantChest(); setTimeout(()=>{ try{ openChestFlow(); }catch(e){} }, 2700); }
  }
  try{ checkBadges(); }catch(e){}
  renderHome();
}
