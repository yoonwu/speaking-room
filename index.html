      const bar=(label,v)=>`<div style="display:flex;align-items:center;gap:8px;margin:5px 0"><span style="width:74px;font-size:12px;color:var(--muted)">${label}</span><span style="flex:1;height:8px;border-radius:99px;background:var(--mist);overflow:hidden"><span style="display:block;height:100%;width:${v}%;background:${v>=70?'#FF8568':v>=45?'#e6ad4a':'#e0533f'}"></span></span><span style="width:30px;text-align:right;font-size:12px;font-weight:800;color:var(--text)">${v}</span></div>`;
      const plist=(Array.isArray(r.phrases)?r.phrases:[]).filter(p=>p&&p.en).map(p=>`• ${p.en}${p.ko?" — "+p.ko:""}`).join("\n");
      const html=`<div style="text-align:center;margin-bottom:6px"><div style="font-size:13px;color:var(--muted)">${r.solved?"🟢 문제 해결 성공":"🔴 아직 미해결 — 다시 도전!"}</div><div style="font-size:40px;font-weight:900;color:${overall>=70?'#FF8568':overall>=45?'#e6ad4a':'#e0533f'}">${overall}</div><div style="font-size:11px;color:var(--muted)">생존 종합 점수</div></div>
      ${bar("소통",com)}${bar("문제해결",ps)}${bar("자신감",conf)}${bar("회복력",rec)}
      ${r.ko?`<div style="font-size:13px;color:var(--text);margin-top:10px;line-height:1.6">${escapeHtml(r.ko)}</div>`:""}
      ${plist?`<div style="font-size:12.5px;color:var(--muted);margin-top:10px;border-top:1px solid var(--line);padding-top:8px;white-space:pre-line">💾 저장된 핵심표현\n${escapeHtml(plist)}</div>`:""}
      ${active?`<div style="font-size:12.5px;color:#f59e0b;font-weight:800;margin-top:8px">💎 능동 어휘 +${active}</div>`:""}`;
      setTimeout(()=>openModal({title:"🌎 생존 리포트", html:html, input:false, okText:"좋아요"}), 380);
    }});
    return;
  }
  openModal({title:"끝내고 평가받기", msg:"이 대화를 마치고 AI 점수(1~20점)를 받을까요?", input:false, okText:"평가받기", onOk:async()=>{
    xpToast(0); const t=$("#xpToast"); if(t){ t.innerHTML="AI가 채점 중…"; t.classList.add("show"); }
    const transcript=state.convo.map(m=>(m.role==="user"?"Learner: ":"Coach: ")+m.text).join("\n");
    const sys=[
"You are a kind English tutor. Score the LEARNER's spoken English in this role-play from 1 to 20, considering their level ("+state.level+"): effort, range of expressions, accuracy, and natural flow. Be encouraging — a learner who genuinely tried gets a fair score, never harsh.",
'Return ONLY JSON: {"score": <1-20 integer>, "ko": "한 줄 칭찬과 개선 팁 (한국어)"}'
    ].join("\n");
    let score=10, ko="";
    try{ const data=await callClaude(sys,[{role:"user",content:transcript}]); const o=parseJSON(extractText(data)); score=Math.max(1,Math.min(20,Math.round(o.score||10))); ko=o.ko||""; }catch(e){}
    if(t) t.classList.remove("show");
    bumpCount("talk"); awardXP("output",score,"회화 평가","conv:eval");
    goToSetup();
    setTimeout(()=>openModal({title:`회화 점수 ${score} / 20 🎉`, msg:ko||"수고했어요! 계속 말할수록 늘어요.", input:false, okText:"좋아요"}), 380);
  }});
}

async function clearAllCaches(){
  try{ if(window.caches && caches.keys){ const ks=await caches.keys(); await Promise.all(ks.map(k=>caches.delete(k))); } }catch(e){}
  try{ if(navigator.serviceWorker){ const rs=await navigator.serviceWorker.getRegistrations(); await Promise.all(rs.map(r=>r.unregister())); } }catch(e){}
}
async function forceUpdate(){
  const t=document.createElement("div");
  t.textContent="업데이트 확인 중…";
  t.style.cssText="position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--jade);color:#ffffff;font-weight:800;padding:10px 18px;border-radius:999px;z-index:99999;font-size:13px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5)";
  document.body.appendChild(t);
  await clearAllCaches();
  setTimeout(()=>{ location.replace(location.pathname+"?v="+Date.now()); }, 400);
}
async function checkForUpdate(){
  try{
    const res=await fetch("index.html?cb="+Date.now(), {cache:"no-store"});
    if(!res.ok) return;
    const txt=await res.text();
    const m=txt.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if(!m) return;
    const latest=m[1];
    if(latest && latest!==APP_VERSION){
      // 같은 latest로 이미 한 번 새로고침했는데도 옛 버전이면 → 무한루프 대신 수동 버튼
      let tried=null; try{ tried=sessionStorage.getItem("sr_upd"); }catch(e){}
      if(tried===latest){
        const b=document.createElement("button");
        b.textContent="🔄 새 버전("+latest+") 적용하기";
        b.style.cssText="position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--jade);color:#ffffff;font-weight:900;padding:13px 20px;border-radius:999px;z-index:99999;font-size:14px;border:none;box-shadow:0 10px 28px -8px rgba(0,0,0,.6)";
        b.onclick=forceUpdate; document.body.appendChild(b);
        return;
      }
      try{ sessionStorage.setItem("sr_upd", latest); }catch(e){}
      const t=document.createElement("div");
      t.textContent="새 버전 적용 중… ("+latest+")";
      t.style.cssText="position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--jade);color:#ffffff;font-weight:800;padding:10px 18px;border-radius:999px;z-index:99999;font-size:13px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5)";
      document.body.appendChild(t);
      await clearAllCaches();
      setTimeout(()=>{ location.replace(location.pathname+"?v="+encodeURIComponent(latest)+"_"+Date.now()); }, 700);
    } else {
      try{ sessionStorage.removeItem("sr_upd"); }catch(e){}  // 최신 도달 — 플래그 정리
    }
  }catch(e){}
}
