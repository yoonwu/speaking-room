// 3) 오답 분석 + 4) 연음 설명 (동시 호출)
async function lsRunAnalysis(){
  TTS&&TTS.cancel();
  $("#listenScroll").innerHTML=`<div class="lloading">받아쓰기를 분석하는 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  const analyzeSys=[
"You are an expert listening coach for Korean learners. Compare the original spoken sentence with the user's dictation and find exactly what they missed.",
"Explain simply (in Korean for the reason/tip fields): 1) missing words 2) wrong words 3) why it was hard to HEAR 4) connected speech 5) reductions 6) native pronunciation patterns. Keep it simple. This is listening training, not grammar.",
'Return ONLY JSON: {"correct_sentence":"","missed_words":[],"mistakes":[],"listening_reason":"왜 안 들렸는지 한국어","pronunciation_tip":"한국어 팁","native_pattern":"원어민 패턴 한국어"}'
  ].join("\n");
  const connSys=[
"You help Korean learners UNDERSTAND spoken English (listening, not grammar).",
"For the sentence, explain how native speakers actually pronounce it: reductions, contractions, connected speech. Give the spoken/reduced form (e.g. 'Would you'->'Wudja', 'want to'->'wanna', 'going to'->'gonna'). Keep it simple. Do NOT teach grammar.",
'Return ONLY JSON: {"spoken_version":"how it really sounds","explanation":"무엇이 어떻게 연음/축약되는지 한국어 설명","korean_tip":"짧은 한국어 듣기 팁"}'
  ].join("\n");
  const orig=lsItem.en||"";
  try{
    const [aD,cD]=await Promise.all([
      callClaude(analyzeSys,[{role:"user",content:`Original: ${orig}\nUser answer: ${lsAnswer||"(빈 답)"}`}], FAST_MODEL),
      callClaude(connSys,[{role:"user",content:`Sentence: ${orig}`}], FAST_MODEL)
    ]);
    lsAnalysis=parseJSON(extractText(aD));
    lsConn=parseJSON(extractText(cD));
  }catch(e){ lsAnalysis={correct_sentence:orig,missed_words:[],mistakes:[],listening_reason:"",pronunciation_tip:"",native_pattern:""}; lsConn=null; }
  if(!lsAwarded){ lsAwarded=true; addXP(6,"받아쓰기"); bumpCount("listen"); questBump("listen"); }
  renderListenAnalysis();
}
function diffHighlight(correct, answer){
  const ans=new Set(normAns(answer).split(/\s+/).filter(Boolean));
  return (correct||"").split(/(\s+)/).map(tok=>{
    if(/^\s+$/.test(tok)) return tok;
    const clean=normAns(tok);
    if(clean && !ans.has(clean)) return `<span style="color:#e0533f;font-weight:700;border-bottom:2px solid #e0533f">${escapeHtml(tok)}</span>`;
    return escapeHtml(tok);
  }).join("");
}
function renderListenAnalysis(){
  const a=lsAnalysis||{}; const c=lsConn||{};
  const correct=a.correct_sentence||lsItem.en||"";
  const missed=(a.missed_words||[]).filter(Boolean);
  const mistakes=(a.mistakes||[]).filter(Boolean);
  $("#listenScroll").innerHTML=`<div class="lcard">
    <div class="lmeta" style="text-align:center">🔍 오답 분석</div>
    <div style="font-size:12px;color:var(--muted);margin:8px 0 4px">정답 문장 <span style="color:#e0533f">(빨강 = 놓친 부분)</span></div>
    <div style="font-family:var(--serif);font-size:21px;line-height:1.5;color:var(--text);margin-bottom:6px">${diffHighlight(correct, lsAnswer)}</div>
    ${lsAnswer?`<div style="font-size:13px;color:var(--muted);margin-bottom:14px">내 답: "${escapeHtml(lsAnswer)}"</div>`:`<div style="font-size:13px;color:var(--muted);margin-bottom:14px">(답을 건너뛰었어요)</div>`}
    ${missed.length?`<div class="lkey show" style="margin-bottom:10px"><div class="ki"><span><span class="ken">놓친 단어</span><span class="kko">${missed.map(escapeHtml).join(" · ")}</span></span></div></div>`:""}
    ${mistakes.length?`<div style="font-size:13.5px;color:var(--text);background:var(--mist);border-radius:11px;padding:11px 13px;margin-bottom:10px"><b>잘못 들은 것:</b> ${mistakes.map(escapeHtml).join(", ")}</div>`:""}
    ${a.listening_reason?`<div style="font-size:13.5px;line-height:1.6;color:var(--text);background:var(--amber-soft);border:1px solid #3a3320;border-radius:11px;padding:12px 14px;margin-bottom:10px">👂 <b>왜 안 들렸나:</b> ${escapeHtml(a.listening_reason)}</div>`:""}
    ${c.spoken_version?`<div style="background:rgba(31,211,160,.1);border:1px solid rgba(31,211,160,.3);border-radius:11px;padding:12px 14px;margin-bottom:10px">
      <div style="font-size:12px;color:var(--jade);font-weight:800;margin-bottom:4px">🔗 실제 발음 (연음·축약)</div>
      <div style="font-family:var(--serif);font-size:19px;color:var(--jade)">${escapeHtml(c.spoken_version)}</div>
      ${c.explanation?`<div style="font-size:13px;color:var(--text);line-height:1.6;margin-top:6px">${escapeHtml(c.explanation)}</div>`:""}
      ${c.korean_tip?`<div style="font-size:12.5px;color:var(--muted);margin-top:5px">💡 ${escapeHtml(c.korean_tip)}</div>`:""}
    </div>`:""}
    ${a.pronunciation_tip?`<div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:6px">🗣 ${escapeHtml(a.pronunciation_tip)}</div>`:""}
    ${a.native_pattern?`<div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:6px">🎯 원어민 패턴: ${escapeHtml(a.native_pattern)}</div>`:""}
    <div class="lctrls" style="justify-content:center;margin-top:6px"><button id="lsReplay">🔊 다시 듣기</button><button id="lsSaveNote">＋ 노트 저장</button></div>
    <button class="sh-next" id="lsToShadow">🗣 따라 말하기 →</button>
  </div>`;
  $("#listenScroll").scrollTop=0;
  setTimeout(()=>lsSpeak(false),300);
  $("#lsReplay").onclick=()=>lsSpeak(false);
  $("#lsSaveNote").onclick=function(){ if(addReviewItem(lsItem.en, lsItem.ko, "chunk")){ renderNotes(); saveNotes(); refreshRvBanner(); } this.textContent="저장됨 ✓"; this.disabled=true; };
  $("#lsToShadow").onclick=renderListenShadow;
}

// 7) AI 대화 이어가기

function playDialogue(slow){

/* ---- 흘려듣기: 자동으로 계속 이어지는 핸즈프리 듣기 ---- */
let floodOn=false, floodCount=0;
function startFlood(){
  if(state.topic) markPractice({mode:"listen", id:state.topic.id, emo:"🎧", label:(state.topic.t||"")+" 흘려듣기"});
  setup.style.display="none"; stage.style.display="none"; $("#listen").style.display="flex"; pushScreen("listen");
  $("#ctxBar").style.display="flex"; $("#notesToggle").style.display="none"; $("#ttsBtn").style.display="none";
  $("#evalBtn").style.display="none";
  $("#ctxScn").textContent = state.topic.id==="custom" ? "직접 입력" : state.topic.t;
  $("#ctxLvl").textContent = state.level + " · 흘려듣기";
  floodOn=true; floodCount=0; $("#lnext").style.display="none";
  floodLoop();
}
async function floodLoop(){
  if(!floodOn) return;
  $("#listenScroll").innerHTML=`<div class="lloading">다음 대화 준비 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  let p=null;
  try{
    const data=await callClaude(passageSys(),[{role:"user",content:"Create one dialogue now."}]);
    p=parseJSON(extractText(data));
  }catch(e){ if(floodOn) setTimeout(floodLoop,1800); return; }
  if(!floodOn || !p || !p.lines) return;
  curPassage=p; floodCount++;
  renderFlood(p);
  await playFlood(p);
  if(!floodOn) return;
  await new Promise(r=>setTimeout(r,750));
  floodLoop();
}
function renderFlood(p){
  const sp=p.speakers||{A:"A",B:"B"};
  const enHTML=(p.lines||[]).map(l=>{
    const name=(l.speaker==="B"?sp.B:sp.A)||l.speaker;
    return `<div class="dline ${l.speaker==="B"?"b":"a"}"><span class="spk">${escapeHtml(name)}</span><span class="dl-en">${escapeHtml(l.en||"")}</span></div>`;
  }).join("");
  $("#listenScroll").innerHTML=`<div class="lcard" style="text-align:center">
    <div class="lmeta">🎧 흘려듣기 · ${floodCount}번째 대화</div>
    <div class="ltitle">${escapeHtml(p.title||"Conversation")}</div>
    <div class="flood-wave"><span class="lwave"><i></i><i></i><i></i><i></i><i></i></span></div>
    <div class="ltext show" style="margin-top:6px">${enHTML}</div>
    <button class="sh-next" id="floodStop" style="background:#e7e0d6;color:var(--ink)">⏸ 정지</button>
  </div>`;
  $("#listenScroll").scrollTop=0;
  $("#floodStop").onclick=()=>{ floodOn=false; TTS&&TTS.cancel(); goToSetup(); };
}
function playFlood(p){
  return new Promise(res=>{
    const lines=p.lines||[];
    if(!lines.length || !TTS){ res(); return; }
    TTS.cancel();
    const rate=state.level==="초급"?0.9:state.level==="고급"?1.0:0.96;
    lines.forEach((ln,i)=>{
      const u=new SSU(ln.en||""); u.voice=(ln.speaker==="B"?voiceB:voiceA)||enVoice; u.lang="en-US"; u.rate=rate;
      if(i===lines.length-1) u.onend=()=>res();
      TTS.speak(u);
    });
    setTimeout(()=>{ if(floodOn===false) res(); }, 200);
  });
}

/* ============ review engine (SRS recall) ============ */
const DAY=86400000;
const INTERVALS=[0,1,3,7,16,35]; // days per box

function addReviewItem(en, ko, type, original){
  en=(en||"").trim(); if(!en) return false;
  if(state.notes.some(n=>n.en===en)) return false;
  state.notes.push({en, ko:(ko||"").trim(), type:type||"chunk", original:(original||"").trim(), box:0, due:Date.now(), reps:0, lapses:0});
  return true;
}
function normalizeDeck(){
  state.notes.forEach(n=>{
    if(n.box===undefined) n.box=0;
    if(n.due===undefined) n.due=Date.now();
    if(n.reps===undefined) n.reps=0;
    if(n.lapses===undefined) n.lapses=0;
    if(n.type===undefined) n.type="chunk";
  });
}
function dueCount(){ const t=Date.now(); return state.notes.filter(n=>(n.due||0)<=t).length; }
function refreshRvBanner(){
  const c=dueCount(), has=state.notes.length>0;
  $("#rvBanner").style.display = has?"flex":"none";
  $("#rvCount").textContent=c;
  $("#rvStart").disabled = c===0;
  $("#rvSpeed").disabled = state.notes.length===0;
  $("#rvStart").textContent = c===0?"다 했어요 ✓":"복습 시작";
}
function scheduleItem(n, ok){
  n.reps=(n.reps||0)+1;
  if(ok){ n.box=Math.min((n.box||0)+1, INTERVALS.length-1); }
  else { n.lapses=(n.lapses||0)+1; n.box=Math.max(0,(n.box||0)-2); }
  n.due = Date.now() + INTERVALS[n.box]*DAY;
}
let curScreen="setup";
function pushScreen(which){
  if(which!=="setup"){
    try{ if(curScreen==="setup") history.pushState({s:which},""); else history.replaceState({s:which},""); }catch(e){}
  }
  curScreen=which;
}
function enterStage(which){
  setup.style.display = which==="setup"?"block":"none";
  stage.style.display = which==="talk"?"flex":"none";
  $("#listen").style.display = which==="listen"?"flex":"none";
  $("#review").style.display = which==="review"?"flex":"none";
  $("#block").style.display = which==="block"?"flex":"none";
  $("#vocab").style.display = which==="vocab"?"flex":"none";
  pushScreen(which);
}

let rvQueue=[], rvOkCount=0, rvSessionTotal=0, rvWeak=new Set(), rvActive=false;
function startReview(){
  const t=Date.now();
  rvQueue = state.notes.filter(n=>(n.due||0)<=t).sort((a,b)=>(a.box-b.box)||(a.due-b.due));
  if(!rvQueue.length) return;
  rvOkCount=0; rvSessionTotal=rvQueue.length; rvWeak=new Set(); rvActive=true;
  $("#rvModeTag").textContent="복습"; $("#rvModeTag").style.color="";
  enterStage("review"); $("#ctxBar").style.display="none";

}
function showRecallCard(){
  if(!rvQueue.length) return reviewDone();
  const n=rvQueue[0];
  const isCorr=n.type==="correction";
  const promptKo = n.ko || (isCorr?"이걸 자연스럽게 고쳐 말해보세요":"…");
  const card=document.createElement("div"); card.className="rvcard";
  card.innerHTML=`
    <div class="rv-tag ${isCorr?"corr":""}">${isCorr?"교정 복습 · 자연스럽게 다시":"한국어 → 영어로 말해보세요"}</div>
    ${isCorr && n.original?`<div class="rv-orig">${escapeHtml(n.original)}</div>`:""}
    <div class="rv-prompt">${escapeHtml(promptKo)}</div>
    <div class="rv-say">🗣️ 소리 내서 먼저 말해보고 → 정답 확인</div>
    <div class="rv-answer" id="rvAns">
      <div class="ans-en">${escapeHtml(n.en)}</div>
      <button class="ans-replay" id="rvReplay"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg> 듣기</button>
    </div>
    <button class="rv-reveal" id="rvReveal">정답 보기</button>
    <div class="rv-grade" id="rvGrade">
      <button class="rv-miss" id="rvMiss">✗ 막혔어</button>
      <button class="rv-got" id="rvGot">✓ 알았어</button>

  const body=$("#rvBody"); body.innerHTML=""; body.appendChild(card);
  updateRvProg();

  $("#rvReplay").onclick=()=>speakEn(n.en);
  $("#rvGot").onclick=()=>gradeCard(true);

function gradeCard(ok){
  const n=rvQueue.shift();

  else { rvWeak.add(n.en); const pos=Math.min(3, rvQueue.length); rvQueue.splice(pos,0,n); }
  showRecallCard();
}
function updateRvProg(){
  const pct = rvSessionTotal? Math.round((rvOkCount/rvSessionTotal)*100):0;

function speakEn(text){
  if(!TTS||!SSU) return;
  if(/[\uac00-\ud7a3]/.test(text)){ speakKo(text); return; } // 한글이면 한국어 음성으로
  TTS.cancel();
  const u=new SSU(text); if(voiceA) u.voice=voiceA; u.lang="en-US"; u.rate=0.95;
  TTS.speak(u);
}
function speakKo(text){
  if(!TTS||!SSU) return;
  TTS.cancel();
  const u=new SSU(text); if(koVoice) u.voice=koVoice; u.lang="ko-KR"; u.rate=0.98;
  TTS.speak(u);
}

function vbankGet(){ return hGet("speakingroom:vbank",{}); }
function vbankSave(b){ hSet("speakingroom:vbank",b); }
function ensureSeed(themeId){
  const b=vbankGet();
  if(b[themeId]===undefined && SEED_VOCAB[themeId]){ b[themeId]=SEED_VOCAB[themeId].map(s=>s.slice()); vbankSave(b); }
}
function takeFromBank(themeId){
  const b=vbankGet(); const arr=b[themeId]||[];
  if(arr.length){ const set=arr.shift(); b[themeId]=arr; vbankSave(b); return set; }
  return null;
}
function pushToBank(themeId,set){
  const b=vbankGet(); const arr=b[themeId]||[]; arr.push(set); while(arr.length>6) arr.shift(); b[themeId]=arr; vbankSave(b);
}
function vocabPrompt(theme){
  const seed=Math.floor(Math.random()*100000);

"Create a vocabulary set for a Korean learner (level: "+state.level+"). Theme: "+theme.topic+".",
"Pick 5 genuinely useful everyday words or short expressions. For EACH word give 3 example sentences that use the word — but each example MUST use a DIFFERENT sentence frame or structure (do NOT start them all the same way). This teaches the word across varied contexts. Also give 2 common collocations. Keep sentences short and natural. Variety seed "+seed+".",
"CRITICAL: 'word' MUST be the ENGLISH word/phrase (e.g. 'to clean'), and 'ko' MUST be its KOREAN meaning (e.g. '청소하다'). NEVER swap them. All 'en' fields are English, all 'ko' fields are Korean. Also include a 'blank' field: ONE example sentence as fill-in-the-blank with the target word replaced by '____', plus the 'answer'.",
'Return ONLY JSON: {"words":[{"word":"refill","ko":"리필","diff":1,"examples":[{"en":"Can I get a refill?","ko":"리필 되나요?"},{"en":"Do you do free refills?","ko":"리필 공짜인가요?"},{"en":"I would love a refill.","ko":"리필 받고 싶어요."}],"blank":{"en":"Can I get a ____?","ko":"리필 되나요?","answer":"refill"},"colloc":["get a refill","free refill"]}]} where diff is 1 (easy) 2 (medium) or 3 (advanced).'
  ].join("\n");
}
async function aiVocabSet(theme){

let voWords=[], voOrder=[], voPos=0, voRound=1, voT0=0, voTimes={};
function voShuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

function voNext(){

async function voSubmit(w, answer){

  let fb={used:usedWord, natural:sit.model, tip:""};
  if(answer){
    try{
      const sys=[
"A Korean learner is practicing spontaneous OUTPUT of the English word \""+w.word+"\" (meaning: "+(w.ko||"")+").",
"They were asked to say an English sentence USING this word for this situation (in Korean): \""+sit.ko+"\".",
"Judge their answer. Did they actually use the target word? Is it natural? Give the natural version they SHOULD say (it must use \""+w.word+"\"), and ONE short Korean coaching tip.",
'Return ONLY JSON: {"used":true or false,"natural":"natural English using the word","tip":"짧은 한국어 피드백"}'
      ].join("\n");
      const d=await callClaude(sys,[{role:"user",content:answer}], FAST_MODEL);

    }catch(e){}
  }
  // 인출속도 기록
  if(!voTimes[w.word]) voTimes[w.word]={};
  voTimes[w.word][voRound]=elapsed;
  try{ const arr=hGet("speakingroom:recall",[]); arr.push(Math.round(elapsed*10)/10); hSet("speakingroom:recall", arr.slice(-60)); }catch(e){}
  // 첫 등장(라운드1)에서 1회만 집계

    const pts={1:5,2:8,3:10}[w.diff]||7; addXP(pts,"단어 "+w.word); bumpCount("vocab"); questBump("vocab");

}

function normAns(s){ return String(s||"").toLowerCase().replace(/^to\s+/,"").replace(/[^a-z0-9 ]/g,"").trim(); }
function renderVocabQuiz(w){
  const bl=w.blank; const answer=bl.answer||w.word;
  const diff=w.diff||1;
  const enHtml=escapeHtml(bl.en).replace(/_+/g,'<span class="blankbox" id="mbBlank"></span>');

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 17v4"/></svg>
        </button>
        <button class="mbside" id="mbKbd"><span class="ic">⌨️</span>키보드 모드</button>

    </div>`;
  $("#vbBody").innerHTML=""; $("#vbBody").appendChild(card);
  const inp=$("#qzInput"), status=$("#mbStatus"), blank=$("#mbBlank"), micB=$("#mbMic");
  let attempts=0, done=false;
  const na=normAns(answer);
  const isCorrect=(val)=>{ const nv=normAns(val); if(!nv) return false;
    return nv===na || nv.includes(na) || (na.includes(nv) && nv.length>=3); };
  const fillGreen=()=>{ if(blank){ blank.classList.remove("blankbox"); blank.className="filled"; blank.textContent=answer; } };
  const requeueWrong=()=>{ if(w._again) return; const rest=vocabWords.length-(vbIdx+1);
    const pos=vbIdx+2+Math.floor(Math.random()*Math.max(1,rest));

    }

// 정답/넘김 공용 — 집계(복습 등록·XP·퀘스트) 후 다음 카드
function advanceVocab(w){

// 콜백형 음성 입력 (큰 마이크용)
async function micFillCb(cb){
  if(qzRecording){ return; }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    qzChunks=[]; const mime=getBestMime();
    qzMR= mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    const am=qzMR.mimeType||mime;
    qzMR.ondataavailable=e=>{ if(e.data.size>0) qzChunks.push(e.data); };
    qzMR.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); qzRecording=false;
      const raw=new Blob(qzChunks,{type:am}); if(raw.size<1000){ cb(""); return; }
      try{
        const wav=await recordedToWav(raw);
        const res=await fetch(PROXY_URL+"/stt",{method:"POST",headers:{"Content-Type":"audio/wav"},body:wav});
        const data=await res.json();
        cb(data.DisplayText? data.DisplayText.replace(/[.?!]$/,""):"");
      }catch(e){ cb(""); }
    };
    qzMR.start(250); qzRecording=true;
    setTimeout(()=>{ if(qzRecording&&qzMR&&qzMR.state!=="inactive") qzMR.stop(); },7000);
  }catch(e){ cb(""); }
}

/* ============ speech synthesis (TTS) ============ */
let enVoice=null, voiceA=null, voiceB=null, koVoice=null;
function pickVoice(){
  const vs=TTS.getVoices().filter(v=>/^en/i.test(v.lang));
  const kos=TTS.getVoices().filter(v=>/^ko/i.test(v.lang));
  koVoice = kos.find(v=>/Google|Yuna|Female|Heami/i.test(v.name)) || kos[0] || null;
  if(!vs.length) return;
  const us=vs.filter(v=>/en-US/i.test(v.lang));
  const pool = us.length>=2 ? us : vs;
  voiceA = pool.find(v=>/Google US English|Samantha|Aria|Jenny|Zira|Female/i.test(v.name)) || pool[0];
  voiceB = pool.find(v=>v!==voiceA && /Male|David|Mark|Daniel|Alex|Google UK English Male|Guy/i.test(v.name))
        || pool.find(v=>v!==voiceA) || voiceA;
  enVoice = voiceA;
}
if(TTS){
  pickVoice();
  TTS.onvoiceschanged=pickVoice;
}
function speak(text){
  if(!TTS||!SSU) return;
  TTS.cancel();
  const u=new SSU(text);
  if(enVoice) u.voice=enVoice;
  u.lang="en-US"; u.rate = state.level==="초급"?0.9 : state.level==="고급"?1.05 : 0.97;
  TTS.speak(u);
}

/* ============ Azure STT — 회화 마이크 ============ */
let mediaRec=null, listening=false, audioChunks=[];
function initRec(){
  if(!navigator.mediaDevices){ micBtn.style.display="none"; return; }
}
function getBestMime(){
  const types=["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/mp4","audio/aac"];
  return types.find(t=>MediaRecorder.isTypeSupported(t)) || "";
}
// 녹음 blob → WAV(PCM 16kHz mono). Azure가 제일 확실하게 받는 포맷.
function encodeWAV(samples, rate){
  const buf=new ArrayBuffer(44+samples.length*2), v=new DataView(buf);
  const ws=(o,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+samples.length*2,true); ws(8,"WAVE");
  ws(12,"fmt "); v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,samples.length*2,true);
  let o=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2; }
  return buf;
}
async function recordedToWav(blob){
  const arrayBuf=await blob.arrayBuffer();
  const AC=window.AudioContext||window.webkitAudioContext;
  const tmp=new AC();
  const decoded=await tmp.decodeAudioData(arrayBuf);
  tmp.close && tmp.close();
  const rate=16000;
  const off=new OfflineAudioContext(1, Math.max(1,Math.ceil(decoded.duration*rate)), rate);
  const src=off.createBufferSource(); src.buffer=decoded; src.connect(off.destination); src.start(0);
  const rendered=await off.startRendering();
  return new Blob([encodeWAV(rendered.getChannelData(0), rate)], {type:"audio/wav"});
}
async function toggleMic(){
  if(listening){ stopAzureSTT(); return; }
  TTS && TTS.cancel();
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    const mimeType = getBestMime();
    mediaRec = mimeType ? new MediaRecorder(stream, {mimeType}) : new MediaRecorder(stream);
    const actualMime = mediaRec.mimeType || mimeType;
    mediaRec.ondataavailable = e=>{ if(e.data.size>0) audioChunks.push(e.data); };
    mediaRec.onstop = async ()=>{
      stream.getTracks().forEach(t=>t.stop());
      listening=false; micBtn.classList.remove("live");
      const raw = new Blob(audioChunks, {type: actualMime});
      if(raw.size < 1000){
        hint.textContent="🔇 소리가 안 잡혔어요. 마이크 가까이서 다시.";
        setTimeout(()=>hint.textContent="",3000); return;
      }
      hint.textContent="🔄 인식 중…";
      let wav;
      try{ wav=await recordedToWav(raw); }
      catch(err){ hint.textContent="오디오 변환 실패: "+String(err).slice(0,50); setTimeout(()=>hint.textContent="",4000); return; }
      try{
        const res = await fetch(PROXY_URL+"/stt",{
          method:"POST",
          headers:{"Content-Type": "audio/wav"},

        });
        const txt = await res.text();
        let data; try{ data=JSON.parse(txt); }catch(e){ data=null; }
        if(!res.ok){ hint.textContent="STT 오류 "+res.status+": "+txt.slice(0,70); setTimeout(()=>hint.textContent="",5000); return; }
        if(data && data.RecognitionStatus==="Success" && data.DisplayText){
          const t = data.DisplayText.replace(/\.$/,"");
          msg.value = t;   // 다시 말하면 기존(틀린) 문장 교체
          autoSize(); refreshSend();

        } else {
          hint.textContent="안 들렸어요: "+(data?data.RecognitionStatus:txt.slice(0,50));
          setTimeout(()=>hint.textContent="",3500);
        }
      }catch(e){ hint.textContent="네트워크 오류: "+String(e).slice(0,50); setTimeout(()=>hint.textContent="",4000); }
    };
    mediaRec.start(250);
    listening=true; micBtn.classList.add("live");
    hint.textContent="🎤 듣고 있어요… 말하고 다시 누르면 전송";
    setTimeout(()=>{ if(listening) stopAzureSTT(); }, 15000);
  }catch(e){
    hint.textContent = e.name==="NotAllowedError"?"마이크 권한을 허용해 주세요.":"마이크 오류 — 브라우저에서 열어보세요";
  }
}
function stopAzureSTT(){ if(mediaRec && mediaRec.state!=="inactive"){ mediaRec.stop(); } }

async function toggleDrillMic(){

    drillMR.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());

function stopDrillMic(){ if(drillMR&&drillMR.state!=="inactive"){ drillMR.stop(); drillRecording=false; } }
function renderDrillResult(data){
  const r=$("#drillResult"); if(!r) return;
  const n=data?.NBest?.[0];
  // REST detailed 포맷은 점수를 NBest[0] 바로 위에 둠. (SDK는 .PronunciationAssessment 중첩)
  const pa = n && (n.PronunciationAssessment || (n.AccuracyScore!=null ? n : null));
  if(!pa){
    const st=data?.RecognitionStatus||"(상태없음)";
    const heard=data?.DisplayText||n?.Display||"";
    let msg;
    if(st==="Success"||heard){ msg=`인식은 됐는데 점수가 안 왔어요.<br>들린 말: "${escapeHtml(heard||"?")}"`; }
    else if(/NoMatch|Silence|InitialSilence/i.test(st)){ msg=`소리가 잘 안 잡혔어요 🔇<br>마이크 가까이서 또렷하게 다시 말해보세요.`; }
    else { msg=`상태: ${escapeHtml(st)}`; }
    const raw=(window._lastPronounceRaw||"").slice(0,700);
    r.innerHTML=`<div style="color:var(--muted);text-align:center;font-size:13px;line-height:1.6">${msg}</div>
      <details style="margin-top:12px"><summary style="font-size:12px;color:var(--muted);cursor:pointer">🔧 진단 정보 (개발용)</summary>
      <pre style="white-space:pre-wrap;word-break:break-all;font-size:10.5px;color:#8b948c;background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:8px;margin-top:8px;max-height:160px;overflow:auto">${escapeHtml(raw||"(빈 응답)")}</pre>
      <button id="copyRaw" style="margin-top:6px;width:100%;padding:8px;border-radius:8px;background:var(--mist);color:var(--text);border:1px solid var(--line);font-size:12px">📋 진단 정보 복사</button></details>`;
    const cr=$("#copyRaw"); if(cr) cr.onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(window._lastPronounceRaw||""); cr.textContent="복사됨 ✓"; };
    return;
  }
  const acc=Math.round(pa.AccuracyScore||0);
  const flu=Math.round(pa.FluencyScore||0);
  const comp=Math.round(pa.CompletenessScore||0);
  // Azure가 PronScore(종합)를 주면 그걸 우선 사용
  const overall=Math.round(pa.PronScore!=null ? pa.PronScore : (acc*0.5+flu*0.3+comp*0.2));
  const color=overall>=80?"#1fd3a0":overall>=60?"#e6ad4a":"#e0533f";
  const emoji=overall>=80?"😊":overall>=60?"🙂":"😅";
  // 단어별 색상 (점수는 단어 객체 바로 위 또는 중첩 둘 다 대응)
  const words=(n?.Words||[]);
  const wordHtml=words.map(w=>{
    const ws=Math.round((w.PronunciationAssessment&&w.PronunciationAssessment.AccuracyScore!=null?w.PronunciationAssessment.AccuracyScore:w.AccuracyScore)||0);
    const wc=ws>=80?"#1fd3a0":ws>=60?"#e6ad4a":"#e0533f";
    return `<span style="color:${wc};font-family:var(--serif);font-size:17px;margin:0 3px" title="${ws}점">${escapeHtml(w.Word)}</span>`;
  }).join(" ");
  // XP 지급 — 80점 이상이면 확실히 보상
  const xp = overall>=80 ? Math.max(5, Math.round(overall/10)) : Math.round(overall/10);
  if(xp>0) addXP(xp,"발음 드릴");
  r.innerHTML=`
    <div style="text-align:center;margin-bottom:12px">
      <div style="font-size:48px;font-weight:900;color:${color}">${overall}</div>
      <div style="font-size:13px;color:var(--muted)">/ 100 ${emoji}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:14px">

function phStars(add){ let n=hGet("speakingroom:kidstars",0); if(add){ n+=add; hSet("speakingroom:kidstars",n); } return n; }
function speakRate(text,rate){ if(!TTS||!SSU)return; TTS.cancel(); const u=new SSU(text); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=rate||0.9; TTS.speak(u); }
function speakChain(parts){ if(!TTS||!SSU)return; TTS.cancel(); let i=0; (function go(){ if(i>=parts.length)return; const p=parts[i++]; const u=new SSU(p.t); if(voiceA)u.voice=voiceA; u.lang="en-US"; u.rate=p.rate||0.9; u.onend=()=>setTimeout(go,p.gap||120); TTS.speak(u); })(); }

// 아이용 발음 녹음 → 점수(0~100). 탭하면 녹음, 3.2초 후 자동 종료
let phMR=null, phRec=false;
function phMic(ref, btn, cb){
  if(phRec){ if(phMR&&phMR.state!=="inactive") phMR.stop(); return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    let chunks=[]; const mime=getBestMime();
    phMR=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);
    const am=phMR.mimeType||mime; phRec=true; if(btn) btn.classList.add("rec");
    phMR.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
    phMR.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop()); phRec=false; if(btn) btn.classList.remove("rec");
      const raw=new Blob(chunks,{type:am}); if(raw.size<1000){ cb(null); return; }
      try{ const wav=await recordedToWav(raw);
        const b64=btoa(unescape(encodeURIComponent(ref)));
        const res=await fetch(PROXY_URL+"/pronounce",{method:"POST",headers:{"Content-Type":"audio/wav","X-Pronunciation-Text-B64":b64},body:wav});
        const t=await res.text(); let d; try{d=JSON.parse(t);}catch(e){d=null;}
        const n=d&&d.NBest&&d.NBest[0]; const pa=n&&(n.PronunciationAssessment||(n.AccuracyScore!=null?n:null));
        cb(pa?Math.round(pa.PronScore!=null?pa.PronScore:(pa.AccuracyScore||0)):null);
      }catch(e){ cb(null); }
    };
    phMR.start(250);
    setTimeout(()=>{ if(phRec&&phMR&&phMR.state!=="inactive") phMR.stop(); }, 3200);
  }).catch(e=>cb(null));
}

function phScoreFx(sc, st, alsoNote){
  if(sc==null){ st.innerHTML=`<span style="color:#e87">🔇 한 번 더! 마이크 가까이</span>`; return; }
  let stars=0, msg;
  if(sc>=75){ stars=3; msg=`🌟🌟🌟 완벽해요!`; }
  else if(sc>=55){ stars=2; msg=`⭐⭐ 잘했어요!`; }
  else if(sc>=35){ stars=1; msg=`⭐ 좋아요! 한 번 더 해볼까?`; }
  else { stars=1; msg=`👏 도전 성공! (${sc}점)`; }
  phStars(stars);
  st.innerHTML=`<span style="color:#10b981;font-weight:900">${msg}</span>`;
  // 상단 별 갱신
  const sb=$("#phonicsScroll").querySelector(".phstars"); if(sb) sb.textContent="⭐ "+phStars();
  burstStars(stars);
}

    s.style.cssText=`position:fixed;left:${40+Math.random()*20}%;top:55%;font-size:${18+Math.random()*16}px;z-index:200;pointer-events:none;transition:transform 1s ease-out,opacity 1s`;
    document.body.appendChild(s);
    requestAnimationFrame(()=>{ s.style.transform=`translate(${(Math.random()-.5)*220}px,${-120-Math.random()*120}px) rotate(${(Math.random()-.5)*180}deg)`; s.style.opacity="0"; });
    setTimeout(()=>s.remove(),1050);
  }
}

const QUEST_GOALS={vocab:20, block:5, talk:5, listen:20};
const QUEST_META={vocab:{emo:"📖",t:"단어"}, block:{emo:"🧱",t:"블록"}, talk:{emo:"🗣️",t:"회화"}, listen:{emo:"🎧",t:"듣기"}};
function questGet(){
  const today=DAYN(); let q=hGet("speakingroom:quest",null);
  if(!q || q.date!==today){ q={date:today, vocab:0, block:0, talk:0, listen:0, rewarded:false}; hSet("speakingroom:quest",q); }
  return q;
}
function questBump(cat){
  const q=questGet(); if(q[cat]==null) return;
  q[cat]=Math.min(QUEST_GOALS[cat], (q[cat]||0)+1);
  const allDone=Object.keys(QUEST_GOALS).every(k=>q[k]>=QUEST_GOALS[k]);
  if(allDone && !q.rewarded){ q.rewarded=true; hSet("speakingroom:quest",q); addXP(30,"일일 퀘스트 완료! 🏆"); }
  else hSet("speakingroom:quest",q);
  renderQuest();
}
function renderQuest(){ renderModeProgress(); }
const MODE_HERO={
  vocab:{emo:"📖",t:"단어 학습",d:"여러 다른 문장으로 단어를 익혀요",c:"#1fd3a0",bg:"rgba(31,211,160,.14)"},
  block:{emo:"🧱",t:"블록 영어",d:"핵심 표현을 블록처럼 쌓아요",c:"#f0883e",bg:"rgba(240,136,62,.14)"},
  talk: {emo:"🗣️",t:"실전 회화",d:"상황 속에서 직접 말해봐요",c:"#a78bfa",bg:"rgba(167,139,250,.16)"},
  listen:{emo:"🎧",t:"듣기 훈련",d:"섀도잉·되말하기로 귀를 뚫어요",c:"#5b9bf5",bg:"rgba(91,155,245,.14)"}
};

function renderModeProgress(){
  renderModeHero();
  const box=$("#modeProgress"); if(!box) return;
  const m=(state&&state.mode)||"vocab";
  const cat=(m==="talk")?"talk":(m==="listen")?"listen":(m==="block")?"block":"vocab";
  const q=questGet(); const cur=q[cat]||0, goal=QUEST_GOALS[cat], pct=Math.min(100,Math.round(cur/goal*100));
  const meta=QUEST_META[cat]; const fin=cur>=goal;
  const lbl=$("#mpLabel"), cnt=$("#mpCount"), bar=$("#mpBar");
  if(lbl) lbl.textContent="오늘 "+meta.t+(fin?" ✓":"");
  if(lbl) lbl.style.color=fin?"var(--jade)":"var(--text)";

function markPractice(last){

function editName(){ openModal({title:"이름 설정", msg:"앱에서 부를 이름을 적어주세요.", input:true, placeholder:"예: 지훈", okText:"저장", onOk:(v)=>{ hSet("speakingroom:name",(v||"").trim().slice(0,12)); renderHome(); if($("#profScrim").classList.contains("show")) renderProfile(); }}); }
function startMission(){ const sc=dailyScenario(); state.mode="talk"; state.scn=sc; startSession(); }
function resumeLast(last){
  if(!last) return;
  if(last.mode==="talk"){ const s=SCENARIOS.find(x=>x.id===last.id); if(s){ state.mode="talk"; state.scn=s; startSession(); return; } }
  if(last.mode==="listen"){ const t=TOPICS.find(x=>x.id===last.id); if(t){ state.mode="listen"; state.topic=t; startListening(); return; } }
  if(last.mode==="vocab"){ const v=VOCAB_THEMES.find(x=>x.id===last.id); if(v){ state.mode="vocab"; state.vocabTheme=v; startVocab(); return; } }
  if(last.mode==="block"){ state.mode="block"; startStudy(); return; }
}

/* ============ XP / level / rewards / profile ============ */
const REWARDS=[
  {lv:5,  emo:"🎮", t:"게임 시간 +30분"},
  {lv:10, emo:"🍦", t:"좋아하는 간식"},
  {lv:15, emo:"🧸", t:"로블록스 +2,000원"},
  {lv:20, emo:"🎬", t:"영화 한 편 / 외식"},
  {lv:30, emo:"🎯", t:"로블록스 +3,000원"},
  {lv:40, emo:"📚", t:"갖고 싶던 것"},
  {lv:50, emo:"🏆", t:"로블록스 +5,000원"},
];
function lvlNeed(L){ return 40 + (L-1)*10; }
function levelInfo(xp){ let L=1, rem=xp||0; while(rem>=lvlNeed(L) && L<999){ rem-=lvlNeed(L); L++; } return {level:L, inLevel:rem, need:lvlNeed(L)}; }
function getProf(){ return hGet("speakingroom:prof",{xp:0,vocab:0,block:0,talk:0,listen:0}); }
function bumpCount(type){ const p=getProf(); if(p[type]!=null){ p[type]+=1; hSet("speakingroom:prof",p); } }
function addXP(amount,label){
  amount=Math.round(amount||0); if(amount<=0) return;
  const p=getProf(); const before=levelInfo(p.xp).level;
  p.xp=(p.xp||0)+amount; hSet("speakingroom:prof",p);
  const after=levelInfo(p.xp).level;
  xpToast(amount,label, after>before?after:0); renderHome();
}
function xpToast(amount,label,lvUp){
  const t=$("#xpToast"); if(!t) return;
  t.innerHTML=`<span class="xv">+${amount} XP</span>${label?" · "+label:""}${lvUp?`<span class="lvup">🎉 레벨 ${lvUp} 달성!</span>`:""}`;
  t.classList.add("show"); clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove("show"), lvUp?3400:2100);
}
function openProfile(){ renderProfile(); $("#profScrim").classList.add("show"); }
function closeProfile(){ $("#profScrim").classList.remove("show"); }
function renderProfile(){
  const p=getProf(); const li=levelInfo(p.xp);
  const name=(hGet("speakingroom:name","")||"친구");
  const st=hGet("speakingroom:streak",{n:0});
  const pct=Math.round(li.inLevel/li.need*100);
  const stats=[["📖",p.vocab||0,"배운 단어"],["🧱",p.block||0,"익힌 블록"],["🗣️",p.talk||0,"회화 세션"],["🎧",p.listen||0,"들은 대화"]];
  let rwHtml="", nextSet=false;
  REWARDS.forEach(r=>{
    const done=li.level>=r.lv; const isNext=!done&&!nextSet; if(isNext) nextSet=true;
    rwHtml+=`<div class="rwd ${done?'done':''} ${isNext?'next':''}"><div class="re">${r.emo}</div><div class="rt"><div class="rlv">LV ${r.lv}</div><div class="rn">${escapeHtml(r.t)}</div></div><div class="rstat">${done?'달성 ✓':isNext?`${r.lv-li.level}레벨 남음`:'잠김'}</div></div>`;
  });
  $("#profSheet").innerHTML=`
    <div class="prof-grab"></div>
    <div class="prof-hd">
      <div class="prof-av">${escapeHtml(name.slice(0,1))}</div>
      <div style="flex:1"><div class="prof-name" id="profNameEdit">${escapeHtml(name)}님 ✏️</div><div class="prof-sub">🔥 ${st.n||1}일 연속 · 총 ${p.xp||0} XP</div></div>
      <button class="prof-close" id="profClose">✕</button>
    </div>
    <div class="xpbar-wrap">
      <div class="xpbar-top"><div class="xpbar-lv">레벨 <b>${li.level}</b></div><div class="xpbar-n">${li.inLevel} / ${li.need} XP</div></div>
      <div class="xpbar"><i style="width:${pct}%"></i></div>
    </div>
    <div class="stat-grid">${stats.map(s=>`<div class="stat"><div class="se">${s[0]}</div><div><div class="sv">${s[1]}</div><div class="sl">${s[2]}</div></div></div>`).join("")}</div>
    <div class="prof-h">🎁 보상 사다리 — 부모님이 정해주세요</div>
    ${rwHtml}
    <p style="font-size:11.5px;color:var(--muted);text-align:center;margin-top:13px;line-height:1.7">점수: 단어 5~10 · 블록 10 · 듣기 5 (섀도잉·되말하기 +6) · 회화는 AI가 1~20점 채점</p>`;
  $("#profClose").onclick=closeProfile;
  $("#profNameEdit").onclick=editName;
}
async function endAndEvaluate(){
  const userTurns=(state.convo||[]).filter(m=>m.role==="user").length;
  if(userTurns<1){ goToSetup(); return; }
  openModal({title:"끝내고 평가받기", msg:"이 대화를 마치고 AI 점수(1~20점)를 받을까요?", input:false, okText:"평가받기", onOk:async()=>{
    xpToast(0); const t=$("#xpToast"); if(t){ t.innerHTML="AI가 채점 중…"; t.classList.add("show"); }
    const transcript=state.convo.map(m=>(m.role==="user"?"Learner: ":"Coach: ")+m.text).join("\n");
    const sys=[
"You are a kind English tutor. Score the LEARNER's spoken English in this role-play from 1 to 20, considering their level ("+state.level+"): effort, range of expressions, accuracy, and natural flow. Be encouraging — a learner who genuinely tried gets a fair score, never harsh.",
'Return ONLY JSON: {"score": <1-20 integer>, "ko": "한 줄 칭찬과 개선 팁 (한국어)"}'
    ].join("\n");
    let score=10, ko="";
    try{ const data=await callClaude(sys,[{role:"user",content:transcript}]); const o=parseJSON(extractText(data)); score=Math.max(1,Math.min(20,Math.round(o.score||10))); ko=o.ko||""; }catch(e){}
    if(t) t.classList.remove("show");
    bumpCount("talk"); addXP(score,"회화 평가");
    goToSetup();
    setTimeout(()=>openModal({title:`회화 점수 ${score} / 20 🎉`, msg:ko||"수고했어요! 계속 말할수록 늘어요.", input:false, okText:"좋아요"}), 380);
  }});
}

// ── 자동 업데이트: 켤 때 최신 버전 감지하면 알아서 새로고침 (캐시 문제 끝) ──
async function checkForUpdate(){
  try{
    const res=await fetch("index.html?cb="+Date.now(), {cache:"no-store"});
    if(!res.ok) return;
    const txt=await res.text();
    const m=txt.match(/APP_VERSION\s*=\s*"([^"]+)"/);
    if(!m) return;
    const latest=m[1];
    if(latest && latest!==APP_VERSION){
      const cur=new URLSearchParams(location.search).get("v");
      if(cur===latest) return;            // 이미 최신 URL — 무한루프 방지
      const t=document.createElement("div");
      t.textContent="새 버전 적용 중… ("+latest+")";
      t.style.cssText="position:fixed;left:50%;top:18px;transform:translateX(-50%);background:var(--jade);color:#06231b;font-weight:800;padding:10px 18px;border-radius:999px;z-index:99999;font-size:13px;box-shadow:0 8px 24px -8px rgba(0,0,0,.5)";
      document.body.appendChild(t);
      setTimeout(()=>{ location.replace(location.pathname+"?v="+encodeURIComponent(latest)); }, 700);
    }
  }catch(e){}
}
