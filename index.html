<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>스피킹 룸 — 영어 회화 트레이너</title>
<meta name="theme-color" content="#0e100f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="스피킹 룸">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230e100f'/%3E%3Ctext x='50' y='50' font-size='52' text-anchor='middle' dominant-baseline='central'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#f3f5f3; --ink-soft:#cfd4d0;
  --paper:#0e100f; --surface:#191d1b;
  --mist:#23272a; --line:#2c322e;
  --jade:#1fd3a0; --jade-deep:#16b488;
  --amber:#e6ad4a; --amber-soft:#2a2418;
  --lav:#9b98ec; --lav-soft:#21222e;
  --text:#eceeec; --muted:#8b948c;
  --serif:'Newsreader', Georgia, serif;
  --sans:'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  --soft:0 4px 18px -8px rgba(0,0,0,.5);
  --soft2:0 10px 30px -12px rgba(0,0,0,.6);
  --card2:#1f2421;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); color:var(--text);
  background:var(--paper); -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,textarea{font-family:inherit}

/* ---------- App shell ---------- */
#app{display:flex; flex-direction:column; height:100dvh; max-width:1100px; margin:0 auto; position:relative}

/* ---------- Top bar ---------- */
.topbar{
  display:flex; align-items:center; gap:12px;
  padding:14px 20px; border-bottom:1px solid var(--line);
  background:var(--surface);
}
.brand{display:flex; align-items:center; gap:10px}
.brand .dot{width:11px; height:11px; border-radius:50%; background:var(--jade); box-shadow:0 0 0 4px rgba(19,163,127,.15)}
.brand h1{font-size:16px; font-weight:700; letter-spacing:-.02em}
.brand h1 span{color:var(--muted); font-weight:500}
.topbar .ctx{margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--muted)}
.ctx .chip{background:var(--mist); padding:5px 11px; border-radius:999px; font-weight:600; color:var(--ink-soft); white-space:nowrap}
.iconbtn{width:34px; height:34px; border-radius:9px; display:grid; place-items:center; color:var(--muted)}
.iconbtn:hover{background:var(--mist); color:var(--text)}
.iconbtn.on{color:var(--jade)}

/* ---------- Setup screen ---------- */
.setup{flex:1; overflow-y:auto; padding:34px 22px 60px}
.setup-inner{max-width:560px; margin:0 auto}
.setup .lead{font-family:var(--serif); font-size:30px; line-height:1.25; font-weight:500; letter-spacing:-.01em; margin-bottom:8px}
.setup .lead em{font-style:italic; color:var(--jade-deep)}
.setup .sub{color:var(--muted); font-size:14.5px; line-height:1.6; margin-bottom:30px}
.field{margin-bottom:26px}
.field > label{display:block; font-size:12px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:11px}
.levels{display:flex; gap:8px}
.levels button{
  flex:1; padding:11px 6px; border-radius:11px; border:1.5px solid var(--line);
  background:var(--surface); font-size:13.5px; font-weight:600; color:var(--ink-soft); transition:.13s;
}
.levels button .en{display:block; font-size:10.5px; color:var(--muted); font-weight:500; margin-top:2px; letter-spacing:.02em}
.levels button[aria-pressed="true"]{border-color:var(--jade); background:#f0faf6; color:var(--jade-deep)}
.levels button[aria-pressed="true"] .en{color:var(--jade)}
.scn{display:grid; grid-template-columns:1fr 1fr; gap:9px; max-height:46vh; overflow-y:auto; overflow-x:hidden; padding:3px 8px 3px 3px; margin-right:-4px; scrollbar-width:thin; -webkit-overflow-scrolling:touch}
.scn::-webkit-scrollbar{width:7px}
.scn::-webkit-scrollbar-thumb{background:rgba(120,90,50,.22); border-radius:99px}
.scn::-webkit-scrollbar-track{background:transparent}
.scn button{
  text-align:left; padding:14px 14px; border-radius:13px; border:1.5px solid var(--line);
  background:var(--surface); transition:.13s; display:flex; gap:11px; align-items:center;
}
.scn button .emo{font-size:21px; line-height:1}
.scn button .t{font-size:13.5px; font-weight:600; color:var(--text)}
.scn button .d{font-size:11px; color:var(--muted); margin-top:1px}
.scn button[aria-pressed="true"]{border-color:var(--jade); background:#f0faf6}
.scn button:hover{border-color:#c9cdd9}
#customWrap{margin-top:11px; display:none}
#customWrap.show{display:block}
#customInput{
  width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px;
  font-size:14px; resize:none; line-height:1.5;
}
#customInput:focus{outline:none; border-color:var(--jade)}
.startbtn{
  width:100%; padding:15px; border-radius:13px; background:var(--jade); color:#fff;
  font-size:15.5px; font-weight:700; letter-spacing:-.01em; transition:.13s; margin-top:6px;
  box-shadow:0 6px 18px -6px rgba(19,163,127,.5);
}
.startbtn:hover{background:var(--jade-deep)}
.startbtn:disabled{background:#c5cad4; box-shadow:none; cursor:not-allowed}

/* mode segmented switch */
.modesw{display:flex; gap:6px; background:var(--mist); padding:5px; border-radius:14px; margin-bottom:26px}
.modesw button{
  flex:1; padding:12px 8px; border-radius:10px; font-size:14px; font-weight:700; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:3px; transition:.13s;
}
.modesw button .sm{font-size:11px; font-weight:500; letter-spacing:.02em}
.modesw button[aria-pressed="true"]{background:var(--surface); color:var(--ink); box-shadow:0 2px 6px -2px rgba(20,22,40,.18)}

/* ---------- Listening view ---------- */
.listen{flex:1; display:flex; flex-direction:column; min-height:0; background:var(--paper)}
.listen-scroll{flex:1; overflow-y:auto; padding:26px 20px 30px}
.lcard{
  max-width:600px; margin:0 auto; background:var(--surface); border:1px solid var(--line);
  border-radius:20px; padding:26px 24px; box-shadow:0 10px 30px -18px rgba(20,22,40,.25);
}
.lcard .ltitle{font-family:var(--serif); font-size:22px; font-weight:500; letter-spacing:-.01em; margin-bottom:4px}
.lcard .lmeta{font-size:12px; color:var(--muted); margin-bottom:22px}
.bigplay{
  width:100%; padding:18px; border-radius:15px; background:var(--ink); color:#fff;
  display:flex; align-items:center; justify-content:center; gap:11px; font-size:15.5px; font-weight:700; transition:.14s;
}
.bigplay:hover{background:var(--ink-soft)}
.bigplay.playing{background:var(--jade)}
.bigplay svg{width:22px; height:22px}
.lwave{display:inline-flex; gap:3px; align-items:center; height:22px}
.lwave i{width:3px; background:#fff; border-radius:3px; height:8px; animation:wv .9s ease-in-out infinite}
.lwave i:nth-child(2){animation-delay:.15s} .lwave i:nth-child(3){animation-delay:.3s} .lwave i:nth-child(4){animation-delay:.45s} .lwave i:nth-child(5){animation-delay:.6s}
@keyframes wv{0%,100%{height:7px}50%{height:20px}}
.lblind{text-align:center; color:var(--muted); font-size:13px; margin:16px 0 4px; line-height:1.6}
.lctrls{display:flex; flex-wrap:wrap; gap:8px; margin-top:18px}
.lctrls button{
  font-size:12.5px; font-weight:600; padding:9px 14px; border-radius:10px;
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft); transition:.12s;
  display:inline-flex; align-items:center; gap:6px;
}
.lctrls button:hover{border-color:#c9cdd9}
.lctrls button[aria-pressed="true"]{border-color:var(--jade); background:#f0faf6; color:var(--jade-deep)}
.ltext{
  margin-top:20px; padding:18px 18px; background:var(--paper); border-radius:13px; border:1px solid var(--line);
  font-family:var(--serif); font-size:17px; line-height:1.7; color:#1c1e30; display:none;
}
.ltext.show{display:block}
.dline{display:flex; gap:10px; margin-bottom:11px; align-items:baseline}
.dline:last-child{margin-bottom:0}
.dline .spk{
  flex:none; font-family:var(--sans); font-size:10.5px; font-weight:700; letter-spacing:.02em;
  padding:3px 9px; border-radius:999px; min-width:54px; text-align:center; margin-top:3px;
}
.dline.a .spk{background:#e7f4ef; color:var(--jade-deep)}
.dline.b .spk{background:#eeeefc; color:var(--lav)}
.dline .dl-en{flex:1; line-height:1.6}
.ltrans .dline .spk{background:#e3e7f0; color:#5a5d78}
.ltrans .dline .dl-en{font-family:var(--sans); font-size:13.5px; color:#4a4d68}
.ltrans{margin-top:12px; padding:14px 16px; background:#f3f6fb; border-radius:13px; font-size:14px; line-height:1.65; color:#4a4d68; display:none}
.ltrans.show{display:block}
.lkey{margin-top:12px; display:none}
.lkey.show{display:block}
.lkey .ki{
  display:flex; align-items:center; gap:10px; padding:10px 13px; background:var(--amber-soft);
  border:1px solid #f1e2c4; border-radius:11px; margin-bottom:7px;
}
.lkey .ki .ken{font-family:var(--serif); font-size:15px; color:#1c1e30; font-weight:500}
.lkey .ki .kko{font-size:12.5px; color:var(--muted); margin-top:1px}
.lkey .ki button{margin-left:auto; font-size:11px; font-weight:700; color:#b3771a; background:#fff; border:1px solid #f0e3c8; padding:5px 10px; border-radius:8px; white-space:nowrap}
.lkey .ki button:hover{background:var(--amber-soft)}
.lkey .ki button:disabled{color:#1c7a5c; border-color:#cce8db; background:#f0faf6}
.lnext{max-width:600px; margin:18px auto 0; display:flex; gap:10px}
.lnext button{
  flex:1; padding:14px; border-radius:13px; font-size:14.5px; font-weight:700; transition:.13s;
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
}
.lnext .next{background:var(--jade); color:#fff; box-shadow:0 6px 18px -7px rgba(19,163,127,.5)}
.lnext .next:hover{background:var(--jade-deep)}
.lnext .back{background:var(--mist); color:var(--ink-soft); flex:none; padding:14px 18px}
.lnext .back:hover{background:#e2e5ee}
.lloading{max-width:600px; margin:0 auto; text-align:center; padding:60px 20px; color:var(--muted); font-size:14px}
.lloading .typing{justify-content:center; margin-top:14px; display:flex}

/* ---------- Review banner (setup) ---------- */
.rvbanner{
  display:flex; align-items:center; gap:14px; padding:15px 17px; margin-bottom:22px;
  border-radius:15px; background:linear-gradient(135deg,#142a24,#1d3d33); color:#eafaf3;
}
.rvbanner .rvb-l{display:flex; align-items:baseline; gap:9px}
.rvbanner .rvb-n{font-size:26px; font-weight:800; letter-spacing:-.02em; color:#5fe6b6; font-variant-numeric:tabular-nums}
.rvbanner .rvb-t{font-size:13px; font-weight:600; color:#bfe9da}
.rvbanner .rvb-btns{margin-left:auto; display:flex; gap:7px}
.rvbanner .rvb-btns button{
  font-size:12.5px; font-weight:700; padding:9px 13px; border-radius:10px; transition:.13s; white-space:nowrap;
}
#rvStart{background:#16c08a; color:#06241a}
#rvStart:hover{background:#1ad99d}
#rvSpeed{background:rgba(255,255,255,.13); color:#eafaf3}
#rvSpeed:hover{background:rgba(255,255,255,.22)}
#rvSpeed:disabled,#rvStart:disabled{opacity:.4; cursor:not-allowed}

/* ---------- Review stage ---------- */
.review{flex:1; display:flex; flex-direction:column; min-height:0; background:var(--paper)}
.rv-top{display:flex; align-items:center; gap:12px; padding:14px 18px; border-bottom:1px solid var(--line)}
.rv-top .rvback{width:34px; height:34px; border-radius:9px; display:grid; place-items:center; color:var(--muted)}
.rv-top .rvback:hover{background:var(--mist); color:var(--text)}
.rv-prog{flex:1}
.rv-progbar{height:6px; border-radius:999px; background:var(--mist); overflow:hidden}
.rv-progbar i{display:block; height:100%; background:var(--jade); border-radius:999px; transition:width .3s}
.rv-progtxt{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:5px}
.rv-mode{font-size:12px; font-weight:700; color:var(--jade-deep); background:#eafaf3; padding:5px 11px; border-radius:999px}
.rv-body{flex:1; overflow-y:auto; padding:30px 20px; display:flex; flex-direction:column}

.rvcard{max-width:540px; width:100%; margin:auto; text-align:center}
.rv-tag{font-size:11px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin-bottom:18px}
.rv-tag.corr{color:#b3771a}
.rv-prompt{font-size:27px; font-weight:600; letter-spacing:-.01em; line-height:1.35; color:var(--text); margin-bottom:8px}
.rv-orig{font-family:var(--serif); font-size:15px; color:#a05a5a; text-decoration:line-through; margin-bottom:6px}
.rv-say{font-size:13px; color:var(--muted); margin-bottom:26px}
.rv-answer{
  display:none; margin:6px 0 26px; padding:20px 18px; background:var(--surface); border:1px solid var(--line);
  border-radius:15px;
}
.rv-answer.show{display:block}
.rv-answer .ans-en{font-family:var(--serif); font-size:24px; font-weight:500; color:#1c1e30; line-height:1.4}
.rv-answer .ans-replay{margin-top:11px; font-size:12.5px; font-weight:600; color:var(--jade-deep); display:inline-flex; align-items:center; gap:6px}
.rv-answer .ans-replay:hover{color:var(--jade)}
.rv-reveal{
  width:100%; max-width:300px; margin:0 auto; padding:15px; border-radius:13px;
  background:var(--ink); color:#fff; font-size:15px; font-weight:700; transition:.13s;
}
.rv-reveal:hover{background:var(--ink-soft)}
.rv-grade{display:none; gap:10px; max-width:360px; margin:0 auto}
.rv-grade.show{display:flex}
.rv-grade button{flex:1; padding:15px; border-radius:13px; font-size:15px; font-weight:700; transition:.13s}
.rv-miss{background:#fdecea; color:#c14a36; border:1.5px solid #f6d5cf}
.rv-miss:hover{background:#fbe0db}
.rv-got{background:#e9f7f1; color:var(--jade-deep); border:1.5px solid #c5e8db}
.rv-got:hover{background:#dcf2e9}

/* speed drill */
.rv-timer{height:8px; border-radius:999px; background:var(--mist); overflow:hidden; max-width:300px; margin:0 auto 26px}
.rv-timer i{display:block; height:100%; background:var(--amber); width:100%}
.rv-timer i.run{transition:width linear}
.rv-stop{margin-top:24px; font-size:13px; font-weight:600; color:var(--muted)}
.rv-stop:hover{color:var(--text)}

/* review done */
.rv-done{max-width:420px; margin:auto; text-align:center}
.rv-done .em{font-size:46px; margin-bottom:10px}
.rv-done h2{font-size:23px; font-weight:700; letter-spacing:-.01em; margin-bottom:8px}
.rv-done p{color:var(--muted); font-size:14.5px; line-height:1.6; margin-bottom:26px}
.rv-done .stat{display:inline-flex; gap:22px; margin-bottom:26px}
.rv-done .stat div{display:flex; flex-direction:column}
.rv-done .stat .v{font-size:28px; font-weight:800; letter-spacing:-.02em}
.rv-done .stat .v.ok{color:var(--jade)} .rv-done .stat .v.weak{color:var(--amber)}
.rv-done .stat .l{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:2px}
.rv-done button{padding:14px 28px; border-radius:13px; background:var(--jade); color:#fff; font-size:15px; font-weight:700}
.rv-done button:hover{background:var(--jade-deep)}
.rv-empty{max-width:380px; margin:auto; text-align:center; color:var(--muted); font-size:14.5px; line-height:1.7}
.rv-empty .em{font-size:40px; margin-bottom:12px}

/* block mode highlight */
.blk-hi{background:#eafaf3; color:var(--jade-deep); padding:1px 6px; border-radius:6px; font-weight:600; -webkit-box-decoration-break:clone; box-decoration-break:clone}
.blk-chip{display:inline-block; margin-top:13px; font-size:12px; font-weight:700; color:var(--jade-deep); background:#eafaf3; padding:6px 12px; border-radius:999px}
.blk-actions{display:flex; gap:10px; max-width:360px; margin:0 auto}
.blk-actions button{flex:1; padding:14px; border-radius:13px; font-size:14.5px; font-weight:700; transition:.13s}
.blk-save{background:var(--amber-soft); color:#b3771a; border:1.5px solid #f1e2c4}
.blk-save:hover{background:#f7ebd4} .blk-save:disabled{opacity:.55; cursor:default}
.blk-next{background:var(--jade); color:#fff}
.blk-next:hover{background:var(--jade-deep)}

/* block curriculum panel (setup) */
.blkp-prog{padding:16px 17px; border-radius:15px; background:linear-gradient(135deg,#142a24,#1d3d33); color:#eafaf3; margin-bottom:12px}
.blkp-prog .top{display:flex; align-items:baseline; gap:9px; margin-bottom:11px}
.blkp-prog .tier{font-size:13px; font-weight:800; color:#5fe6b6; background:rgba(95,230,182,.14); padding:4px 11px; border-radius:999px}
.blkp-prog .cnt{font-size:13px; color:#bfe9da; font-weight:600}
.blkp-prog .cnt b{color:#eafaf3; font-size:16px}
.blkp-prog .next{margin-left:auto; font-size:11.5px; color:#9fd3c2}
.blkp-bar{height:7px; border-radius:999px; background:rgba(255,255,255,.13); overflow:hidden}
.blkp-bar i{display:block; height:100%; background:#16c08a; border-radius:999px; transition:width .4s}
.blkp-btn{
  width:100%; text-align:left; padding:15px 16px; border-radius:13px; border:1.5px solid var(--line);
  background:var(--surface); margin-bottom:9px; transition:.13s; display:flex; align-items:center; gap:13px;
}
.blkp-btn:hover{border-color:var(--jade)}
.blkp-btn .ic{font-size:22px; flex:none}
.blkp-btn .tx{flex:1}
.blkp-btn .tt{font-size:14.5px; font-weight:700; color:var(--text)}
.blkp-btn .ds{font-size:12.5px; color:var(--muted); margin-top:2px}
.blkp-btn.primary{background:#f0faf6; border-color:#bfe6d6}
.blkp-btn .arr{color:var(--muted)}
.blkp-btn:disabled{opacity:.5; cursor:not-allowed}
.blkp-btn:disabled:hover{border-color:var(--line)}

/* study explanation card */
.expl{max-width:560px; width:100%; margin:auto}
.expl h2{font-size:13px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:18px; text-align:center}
.expl-block{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:13px}
.expl-block .ph{font-family:var(--serif); font-size:25px; font-weight:500; color:var(--jade-deep); margin-bottom:10px}
.expl-block .mn{font-size:14.5px; line-height:1.6; color:var(--text); margin-bottom:8px}
.expl-block .wh{font-size:13px; line-height:1.6; color:var(--muted); margin-bottom:12px}
.expl-block .ex{background:var(--paper); border-radius:10px; padding:10px 13px; margin-top:6px; display:flex; gap:9px; align-items:center}
.expl-block .ex .exen{font-family:var(--serif); font-size:15px; color:#1c1e30; flex:1}
.expl-block .ex .exsp{font-size:12px; font-weight:700; color:var(--jade-deep); cursor:pointer}
.expl-compare{background:var(--amber-soft); border:1px solid #f1e2c4; border-radius:13px; padding:14px 16px; font-size:13.5px; line-height:1.65; color:#8a6410; margin-bottom:18px}
.expl-compare b{color:#6b4e0a}
.expl-go{width:100%; max-width:300px; margin:6px auto 0; display:block; padding:15px; border-radius:13px; background:var(--jade); color:#fff; font-size:15.5px; font-weight:700}
.expl-go:hover{background:var(--jade-deep)}

/* target hint chip in study drill */
.blk-target{display:inline-block; margin-bottom:20px; font-size:12.5px; font-weight:700; color:#b3771a; background:var(--amber-soft); border:1px solid #f1e2c4; padding:7px 14px; border-radius:999px}
.blk-alts{margin-top:13px; padding-top:13px; border-top:1px dashed var(--line); text-align:left}
.blk-alts .alt{font-size:13px; color:var(--muted); margin-bottom:5px; line-height:1.5}
.blk-alts .alt .ae{font-family:var(--serif); color:#1c7a5c; font-size:14.5px}

/* vocab cards */
.vcard{max-width:560px; width:100%; margin:auto; text-align:center}
.vword{font-family:var(--serif); font-size:34px; font-weight:500; letter-spacing:-.01em; color:var(--jade-deep)}
.vmean{font-size:15px; color:var(--muted); margin-top:2px; margin-bottom:20px}
.vlabel{font-size:11.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); margin-bottom:12px}
.vex{text-align:left}
.vex .ex{display:flex; gap:9px; align-items:center; background:var(--surface); border:1px solid var(--line); border-radius:11px; padding:11px 13px; margin-bottom:3px}
.vex .exen{font-family:var(--serif); font-size:16px; color:#1c1e30; flex:1; line-height:1.4}
.vex .exsp{font-size:14px; cursor:pointer; flex:none}
.vex .exko{font-size:12.5px; color:var(--muted); text-align:left; padding:2px 4px 10px}
.vcols{display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:12px}
.vcol{font-size:12.5px; font-weight:600; color:var(--jade-deep); background:#eafaf3; padding:6px 12px; border-radius:999px}
.vmine{margin-top:16px; text-align:left; background:var(--amber-soft); border:1px solid #f1e2c4; border-radius:13px; padding:14px 15px}
.vmine-you{font-size:13px; color:var(--muted); margin-bottom:7px}
.vmine-en{font-family:var(--serif); font-size:17px; color:#1c7a5c; font-weight:500; display:flex; align-items:center; gap:8px}
.vmine-en .exsp{font-size:14px; cursor:pointer; background:none; border:none}
.vmine-note{font-size:12.5px; color:#8a6410; margin-top:7px; line-height:1.5}

/* custom modal (native prompt/confirm are blocked in sandboxed webviews) */
.modal-scrim{position:fixed; inset:0; background:rgba(20,22,40,.5); z-index:60; display:none; align-items:center; justify-content:center; padding:22px}
.modal-scrim.show{display:flex}
.modal{background:var(--surface); border-radius:18px; padding:22px; width:100%; max-width:380px; box-shadow:0 20px 60px -20px rgba(0,0,0,.45)}
.modal-title{font-size:16px; font-weight:700; margin-bottom:8px}
.modal-msg{font-size:14px; line-height:1.6; color:var(--muted); margin-bottom:14px}
.modal-input{width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:11px; font-size:15px; line-height:1.5; resize:none; margin-bottom:16px}
.modal-input:focus{outline:none; border-color:var(--jade)}
.modal-btns{display:flex; gap:9px}
.modal-btns button{flex:1; padding:13px; border-radius:11px; font-size:14.5px; font-weight:700; transition:.12s}
.modal-cancel{background:var(--mist); color:var(--ink-soft)}
.modal-cancel:hover{background:#e2e5ee}
.modal-ok{background:var(--jade); color:#fff}
.modal-ok:hover{background:var(--jade-deep)}

/* ---------- Chat screen ---------- */
.stage{flex:1; display:flex; min-height:0}
.thread-wrap{flex:1; display:flex; flex-direction:column; min-width:0}
.thread{flex:1; overflow-y:auto; padding:22px 20px 14px; scroll-behavior:smooth}
.thread-inner{max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:16px}
.turn{display:flex; flex-direction:column; max-width:84%}
.turn.coach{align-self:flex-start}
.turn.me{align-self:flex-end; align-items:flex-end}
.who{font-size:11px; font-weight:700; letter-spacing:.04em; color:var(--muted); margin:0 4px 5px; text-transform:uppercase}
.bubble{
  padding:12px 16px; border-radius:16px; font-size:16px; line-height:1.55;
}
.coach .bubble{
  background:var(--surface); border:1px solid var(--line); border-bottom-left-radius:5px;
  font-family:var(--serif); color:#1c1e30;
}
.me .bubble{
  background:var(--ink); color:#f4f5fb; border-bottom-right-radius:5px; font-weight:450;
}
.coach .bubble + .play{
  margin:6px 0 0 4px; font-size:11.5px; font-weight:600; color:var(--muted);
  display:inline-flex; align-items:center; gap:5px; align-self:flex-start;
}
.coach .play:hover{color:var(--jade-deep)}
.coach-acts{display:flex; gap:16px; margin:7px 0 0 4px}
.coach-acts button{font-size:11.5px; font-weight:600; color:var(--muted); display:inline-flex; align-items:center; gap:5px}
.coach-acts button:hover{color:var(--jade-deep)}
.ko-trans{display:none; margin:7px 0 0 4px; max-width:100%; font-size:13.5px; line-height:1.55; color:#5b5d8a; background:#f3f6fb; padding:9px 12px; border-radius:11px}
.ko-trans.show{display:block}
.typing{display:inline-flex; gap:4px; padding:4px 2px}
.typing i{width:7px; height:7px; border-radius:50%; background:#b9bdcb; animation:bd 1.3s infinite}
.typing i:nth-child(2){animation-delay:.18s} .typing i:nth-child(3){animation-delay:.36s}
@keyframes bd{0%,60%,100%{opacity:.3; transform:translateY(0)}30%{opacity:1; transform:translateY(-4px)}}

/* helper + feedback cards inline */
.card{
  align-self:stretch; max-width:640px; margin:2px auto; width:100%;
  border-radius:14px; padding:14px 16px; font-size:13.5px; line-height:1.6;
}
.card.help{background:var(--lav-soft); border:1px solid #dcdcf6}
.card.help h4{font-size:11.5px; font-weight:700; letter-spacing:.03em; color:var(--lav); text-transform:uppercase; margin-bottom:9px}
.card.help .ph{
  background:#fff; border:1px solid #e0e0f5; border-radius:10px; padding:9px 12px; margin-bottom:7px;
  display:flex; align-items:center; gap:10px; font-family:var(--serif); font-size:15px; color:#22243a;
}
.card.help .ph button{margin-left:auto; font-size:11px; font-weight:700; color:var(--lav); white-space:nowrap; padding:4px 9px; border-radius:7px; background:#eeeefc}
.card.help .ph button:hover{background:#e2e2fa}
.card.help .note{color:#5b5d8a; font-size:12.5px; margin-top:4px}
.card.fb{background:var(--amber-soft); border:1px solid #f1e2c4}
.card.fb h4{font-size:11.5px; font-weight:700; letter-spacing:.03em; color:#b3771a; text-transform:uppercase; margin-bottom:11px; display:flex; align-items:center; gap:7px}
.fb .corr{background:#fff; border:1px solid #f0e3c8; border-radius:11px; padding:11px 13px; margin-bottom:9px}
.fb .corr .o{color:#a05a5a; text-decoration:line-through; font-family:var(--serif); font-size:14px}
.fb .corr .b{color:#1c7a5c; font-family:var(--serif); font-size:15.5px; margin-top:3px; font-weight:500}
.fb .corr .w{color:var(--muted); font-size:12.5px; margin-top:5px}
.fb .enc{color:#9a6510; font-weight:600; font-size:13.5px; margin-top:4px; display:flex; gap:7px; align-items:flex-start}
.fb .chunks-added{font-size:12px; color:#8a7320; margin-top:9px; padding-top:9px; border-top:1px dashed #e8d3a8}

/* ---------- Composer ---------- */
.composer{border-top:1px solid var(--line); background:var(--surface); padding:12px 16px 14px}
.composer-inner{max-width:640px; margin:0 auto}
.quickrow{display:flex; gap:8px; margin-bottom:11px}
.quick{
  font-size:12.5px; font-weight:600; padding:7px 13px; border-radius:999px;
  border:1.5px solid var(--line); background:var(--surface); color:var(--ink-soft); white-space:nowrap; transition:.12s;
  display:inline-flex; align-items:center; gap:6px;
}
.quick:hover{border-color:#c9cdd9}
.quick.lav{color:var(--lav)} .quick.lav:hover{border-color:var(--lav); background:var(--lav-soft)}
.quick.amber{color:#b3771a} .quick.amber:hover{border-color:var(--amber); background:var(--amber-soft)}
.quick:disabled{opacity:.5; cursor:not-allowed}
.inputrow{display:flex; align-items:flex-end; gap:10px}
.txtwrap{flex:1; position:relative}
#msg{
  width:100%; max-height:120px; min-height:48px; padding:13px 15px; border-radius:14px;
  border:1.5px solid var(--line); font-size:15.5px; line-height:1.45; resize:none;
}
#msg:focus{outline:none; border-color:var(--jade)}
#msg::placeholder{color:#a3a7b8}
.mic{
  width:64px; height:64px; flex:none; border-radius:50%; background:var(--jade); color:#fff;
  display:grid; place-items:center; position:relative; transition:.15s;
  box-shadow:0 5px 16px -5px rgba(19,163,127,.55);
}
.mic:hover{background:var(--jade-deep)}
.mic svg{width:29px; height:29px; position:relative; z-index:2}
.mic.live{background:#e0533f; box-shadow:0 5px 16px -5px rgba(224,83,63,.6)}
.mic.live::before,.mic.live::after{
  content:""; position:absolute; inset:0; border-radius:50%; border:2px solid #e0533f; z-index:1;
  animation:ring 1.5s ease-out infinite;
}
.mic.live::after{animation-delay:.5s}
@keyframes ring{0%{transform:scale(1); opacity:.6}100%{transform:scale(2.1); opacity:0}}
.send{
  width:52px; height:52px; flex:none; border-radius:50%; background:var(--ink); color:#fff;
  display:grid; place-items:center; transition:.15s;
}
.send:hover{background:var(--ink-soft)}
.send:disabled{background:#c5cad4; cursor:not-allowed}
.send svg{width:20px; height:20px}
.listening-hint{font-size:12px; color:#e0533f; font-weight:600; text-align:center; margin-top:9px; height:14px}

/* ---------- Notes drawer ---------- */
.notes{
  width:280px; flex:none; border-left:1px solid var(--line); background:var(--surface);
  display:flex; flex-direction:column;
}
.notes h3{font-size:13px; font-weight:700; padding:16px 18px 10px; display:flex; align-items:center; gap:8px}
.notes h3 .ct{margin-left:auto; font-size:11px; color:#fff; background:var(--amber); padding:2px 8px; border-radius:999px; font-weight:700}
.notes-list{flex:1; overflow-y:auto; padding:4px 14px 14px}
.note-item{padding:11px 13px; border:1px solid var(--line); border-radius:11px; margin-bottom:8px; background:var(--paper)}
.note-item .en{font-family:var(--serif); font-size:15px; color:#1c1e30; font-weight:500}
.note-item .ko{font-size:12.5px; color:var(--muted); margin-top:3px}
.notes-empty{padding:26px 18px; text-align:center; color:#a3a7b8; font-size:13px; line-height:1.6}
.notes-foot{padding:12px 14px; border-top:1px solid var(--line)}
.notes-foot button{width:100%; padding:9px; border-radius:10px; background:var(--mist); font-size:12.5px; font-weight:600; color:var(--ink-soft)}
.notes-foot button:hover{background:#e2e5ee}

/* mobile notes toggle */
.notes-mobile-toggle{display:none}

@media (max-width:760px){
  .notes{
    position:fixed; right:0; top:0; bottom:0; z-index:40; width:84%; max-width:320px;
    transform:translateX(100%); transition:transform .25s; box-shadow:-12px 0 40px -16px rgba(0,0,0,.25);
  }
  .notes.open{transform:translateX(0)}
  .notes-mobile-toggle{display:grid}
  .scrim{position:fixed; inset:0; background:rgba(20,22,40,.4); z-index:39; opacity:0; pointer-events:none; transition:.2s}
  .scrim.show{opacity:1; pointer-events:auto}

  .setup{padding:18px 15px 56px}
  .setup-inner{max-width:100%}
  .setup .lead{font-size:25px; line-height:1.32}
  .setup .sub{font-size:13.5px}
  .scn{grid-template-columns:1fr 1fr; gap:8px; max-height:232px}
  .scn button{padding:11px}
  .scn button .emo{width:38px; height:38px; font-size:19px}
  .scn button .t{font-size:13px}
  .scn button .d{font-size:10.5px}

  /* mode tabs: fit 4 on narrow screens */
  .modesw{padding:4px; gap:3px}
  .modesw button{padding:9px 2px; font-size:12px}
  .modesw button .sm{font-size:9px}

  /* inputs at 16px so iOS doesn't auto-zoom */
  #msg, #customInput, #topicCustomInput, .modal-input{font-size:16px !important}

  /* bigger touch targets */
  .startbtn,.floodbtn,.sh-next,.blk-save,.blk-next,.rv-stop{min-height:50px}
  .levels button{min-height:48px}
  .lctrls button,.quick{min-height:42px}

  /* safe-area bottom for fixed bars */
  .composer{padding:11px 14px calc(13px + env(safe-area-inset-bottom))}
  .lnext{padding-bottom:env(safe-area-inset-bottom)}
  .review{padding-bottom:env(safe-area-inset-bottom)}

  /* practice / card sizing */
  .sh-line{font-size:21px}
  .vword{font-size:30px}
  .lcard,.modal,.rvcard,.vcard{padding-left:16px; padding-right:16px}
  .lpractice button{font-size:12px}
}
@media (max-width:380px){
  .setup .lead{font-size:23px}
  .modesw button{font-size:11px}
  .modesw button .sm{display:none}
  .modesw button{padding:11px 2px}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important; scroll-behavior:auto !important}
}
/* ================= DARK skin ================= */
body{background:var(--paper); color:var(--text)}
.topbar{background:var(--paper); border-bottom:1px solid var(--line); box-shadow:none}
.brand h1{color:var(--text)}
.brand .dot{box-shadow:0 0 0 4px rgba(31,211,160,.16)}
.ctx .chip{background:var(--mist); color:var(--ink-soft)}
.iconbtn{background:var(--mist); color:var(--muted)}
.iconbtn.on{background:rgba(31,211,160,.16); color:var(--jade)}

/* level pills */
.levels button{border-radius:14px; border:1.5px solid transparent; background:var(--mist); color:var(--ink-soft)}
.levels button .en{color:var(--muted)}
.levels button[aria-pressed="true"]{background:rgba(31,211,160,.15); border-color:var(--jade); color:var(--jade)}

/* scenario / theme cards */
.scn button{border-radius:18px; border:none; background:var(--surface); color:var(--text); box-shadow:var(--soft); padding:14px; transition:transform .14s, box-shadow .14s}
.scn button .emo{width:44px; height:44px; flex:none; display:grid; place-items:center; background:rgba(31,211,160,.13); border-radius:14px; font-size:22px}
.scn button .t{color:var(--text)} .scn button .d{color:var(--muted)}
.scn button:hover{transform:translateY(-2px); box-shadow:var(--soft2)}
.scn button[aria-pressed="true"]{background:var(--card2); box-shadow:0 0 0 2px var(--jade), var(--soft2)}
.scn button[aria-pressed="true"] .emo{background:rgba(31,211,160,.22)}
.scn{scrollbar-width:thin}
.scn::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14)}
#catScrollBox, .catScroll{background:#121514; border-color:var(--line)}

.startbtn{border-radius:18px; background:linear-gradient(135deg,#1fd3a0,#13b488); color:#06231b; box-shadow:0 10px 26px -10px rgba(31,211,160,.5)}

/* mode switch — icon forward */
.modesw{background:transparent; border-radius:0; padding:0; gap:9px; margin-bottom:18px}
.modesw button{flex-direction:column; align-items:center; gap:8px; border-radius:18px; padding:15px 4px 13px; color:var(--muted); transition:.18s; background:var(--card2); border:1.5px solid var(--line)}
.modesw button .ti{width:46px; height:46px; display:grid; place-items:center; border-radius:15px; font-size:25px; transition:.18s}
.modesw button .tl{font-size:13px; font-weight:800; color:var(--muted); transition:.18s}
/* 모드별 색 */
.modesw button[data-mode="vocab"]  .ti{background:rgba(31,211,160,.14); color:#1fd3a0}
.modesw button[data-mode="block"]  .ti{background:rgba(240,136,62,.14); color:#f0883e}
.modesw button[data-mode="talk"]   .ti{background:rgba(167,139,250,.16); color:#a78bfa}
.modesw button[data-mode="listen"] .ti{background:rgba(91,155,245,.14); color:#5b9bf5}
.modesw button[aria-pressed="true"]{transform:translateY(-2px)}
.modesw button[data-mode="vocab"][aria-pressed="true"]{border-color:#1fd3a0; box-shadow:0 8px 22px -10px rgba(31,211,160,.7)}
.modesw button[data-mode="block"][aria-pressed="true"]{border-color:#f0883e; box-shadow:0 8px 22px -10px rgba(240,136,62,.7)}
.modesw button[data-mode="talk"][aria-pressed="true"]{border-color:#a78bfa; box-shadow:0 8px 22px -10px rgba(167,139,250,.7)}
.modesw button[data-mode="listen"][aria-pressed="true"]{border-color:#5b9bf5; box-shadow:0 8px 22px -10px rgba(91,155,245,.7)}
.modesw button[data-mode="vocab"][aria-pressed="true"]  .ti{background:#1fd3a0; color:#06231b}
.modesw button[data-mode="block"][aria-pressed="true"]  .ti{background:#f0883e; color:#2a1505}
.modesw button[data-mode="talk"][aria-pressed="true"]   .ti{background:#a78bfa; color:#1a0e33}
.modesw button[data-mode="listen"][aria-pressed="true"] .ti{background:#5b9bf5; color:#04162e}
.modesw button[data-mode="vocab"][aria-pressed="true"]  .tl{color:#1fd3a0}
.modesw button[data-mode="block"][aria-pressed="true"]  .tl{color:#f0883e}
.modesw button[data-mode="talk"][aria-pressed="true"]   .tl{color:#a78bfa}
.modesw button[data-mode="listen"][aria-pressed="true"] .tl{color:#5b9bf5}

/* chat bubbles */
.coach .bubble{background:var(--card2); color:var(--text); border:none; box-shadow:var(--soft); border-radius:22px; border-bottom-left-radius:7px}
.me .bubble{background:linear-gradient(135deg,#1fd3a0,#13b488); color:#06231b; border-radius:22px; border-bottom-right-radius:7px; font-weight:500}
.who{color:var(--muted)}
.composer{border-top:1px solid var(--line); background:var(--paper)}
#msg{border-radius:18px; background:var(--mist); color:var(--text); border:1px solid var(--line)}
#msg::placeholder{color:var(--muted)}
.mic{box-shadow:0 8px 20px -7px rgba(31,211,160,.5)}
.send{background:var(--jade-deep); color:#06231b}
.quick{border-radius:999px; background:var(--mist); color:var(--ink-soft); border:1px solid var(--line)}

/* generic surfaces */
.lcard,.modal,.expl-block,.rv-card,.rvcard,.vcard{box-shadow:var(--soft2); border:none}
.lcard,.expl-block{background:var(--surface)}
.modal{background:var(--surface); color:var(--text)}
.modal-input{background:var(--mist); color:var(--text); border:1px solid var(--line)}
.modal-input::placeholder{color:var(--muted)}
.card{border-radius:20px}
.bigplay{border-radius:16px; background:var(--card2); color:var(--text)}
.rv-answer,.rv-reveal{border-radius:16px}
.note-item{border-radius:14px; background:var(--surface)}
.rvbanner,.blkp-prog{box-shadow:var(--soft2)}
.notes{background:var(--surface); border-left:1px solid var(--line)}
.ltext,.ltrans,.lkey{color:var(--text)}
.vword{font-size:36px; color:var(--jade)}
.vmean{color:var(--muted)}
.vex .ex{background:var(--surface); border:1px solid var(--line)} .vex .ex .exen{font-size:16px; color:var(--text)} .vex .exko{color:var(--muted)}
.vcol{background:rgba(31,211,160,.13); color:var(--jade)}
.vmine{background:var(--amber-soft); border:1px solid #3a3320}
.dline .dl-en{color:var(--text)} .dline .spk{color:var(--muted)}
.ki .ken{color:var(--text)} .ki .kko{color:var(--muted)}

/* listening practice */
.lpractice{display:flex; gap:9px; margin-top:14px}
.lpractice button{flex:1; padding:12px 6px; border-radius:14px; font-size:12.5px; font-weight:700; background:rgba(31,211,160,.12); color:var(--jade); border:none; box-shadow:var(--soft)}
.lpractice button:hover{background:rgba(31,211,160,.2)}
.sh-spk{font-size:11.5px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:10px}
.sh-line{font-family:var(--serif); font-size:24px; line-height:1.4; color:var(--text); margin:6px 0}
.sh-ko{font-size:14px; color:var(--muted); margin-bottom:8px}
.sh-hint{font-size:13.5px; color:var(--muted); margin:14px 0}
.sh-next{width:100%; max-width:300px; margin:18px auto 0; padding:14px; border-radius:15px; background:var(--jade); color:#06231b; font-size:15px; font-weight:700; display:block}
.sh-next:hover{background:var(--jade-deep)}
.rt-ans{margin:14px 0}
.floodbtn{width:100%; margin-top:12px; padding:14px; border-radius:15px; border:none; background:rgba(31,211,160,.12); color:var(--jade); font-size:14px; font-weight:700; box-shadow:var(--soft); cursor:pointer}
.floodbtn:hover:not(:disabled){background:rgba(31,211,160,.2)}
.floodbtn:disabled{opacity:.4; cursor:default}
.flood-wave{margin:22px 0 16px; display:flex; justify-content:center}

/* ================= HOME dashboard ================= */
.home{display:flex; flex-direction:column; gap:12px; margin-bottom:18px}
.home-top{display:flex; align-items:center; justify-content:space-between; padding:2px 2px}
.home-hi{font-size:14px; color:var(--muted)}
.home-name{font-size:23px; font-weight:800; color:var(--text); margin-top:1px; cursor:pointer}
.streak{display:flex; align-items:center; gap:5px; background:var(--surface); border:1px solid var(--line); padding:8px 13px; border-radius:999px; font-size:13px; color:var(--text); white-space:nowrap}
.streak b{color:var(--jade)}
.mission{position:relative; border-radius:22px; padding:18px 18px 18px; background:radial-gradient(120% 140% at 0% 0%, #1c2a24 0%, #15201b 55%, #131715 100%); border:1px solid #243029; box-shadow:var(--soft2); overflow:hidden}
.mission-tag{display:inline-block; font-size:11.5px; font-weight:800; color:var(--jade); background:rgba(31,211,160,.15); padding:5px 11px; border-radius:999px; letter-spacing:.02em}
.mission-title{font-size:23px; font-weight:800; color:#fff; margin:11px 0 6px; line-height:1.25}
.mission-meta{font-size:12.5px; color:var(--muted); margin-bottom:15px}
.mission-btn{width:100%; padding:15px; border:none; border-radius:16px; background:linear-gradient(120deg,#1fd3a0,#16b9a6 55%,#1f9fe0); color:#04221b; font-size:16px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:0 10px 26px -10px rgba(31,211,160,.5)}
.mission-btn span{font-size:13px}
.home-row{display:flex; gap:12px}
.goal{flex:1; display:flex; align-items:center; justify-content:space-between; background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:15px 17px}
.goal-t{font-size:15px; font-weight:700; color:var(--text)}
.goal-s{font-size:12px; color:var(--muted); margin-top:3px}
.ring{position:relative; width:54px; height:54px; border-radius:999px; display:grid; place-items:center; font-size:13px; font-weight:800; color:var(--text); background:conic-gradient(var(--jade) calc(var(--p,0)*1%), #2a2f2c 0)}
.ring::before{content:""; position:absolute; width:40px; height:40px; border-radius:999px; background:var(--surface)}
.ring span{position:relative; z-index:1; font-size:12.5px}
.continue{display:flex; align-items:center; gap:12px; width:100%; background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:14px 16px; cursor:pointer; text-align:left}
.cont-emo{width:42px; height:42px; flex:none; display:grid; place-items:center; background:rgba(31,211,160,.13); border-radius:13px; font-size:20px}
.cont-txt{flex:1; display:flex; flex-direction:column}
.cont-t{font-size:14.5px; font-weight:700; color:var(--text)}
.cont-d{font-size:12px; color:var(--muted); margin-top:2px}
.cont-arr{color:var(--muted); font-size:20px}

/* ================= profile sheet + XP ================= */
.prof-scrim{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:70; display:none; align-items:flex-end; justify-content:center}
.prof-scrim.show{display:flex}
.prof-sheet{width:100%; max-width:560px; max-height:92vh; overflow-y:auto; background:var(--paper); border-radius:24px 24px 0 0; border-top:1px solid var(--line); padding:8px 20px calc(28px + env(safe-area-inset-bottom)); box-shadow:0 -20px 50px -20px rgba(0,0,0,.7)}
.prof-grab{width:42px; height:5px; border-radius:99px; background:var(--line); margin:8px auto 14px}
.prof-hd{display:flex; align-items:center; gap:14px; margin-bottom:18px}
.prof-av{width:60px; height:60px; flex:none; border-radius:18px; display:grid; place-items:center; font-size:26px; font-weight:800; color:#06231b; background:linear-gradient(135deg,#1fd3a0,#16b9a6)}
.prof-name{font-size:20px; font-weight:800; color:var(--text)}
.prof-sub{font-size:13px; color:var(--muted); margin-top:2px}
.prof-close{margin-left:auto; width:34px;height:34px;border-radius:10px;background:var(--mist);color:var(--muted);border:none;font-size:18px;cursor:pointer}
.xpbar-wrap{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:14px}
.xpbar-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px}
.xpbar-lv{font-size:16px; font-weight:800; color:var(--text)}
.xpbar-lv b{color:var(--jade)}
.xpbar-n{font-size:12.5px; color:var(--muted)}
.xpbar{height:12px; border-radius:999px; background:var(--mist); overflow:hidden}
.xpbar i{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#1fd3a0,#16b9a6); transition:width .5s}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
.stat{background:var(--surface); border:1px solid var(--line); border-radius:15px; padding:14px 15px; display:flex; align-items:center; gap:11px}
.stat .se{width:38px;height:38px;flex:none;display:grid;place-items:center;border-radius:11px;background:rgba(31,211,160,.13);font-size:18px}
.stat .sv{font-size:19px; font-weight:800; color:var(--text); line-height:1}
.stat .sl{font-size:11.5px; color:var(--muted); margin-top:3px}
.prof-h{font-size:13px; font-weight:800; color:var(--muted); margin:6px 2px 10px; letter-spacing:.02em}
.rwd{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--line); border-radius:15px; padding:13px 15px; margin-bottom:8px}
.rwd.done{border-color:rgba(31,211,160,.4); background:rgba(31,211,160,.07)}
.rwd.next{border-color:var(--jade); box-shadow:0 0 0 1px var(--jade)}
.rwd .re{width:40px;height:40px;flex:none;display:grid;place-items:center;border-radius:12px;background:var(--mist);font-size:19px}
.rwd.done .re{background:rgba(31,211,160,.18)}
.rwd .rt{flex:1}
.rwd .rlv{font-size:11.5px; font-weight:800; color:var(--jade)}
.rwd .rn{font-size:14px; font-weight:600; color:var(--text); margin-top:1px}
.rwd .rstat{font-size:12px; font-weight:700; color:var(--muted)}
.rwd.done .rstat{color:var(--jade)}

.xptoast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px); background:var(--card2); color:var(--text); border:1px solid var(--line); border-radius:14px; padding:12px 18px; font-size:14px; font-weight:700; box-shadow:var(--soft2); z-index:80; opacity:0; pointer-events:none; transition:.3s; white-space:nowrap}
.xptoast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.xptoast .xv{color:var(--jade); font-weight:800}
.xptoast .lvup{display:block; font-size:12px; color:var(--jade); margin-top:3px; text-align:center}
/* ===== 단어 화면 (말해보카 스타일) ===== */
.mbwrap{display:flex;flex-direction:column;height:100%;padding:0 16px 16px}
.mbtab{display:inline-block;background:var(--card2);border:1px solid var(--line);border-bottom:none;color:var(--muted);font-size:12px;font-weight:700;padding:6px 14px;border-radius:12px 12px 0 0;margin-left:6px}
.mbcard{background:var(--surface);border:1px solid var(--line);border-radius:18px;border-top-left-radius:4px;overflow:hidden}
.mbtop{padding:26px 22px 22px;position:relative}
.mbko{font-size:24px;font-weight:600;color:var(--text);line-height:1.45}
.mbko b{color:var(--jade);font-weight:700}
.mbnote{text-align:right;font-size:13px;color:var(--muted);margin-top:14px}
.mbdiv{height:1px;background:var(--line)}
.mbbot{padding:30px 22px 18px;min-height:96px;display:flex;align-items:center}
.mben{font-size:25px;font-weight:600;color:var(--text);line-height:1.5}
.mben .blankbox{display:inline-block;min-width:74px;height:38px;vertical-align:middle;background:var(--mist);border-radius:9px;margin:0 4px}
.mben .filled{color:var(--jade);font-weight:700}
.mbsrc{text-align:right;font-size:11px;color:var(--muted);opacity:.6;padding:0 22px 14px}
.mbctrl{margin-top:auto;padding-top:14px}
.mbmicwrap{display:flex;align-items:center;justify-content:space-between;padding:0 10px}
.mbmic{width:96px;height:96px;border-radius:50%;background:var(--jade);color:#06231b;display:grid;place-items:center;border:none;box-shadow:0 8px 30px -6px rgba(31,211,160,.5);position:relative}
.mbmic.live{background:#e0533f;color:#fff}
.mbmic svg{width:38px;height:38px}
.mbside{display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:12.5px;width:78px}
.mbside .ic{width:42px;height:42px;border-radius:50%;background:var(--card2);display:grid;place-items:center;font-size:19px}
.mbstatus{text-align:center;font-size:17px;font-weight:800;color:var(--text);margin:16px 0}
.mbbig{display:flex;gap:8px;margin-top:14px}
.mbbig button{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:15px 6px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--jade);font-size:13px;font-weight:800}
.mbbig button .ic{font-size:22px}
.mbkbd{width:100%;max-width:400px;margin:10px auto 0;padding:13px 15px;border-radius:13px;background:var(--mist);border:1px solid var(--line);color:var(--text);font-size:16px;text-align:center}
/* ===== 아이 파닉스 (밝은 테마) ===== */
#phonics{background:linear-gradient(180deg,#fef6e4 0%,#e0f7f1 100%)}
.phwrap{max-width:520px;margin:0 auto}
.phhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.phback{background:#fff;border:2px solid #ffd9a0;color:#b45309;font-weight:900;font-size:16px;border-radius:14px;padding:8px 14px;cursor:pointer}
.phstars{background:#fff;border:2px solid #ffe08a;color:#d97706;font-weight:900;font-size:16px;border-radius:14px;padding:8px 14px}
.phprog{background:#fff;border:2px solid #b9ead9;color:#0e9f6e;font-weight:900;font-size:14px;border-radius:14px;padding:8px 14px}
.phtitle{font-size:30px;font-weight:900;color:#0f172a;text-align:center;margin:8px 0 2px}
.phtitle span{font-size:30px}
.phsub{font-size:15px;color:#475569;text-align:center;margin-bottom:20px;font-weight:600}
.phtile{display:flex;align-items:center;gap:14px;width:100%;border:none;border-radius:22px;padding:18px 18px;margin-bottom:14px;cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.08);text-align:left}
.phtile .e{font-size:34px;flex:none}
.phtile .tx{flex:1;display:flex;flex-direction:column}
.phtile .tx b{font-size:20px;font-weight:900;color:#fff}
.phtile .tx i{font-size:13px;color:rgba(255,255,255,.92);font-style:normal;margin-top:2px;font-weight:600}
.phtile .ar{font-size:28px;color:#fff;font-weight:900}
.pht1{background:linear-gradient(135deg,#fb923c,#f97316)}
.pht2{background:linear-gradient(135deg,#34d399,#10b981)}
.pht3{background:linear-gradient(135deg,#a78bfa,#8b5cf6)}
.phvideo{display:block;text-align:center;background:#fff;border:2px dashed #93c5fd;color:#2563eb;font-weight:800;font-size:14px;border-radius:18px;padding:14px;margin-top:6px;text-decoration:none}
.phcard{background:#fff;border-radius:28px;padding:26px 22px;box-shadow:0 10px 30px -12px rgba(0,0,0,.25);text-align:center}
.phbig{font-size:96px;font-weight:900;color:#f97316;line-height:1}
.phbig span{color:#10b981;margin-left:8px}
.phemoji{font-size:72px;margin:6px 0}
.phemoji.big{font-size:96px;margin:0 0 6px}
.phword{font-size:30px;font-weight:900;color:#0f172a;letter-spacing:.01em}
.phsight{font-size:64px;font-weight:900;color:#8b5cf6;padding:18px 0}
.phletters{display:flex;justify-content:center;gap:10px;margin:6px 0 4px}
.phl{font-size:44px;font-weight:900;color:#0f172a;background:#f1f5f9;border:3px solid #cbd5e1;border-radius:18px;width:64px;height:74px;cursor:pointer;transition:transform .12s}
.phl.pop{transform:scale(1.18);background:#fde68a;border-color:#f59e0b}
.phstat{font-size:16px;font-weight:800;color:#64748b;margin:16px 0}
.phbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.phsound{background:#e0f2fe;border:2px solid #7dd3fc;color:#0369a1;font-weight:900;font-size:16px;border-radius:16px;padding:14px 18px;cursor:pointer}
.phrec{background:linear-gradient(135deg,#34d399,#10b981);border:none;color:#fff;font-weight:900;font-size:17px;border-radius:16px;padding:14px 22px;cursor:pointer;box-shadow:0 4px 0 #059669}
.phrec.rec{background:#ef4444;box-shadow:0 4px 0 #b91c1c;animation:phpulse .8s infinite}
@keyframes phpulse{50%{transform:scale(1.05)}}
.phnext{width:100%;background:#0f172a;color:#fff;border:none;font-weight:900;font-size:17px;border-radius:18px;padding:15px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.25)}
/* 홈의 아이 파닉스 카드 */
#kidCard{display:flex;align-items:center;gap:13px;width:100%;text-align:left;border:none;border-radius:20px;padding:16px 16px;margin-bottom:16px;cursor:pointer;background:linear-gradient(135deg,#fb923c,#fbbf24);box-shadow:0 6px 18px -8px rgba(251,146,60,.7)}
#kidCard .ke{font-size:30px;flex:none}
#kidCard .kt{flex:1}
#kidCard .kt b{display:block;font-size:16px;font-weight:900;color:#fff}
#kidCard .kt i{font-size:12px;color:rgba(255,255,255,.95);font-style:normal;font-weight:600}
#kidCard .ka{font-size:24px;color:#fff;font-weight:900}

<body>
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>스피킹 룸 <span>· speaking room</span></h1>
    </div>
    <div class="ctx" id="ctxBar" style="display:none">
      <span class="chip" id="ctxScn"></span>
      <span class="chip" id="ctxLvl"></span>
      <button class="iconbtn on" id="ttsBtn" title="음성 자동재생 켜기/끄기" aria-label="음성 토글">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
      </button>
      <button class="iconbtn" id="restartBtn" title="새 대화 시작" aria-label="새 대화">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 8a9 9 0 1 0 2.5-3.5L3 8"/></svg>
      </button>
      <button class="iconbtn notes-mobile-toggle" id="notesToggle" title="표현 노트" aria-label="표현 노트">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h13l3 3v13H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg>
      </button>
      <button class="iconbtn" id="evalBtn" title="끝내고 평가받기" aria-label="평가" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v16l4-3 4 3 4-3 4 3V4z"/><path d="M9 9h6M9 13h6"/></svg>
      </button>
    </div>
  </div>

  <!-- SETUP -->
  <div class="setup" id="setup">
    <div class="setup-inner">
      <div class="home" id="homeCard">
        <div class="home-top">
          <div>
            <div class="home-hi" id="homeHi">반가워요,</div>
            <div class="home-name" id="homeName" title="이름 설정">친구님 👋</div>
          </div>
          <div class="streak" id="streakBadge"><span>🔥</span><b id="streakN">1</b>일 연속</div>
        </div>
        <!-- 메인 트레이닝 (70%) -->
        <button class="mission" id="trainCard" style="text-align:left;width:100%;cursor:pointer;display:block">
          <span class="mission-tag">오늘의 트레이닝</span>
          <div class="mission-title">듣고 · 이해하고 · 말하기</div>
          <div class="mission-meta" id="trainMeta">실제 영어를 귀로 듣고 → 따라 말하고 → 내 말로 써먹어요</div>
          <span class="mission-btn" id="trainBtn"><span>▶</span> 시작하기</span>
        </button>
        <button class="continue" id="continueCard" style="display:none">
          <span class="cont-emo" id="contEmo">✈️</span>
          <span class="cont-txt"><span class="cont-t">이어서 연습하기</span><span class="cont-d" id="contDesc"></span></span>
          <span class="cont-arr">›</span>
        </button>
      </div>

      <!-- 습득 지표 (점수 아님 — 자신감·인출속도·이해) -->
      <div id="acqStats" style="display:flex;gap:9px;margin-bottom:14px"></div>

      <!-- 리스닝 부스터(20%) · 단어 강화(10%) -->
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <button id="boosterCard" style="flex:1;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:18px;padding:15px 14px;cursor:pointer">
          <div style="width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:21px;background:rgba(91,155,245,.16);color:#5b9bf5;margin-bottom:9px">🎧</div>
          <div style="font-size:14.5px;font-weight:800;color:var(--text)">리스닝 부스터</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4">연음·축약 귀 훈련<br>wudja · wanna · gonna</div>
        </button>
        <button id="vocabCard" style="flex:1;text-align:left;background:var(--card2);border:1.5px solid var(--line);border-radius:18px;padding:15px 14px;cursor:pointer">
          <div style="width:40px;height:40px;border-radius:13px;display:grid;place-items:center;font-size:21px;background:rgba(31,211,160,.14);color:#1fd3a0;margin-bottom:9px">🗣️</div>
          <div style="font-size:14.5px;font-weight:800;color:var(--text)">단어 강화</div>
          <div style="font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4">외우지 않고<br>상황에서 직접 써보기</div>
        </button>
      </div>

      <!-- 아이 파닉스 (초등 저학년) -->
      <button id="kidCard"><span class="ke">👦</span><span class="kt"><b>아이 파닉스 · 소리 학교</b><i>글자 소리 · 단어 읽기 · 발음 별점 ⭐</i></span><span class="ka">›</span></button>

      <!-- 다시 만날 표현 (STEP 8 · 미래 인출) -->
      <div class="rvbanner" id="rvBanner" style="display:none">
        <div class="rvb-l"><span class="rvb-n" id="rvCount">0</span><span class="rvb-t">다시 만날 표현</span></div>
        <div class="rvb-btns">
          <button id="rvStart">다시 말해보기</button>
          <button id="rvSpeed">⚡ 속도</button>
        </div>
      </div>

      <!-- 난이도 (코치가 맞춰줌) -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:700;color:var(--muted)">난이도</span>
        <div class="levels" id="levels" style="flex:1">
          <button data-lvl="초급" aria-pressed="false">초급<span class="en">slow & simple</span></button>
          <button data-lvl="중급" aria-pressed="true">중급<span class="en">everyday pace</span></button>
          <button data-lvl="고급" aria-pressed="false">고급<span class="en">native speed</span></button>
        </div>
      </div>
      <div id="verFoot" style="text-align:center;margin-top:14px;font-size:11.5px;color:var(--muted);opacity:.7;letter-spacing:.03em"></div>

      <!-- (구) 설정 영역 — 코치형에선 숨김, 엔진 호환 위해 유지 -->
      <div style="display:none">
      <div class="field" id="levelField"></div>

      <div class="field" id="talkField" style="display:none">
        <label>어떤 상황을 연습할까요</label>
        <div class="scn" id="scnGrid"></div>
        <div id="customWrap">
          <textarea id="customInput" rows="2" placeholder="예: 공항 체크인 카운터에서 수하물이 초과됐을 때"></textarea>
        </div>
      </div>

      <div class="field" id="listenField" style="display:none">
        <label>어떤 주제를 들을까요</label>
        <div class="scn" id="topicGrid"></div>
        <div id="topicCustomWrap" style="margin-top:11px; display:none">
          <textarea id="topicCustomInput" rows="2" placeholder="예: 미국 마트에서 장 보는 일상, 또는 비트코인 뉴스" style="width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;resize:none;line-height:1.5"></textarea>
        </div>
        <button class="floodbtn" id="floodBtn" disabled>🎧 흘려듣기 — 자동 연속 재생 (핸즈프리)</button>
      </div>

      <div class="field" id="blockField" style="display:none">
        <label>블록 영어 — 핵심 표현 마스터</label>
        <div id="blkPanel"></div>
      </div>

      <div class="field" id="vocabField">

/* localStorage 기반 저장 (claude.ai 밖에서도 진행도가 저장됨) */
if (typeof window !== "undefined" && !window.storage) {
  window.storage = {
    async get(k){ try{ const v=localStorage.getItem(k); return v==null?null:{value:v}; }catch(e){ return null; } },
    async set(k,v){ try{ localStorage.setItem(k, v); return {value:v}; }catch(e){ return null; } },
    async delete(k){ try{ localStorage.removeItem(k); return {deleted:true}; }catch(e){ return null; } },
    async list(){ return {keys:[]}; }
  };
}

/* safe Web Speech handles (some mobile webviews lack the bare globals) */

const SSU = (typeof window!=="undefined" && window.SpeechSynthesisUtterance) ? window.SpeechSynthesisUtterance : null;

/* unlock TTS on first user gesture (iOS requires speech to start inside a tap) */
let ttsUnlocked=false;
function unlockTTS(){ if(ttsUnlocked||!TTS||!SSU) return; try{ const u=new SSU(" "); u.volume=0; TTS.speak(u); ttsUnlocked=true; }catch(e){} }

/* custom modal (native prompt/confirm are blocked inside the app webview) */

function openModal(opts){

  inp.style.display=opts.input?"block":"none"; inp.value=""; inp.placeholder=opts.placeholder||"";

  document.getElementById("modalOk").textContent=opts.okText||"확인";
  document.getElementById("modalCancel").textContent=opts.cancelText||"취소";
  document.getElementById("modalScrim").classList.add("show");
  if(opts.input) setTimeout(()=>inp.focus(),60);
  _modalOnOk=()=>{ const v=opts.input?inp.value.trim():true; closeModal(); if(opts.onOk) opts.onOk(v); };
}

/* ============ persistence (graceful) ============ */
async function loadNotes(){
  try{
    const r = await window.storage.get("speakingroom:notes");
    if(r && r.value){ state.notes = JSON.parse(r.value); normalizeDeck(); renderNotes(); }
  }catch(e){ /* not available — session only */ }
  refreshRvBanner();
}
async function saveNotes(){
  try{ await window.storage.set("speakingroom:notes", JSON.stringify(state.notes)); }catch(e){}
}

/* ============ Claude API ============ */
async function callClaude(system, messages, model){
  const res = await fetch(PROXY_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ model: model||MODEL, max_tokens:2000, system, messages })
  });
  if(!res.ok) throw new Error("API "+res.status);
  return res.json();
}
function extractText(data){
  if(!data || !Array.isArray(data.content)) return "";
  return data.content.filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function parseJSON(text){
  let t = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const s=t.indexOf("{"), e=t.lastIndexOf("}");
  if(s>=0 && e>=0) t=t.slice(s,e+1);
  return JSON.parse(t);
}

/* ============ prompt builders ============ */
function levelLine(){
  if(state.level==="초급") return "Use simple, common words and short sentences. Speak slowly and clearly. Avoid idioms and slang.";
  if(state.level==="고급") return "Speak fully naturally at native pace, with idioms and casual expressions.";
  return "Use everyday natural English at a normal pace. Common idioms are fine.";
}
function scnDesc(){
  if(state.scn && state.scn.id==="custom") return state.custom;
  return state.scn ? state.scn.ctx : "";
}
function scnRole(){
  return state.scn && state.scn.id!=="custom" ? state.scn.role
       : "the most fitting person for this situation";
}
function rolePrompt(){
  if(state.scn && state.scn.id==="freetalk"){
    return [
"You are a warm, encouraging English speaking COACH helping a Korean learner (level: "+state.level+") practice FREE speaking — producing English from scratch, which is the hardest part for them.",
"How each turn works:",
"- Ask ONE simple, open question at a time about their real everyday life (their day, food, weekend, work, family, opinions, plans). Start easy and build up.",
"- After they answer (their English may be broken — that's totally fine, understand their intent), do BOTH: (1) give ONE short, natural model of what they meant, said better — start it with 👍 if they did well; (2) then ask your next question.",
"- Keep every reply SHORT (a model line + one question). "+levelLine(),
"- Be warm and low-pressure. Only ONE improvement per turn — never pile on corrections.",
"- Reply in English. You may add a tiny Korean gloss in parentheses only for a genuinely hard word."
    ].join("\n");
  }
  return [
"You are role-playing as "+scnRole()+".",
"Situation: "+scnDesc(),
"You are talking with a Korean person practicing spoken English (level: "+state.level+").",
"Rules:",
"- Speak ONLY in natural spoken English. Keep every reply SHORT — 1 to 3 sentences, like a real conversation. Never lecture.",
"- Stay fully in character. React naturally to whatever they say, even if their English is broken — understand their intent and keep things flowing.",
"- "+levelLine(),
"- Usually end with a natural follow-up question so they have something to respond to.",
"- Never correct their grammar and never switch to Korean. Just talk like a real person would."
  ].join("\n");
}

function pickScn(id, btn){

function refreshStart(){
  if(state.mode==="block") return; // block mode uses its own panel buttons
  let ok;
  if(state.mode==="talk"){
    ok = state.scn && (state.scn.id!=="custom" || state.custom.length>3);
  }else if(state.mode==="vocab"){
    if(!state.vocabTheme) state.vocabTheme=nextVocabTheme();
    ok = true;   // 주제선택 없음 — 바로 시작
  }else{
    ok = state.topic && (state.topic.id!=="custom" || state.topicCustom.length>3);
  }
  $("#startBtn").disabled = !ok;
  const fb=$("#floodBtn"); if(fb) fb.disabled = !(state.mode==="listen" && ok);

/* ============ rendering turns ============ */
function turnEl(role){
  const d=document.createElement("div");
  d.className="turn "+(role==="assistant"?"coach":"me");

  who.className="who"; who.textContent = role==="assistant" ? "상대" : "나";

function addCoachTurn(text){
  const {wrap,bub}=turnEl("assistant");
  bub.textContent=text;
  const acts=document.createElement("div"); acts.className="coach-acts";
  const play=document.createElement("button");
  play.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg> 다시 듣기`;
  play.onclick=()=>speak(text);
  const tr=document.createElement("button");

  tr.onclick=()=>toggleTrans(text, trDiv);

  wrap.appendChild(acts); wrap.appendChild(trDiv);

let _transBusy=false;
async function toggleTrans(text, div){
  if(div.dataset.loaded){ div.classList.toggle("show"); return; }
  if(_transBusy) return; _transBusy=true;
  div.classList.add("show"); div.textContent="해석 중…";
  try{
    const data=await callClaude("Translate the English to natural Korean. Return ONLY the Korean translation, nothing else — no quotes, no notes.", [{role:"user", content:text}]);
    div.textContent=extractText(data); div.dataset.loaded="1";
  }catch(e){ div.textContent="(해석을 불러오지 못했어요)"; }
  _transBusy=false;
}
function addMeTurn(text){
  const {bub}=turnEl("user"); bub.textContent=text; scrollDown();
}

/* ============ conversation flow ============ */
async function startSession(){
  if(state.scn) markPractice({mode:"talk", id:state.scn.id, emo:state.scn.emo||"🗣️", label:(state.scn.id==="custom"?"직접 입력 회화":(state.scn.t||"회화"))});
  setup.style.display="none"; stage.style.display="flex"; $("#ctxBar").style.display="flex";
  pushScreen("talk");
  $("#ctxScn").textContent = state.scn.id==="custom" ? "직접 입력" : state.scn.t;
  $("#ctxLvl").textContent = state.level;
  $("#evalBtn").style.display="";
  state.convo=[];
  threadInner.innerHTML="";
  setBusy(true);
  showTyping();
  try{
    const kickoff = (state.scn && state.scn.id==="freetalk")
      ? "Start now. Greet me warmly in one short line and ask me your first easy question."
      : "Begin the role-play now. Say your first line to me.";
    const data = await callClaude(rolePrompt(), [{role:"user", content:kickoff}]);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("연결에 문제가 생겼어요. 잠시 후 다시 시도해 주세요. (이 앱은 claude.ai 안에서 작동합니다.)");
  }
  setBusy(false); msg.focus();
}

async function sendMessage(){
  const text=msg.value.trim();
  if(!text || state.busy) return;
  msg.value=""; autoSize();
  if(hasHangul(text)){ addMeTurn(text); return koreanFallback(text); }
  addMeTurn(text);
  state.convo.push({role:"user", text});
  questBump("talk");
  setBusy(true); showTyping();
  try{
    const msgs = state.convo.map(t=>({role:t.role, content:t.text}));
    const data = await callClaude(rolePrompt(), msgs);
    const txt = extractText(data);
    hideTyping();
    state.convo.push({role:"assistant", text:txt});
    addCoachTurn(txt);
  }catch(e){
    hideTyping(); addCoachTurn("(연결 오류 — 다시 시도해 주세요.)");
  }
  setBusy(false);
}
function hasHangul(s){ return /[가-힣]/.test(s); }
async function koreanFallback(korean){
  const lastCoach = [...state.convo].reverse().find(t=>t.role==="assistant");
  setBusy(true); showTyping();
  const sys=[
    "The learner is practicing spoken English in this situation: "+scnDesc()+".",
    lastCoach ? 'The other person just said to them: "'+lastCoach.text+'".' : "",
    "The learner got stuck and typed in Korean what they want to say. Give the natural English they should say here, fitting this exact situation. Keep it short and natural — what a real person would actually say.",
    'Return ONLY JSON: {"en":"natural English they should say","note":"짧은 한국어 팁 또는 뉘앙스, 없으면 빈 문자열"}'
  ].join("\n");
  try{
    const data=await callClaude(sys, [{role:"user", content:korean}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFallbackCard(obj);
    if(lastCoach) addCoachTurn(lastCoach.text); // 한 단계 뒤로 — 같은 질문 다시
  }catch(e){ hideTyping(); }
  setBusy(false);
}
function renderFallbackCard(obj){
  const c=document.createElement("div"); c.className="card help";
  let html=`<h4>💡 막혔을 땐 이렇게 말해요</h4>`;
  html+=`<div class="ph"><span>${escapeHtml(obj.en||"")}</span><button data-say="${escapeAttr(obj.en||"")}">이걸로 답하기</button></div>`;
  if(obj.note) html+=`<div class="note">${escapeHtml(obj.note)}</div>`;
  html+=`<div class="note" style="margin-top:8px">👇 아래 질문에 이번엔 <b>영어로</b> 다시 답해보세요.</div>`;
  c.innerHTML=html;
  threadInner.appendChild(c);
  c.querySelectorAll("button[data-say]").forEach(b=>{
    b.onclick=()=>{ msg.value=b.getAttribute("data-say"); autoSize(); msg.focus(); refreshSend(); speak(b.getAttribute("data-say")); };
  });
  scrollDown();
}

/* ============ help (Korean -> English) ============ */
function askHelp(){
  if(state.busy) return;
  openModal({title:"💡 막혔어요", msg:"뭐라고 말하고 싶어요? 한국어로 적어주세요.", input:true, placeholder:"예: 이거 안 매운 걸로 바꿀 수 있어요?", okText:"물어보기", onOk:(ko)=>{ if(ko) doHelp(ko); }});
}
async function doHelp(ko){
  setBusy(true); showTyping();
  const sys = [
"You are an English speaking coach for a Korean learner.",
"Current situation: "+scnDesc(),
"The learner wants to know how to say something in English in this situation.",
'Return ONLY a JSON object, no markdown, no preamble:',
'{"phrases":["natural way 1","natural way 2"],"note":"아주 짧은 한국어 팁, 없으면 빈 문자열"}',
"Give 1 to 3 natural, situation-appropriate spoken phrases (not formal)."
  ].join("\n");
  try{
    const data = await callClaude(sys, [{role:"user", content:ko.trim()}]);
    const obj = parseJSON(extractText(data));
    hideTyping();
    renderHelpCard(ko.trim(), obj);
  }catch(e){ hideTyping(); }
  setBusy(false);
}
function renderHelpCard(ko, obj){
  const c=document.createElement("div"); c.className="card help";
  let html=`<h4>💡 "${escapeHtml(ko)}" 이렇게 말해보세요</h4>`;
  (obj.phrases||[]).forEach(p=>{
    html+=`<div class="ph"><span>${escapeHtml(p)}</span><button data-say="${escapeAttr(p)}">이걸로 말하기</button></div>`;
  });
  if(obj.note) html+=`<div class="note">${escapeHtml(obj.note)}</div>`;
  c.innerHTML=html;
  threadInner.appendChild(c);
  c.querySelectorAll("button[data-say]").forEach(b=>{
    b.onclick=()=>{ msg.value=b.getAttribute("data-say"); autoSize(); msg.focus(); refreshSend(); speak(b.getAttribute("data-say")); };
  });
  scrollDown();
}

/* ============ feedback ============ */
async function getFeedback(){
  if(state.busy) return;
  const mine = state.convo.filter(t=>t.role==="user").map(t=>t.text);
  if(mine.length===0){ flashHint("먼저 영어로 한 번 말해보세요!"); return; }
  setBusy(true); showTyping();
  const sys=[
"You are a warm, encouraging English speaking coach for a Korean learner.",
"Below are the learner's English utterances from a role-play conversation. Review them.",
"Return ONLY a JSON object, no markdown:",
'{"corrections":[{"original":"...","better":"...","why":"짧은 한국어 설명","ko":"better 문장의 한국어 뜻"}],"chunks":[{"en":"useful chunk","ko":"한국어 뜻"}],"encouragement":"구체적으로 잘한 점을 짚는 한 문장 한국어 격려"}',
"Only include corrections where the English had real errors or sounded unnatural — skip sentences that were already fine. Pick the 1 to 4 most useful. chunks = 1 to 3 reusable expressions worth memorizing from this context. Be kind and specific."
  ].join("\n");
  const userMsg = mine.map((m,i)=>`${i+1}. ${m}`).join("\n");
  try{
    const data=await callClaude(sys,[{role:"user", content:userMsg}]);
    const obj=parseJSON(extractText(data));
    hideTyping();
    renderFeedbackCard(obj);
  }catch(e){ hideTyping(); flashHint("피드백 생성에 실패했어요. 다시 시도해 주세요."); }
  setBusy(false);
}
function renderFeedbackCard(obj){
  const c=document.createElement("div"); c.className="card fb";
  let html=`<h4><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#b3771a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> 코치 피드백</h4>`;
  const corr=obj.corrections||[];
  if(corr.length===0){
    html+=`<div style="color:#1c7a5c;font-weight:600;font-size:14px">완벽해요 — 고칠 게 없어요! 👏</div>`;
  }else{
    corr.forEach((c2,i)=>{
      html+=`<div class="corr"><div class="o">${escapeHtml(c2.original||"")}</div><div class="b">→ ${escapeHtml(c2.better||"")}</div>`;
      if(c2.why) html+=`<div class="w">${escapeHtml(c2.why)}</div>`;
      html+=`<button class="resay" data-en="${escapeAttr(c2.better||"")}" data-ko="${escapeAttr(c2.ko||"")}" style="margin-top:8px;padding:9px 14px;border-radius:11px;background:linear-gradient(135deg,#1fd3a0,#13b488);color:#06231b;font-size:13px;font-weight:800">🎤 이렇게 다시 말해보기</button>`;
      html+=`</div>`;
    });
  }
  if(obj.encouragement) html+=`<div class="enc">🌱 <span>${escapeHtml(obj.encouragement)}</span></div>`;
  // enroll into review deck: corrections + chunks
  const enrolled=[];
  corr.forEach(c2=>{ if(c2 && c2.better && addReviewItem(c2.better, c2.ko, "correction", c2.original)) enrolled.push(c2.better); });
  (obj.chunks||[]).forEach(ch=>{ if(ch && ch.en && addReviewItem(ch.en, ch.ko, "chunk")) enrolled.push(ch.en); });
  if(enrolled.length){
    renderNotes(); saveNotes(); refreshRvBanner();
    html+=`<div class="chunks-added">📓 복습 노트에 ${enrolled.length}개 추가됨 — 며칠 뒤 복습으로 다시 나와요.</div>`;
  }
  c.innerHTML=html;
  threadInner.appendChild(c); scrollDown();
  c.querySelectorAll(".resay").forEach(b=>{
    b.onclick=()=>openDrill(b.getAttribute("data-en"), b.getAttribute("data-ko"));
  });
}

/* ============ notes panel ============ */
function renderNotes(){
  const list=$("#notesList"); $("#noteCount").textContent=state.notes.length;
  if(state.notes.length===0){ list.innerHTML=`<div class="notes-empty">피드백을 받으면<br>외울 표현이 여기 쌓여요.</div>`; return; }
  list.innerHTML="";
  state.notes.slice().reverse().forEach(n=>{
    const d=document.createElement("div"); d.className="note-item";
    d.innerHTML=`<div class="en">${escapeHtml(n.en)}</div>`+(n.ko?`<div class="ko">${escapeHtml(n.ko)}</div>`:"");
    list.appendChild(d);
  });
}

/* ============ listening (input) mode ============ */
function topicDesc(){
  if(state.topic && state.topic.id==="custom") return state.topicCustom;
  return state.topic ? state.topic.topic : "";
}
function listenLen(){
  if(state.level==="초급") return "Keep it short and simple: 4 to 6 short turns total, common words, basic everyday sentences.";
  if(state.level==="고급") return "Write 8 to 12 turns at natural native level, with idioms, contractions, and realistic back-and-forth.";
  return "Write 6 to 10 turns of natural everyday spoken English.";
}
let curPassage=null;
let passageAwarded=false;
function passageSys(){
  const seed=Math.floor(Math.random()*100000);
  return [
"You are creating a fresh English LISTENING practice DIALOGUE between two speakers for a Korean learner (level: "+state.level+").",
"Topic: "+topicDesc()+".",
listenLen(),
"It must sound like a real, natural spoken conversation — two people talking, with questions, reactions, and natural turn-taking. Use everyday spoken English (contractions, fillers ok at higher levels), not textbook lines. Pick a specific concrete scene so it feels new (variety seed "+seed+"). Don't reuse a generic opening.",
"Use exactly \"A\" and \"B\" as the two speaker IDs, alternating naturally.",
"Return ONLY a JSON object, no markdown:",
'{"title":"short English title (3-5 words)","speakers":{"A":"short role or name","B":"short role or name"},"lines":[{"speaker":"A","en":"line in English","ko":"한국어 번역"},{"speaker":"B","en":"...","ko":"..."}],"key":[{"en":"useful expression or chunk","ko":"한국어 뜻"}]}',
"key = 2 to 4 genuinely useful expressions or chunks from the dialogue worth memorizing."
  ].join("\n");
}
/* ============================================================
   듣기 트레이너 — 실전 구어 듣기 훈련 (단어 암기 아님)
   흐름: 문장생성 → 듣기 → 받아쓰기 → 오답분석 → 연음설명
        → 다시듣기 → 따라말하기 → 대화 이어가기 → 다음 문장
   ============================================================ */

function startListening(){
  if(state.topic) markPractice({mode:"listen", id:state.topic.id, emo:state.topic.emo||"🎧", label:(state.topic.id==="custom"?"직접 입력 듣기":(state.topic.t||"듣기")+" 듣기")});
  setup.style.display="none"; stage.style.display="none"; $("#listen").style.display="flex"; pushScreen("listen");
  $("#ctxBar").style.display="flex";
  $("#notesToggle").style.display="none"; $("#ttsBtn").style.display="none";
  $("#evalBtn").style.display="none";
  $("#ctxScn").textContent = state.topic.id==="custom" ? "직접 입력" : state.topic.t;
  $("#ctxLvl").textContent = state.level + " · 듣기";

  lsPrevReply=""; lsCount=0;

// 실전 구어 한 문장 생성
let lsBoosterMode=false;
function listenSentenceSys(){
  const seed=Math.floor(Math.random()*100000);
  const prev = lsPrevReply ? `This is a continuing conversation. The other person just said: "${lsPrevReply}". Produce the NEXT natural spoken line that follows it.` : "Begin a fresh real-life spoken moment.";
  const booster = lsBoosterMode ? "CRITICAL FOCUS — this is EAR TRAINING for connected speech. The sentence MUST be packed with real reductions/contractions/linking that trip up Korean learners: e.g. wanna, gonna, gotta, wudja(would you), didja(did you), gimme, lemme, kinda, 'I'll', 'you're', dropped/linked sounds. Make it sound exactly like fast casual native speech." : "";
  return [
"This is NOT an English lesson. This is LISTENING training for real-world spoken English. Optimize for how people ACTUALLY speak — contractions, reductions, connected speech, natural rhythm — not textbook grammar.",
"Produce ONE natural spoken English sentence for a Korean learner (level: "+state.level+"). Topic context: "+topicDesc()+".",
booster,
prev,
state.level==="초급"?"Short and clear but still natural (5-9 words)." : state.level==="고급"?"Fully native-paced and natural with real reductions (8-16 words)." : "Everyday natural pace (6-12 words).",
"Concrete and fresh (variety seed "+seed+"). One sentence only.",
'Return ONLY JSON: {"en":"the spoken sentence","ko":"한국어 뜻"}'
  ].join("\n");
}
async function lsGenerate(){
  lsAnswer=""; lsAnalysis=null; lsConn=null; lsAwarded=false;
  $("#listenScroll").innerHTML=`<div class="lloading">다음 문장을 준비하는 중…<div class="typing"><i></i><i></i><i></i></div></div>`;
  try{
    const data=await callClaude(listenSentenceSys(),[{role:"user",content:"Create the sentence now."}], FAST_MODEL);
    lsItem=parseJSON(extractText(data));
    if(!lsItem || !lsItem.en) throw new Error("empty");
    lsCount++;
    renderListenPlay();
  }catch(e){
    $("#listenScroll").innerHTML=`<div class="lloading">문장을 만들지 못했어요.<br><button class="sh-next" id="lsRetry" style="max-width:240px;margin-top:14px">다시 시도</button></div>`;
    const r=$("#lsRetry"); if(r) r.onclick=lsGenerate;
  }
}

function lsSpeak(slow){
  if(!TTS||!SSU||!lsItem) return;
  TTS.cancel();
  const u=new SSU(lsItem.en||""); if(enVoice) u.voice=enVoice; u.lang="en-US";
  u.rate = slow?0.66 : (state.level==="초급"?0.9 : state.level==="고급"?1.02 : 0.96);
  TTS.speak(u);
}
